    { c2key:"c2_close_gt_c1_low",   c3key:"c3_close_gt_c2_low",   leftC2:"C2 Close", rightC1:"C1 Low",   leftC3:"C3 Close", rightC2:"C2 Low"   },
    { c2key:"c2_close_gt_c1_close", c3key:"c3_close_gt_c2_close", leftC2:"C2 Close", rightC1:"C1 Close", leftC3:"C3 Close", rightC2:"C2 Close" },
    { c2key:"c2_close_gt_c1_open",  c3key:"c3_close_gt_c2_open",  leftC2:"C2 Close", rightC1:"C1 Open",  leftC3:"C3 Close", rightC2:"C2 Open"  },

    { c2key:"c2_open_gt_c1_open",  c3key:"c3_open_gt_c2_open",  leftC2:"C2 Open", rightC1:"C1 Open",  leftC3:"C3 Open", rightC2:"C2 Open"  },

    { c2key:"c2_open_gt_c1_low",   c3key:"c3_open_gt_c2_low",   leftC2:"C2 Open", rightC1:"C1 Low",   leftC3:"C3 Open", rightC2:"C2 Low"   },
  ]},
];

const REAL_COMBOS = ["bull_bull","bull_bear","bear_bull","bear_bear"];

const DAY_META = {
  Range1:{ label:"Range 1", color:"#60a5fa", desc:"Narrow 9:30 range, hugs open all session" },
  DWP:   { label:"DWP",     color:"#34d399", desc:"Strong morning move, afternoon consolidates" },
  DNP:   { label:"DNP",     color:"#f59e0b", desc:"Trend day — morning & afternoon extend" },
  Range2:{ label:"Range 2", color:"#f87171", desc:"Thigh gap — large move reverts to 9:30" },
};
const DAY_TYPES  = ["Range1","DWP","DNP","Range2"];
const DOW_LABELS = ["Mon","Tue","Wed","Thu","Fri"];
// dow_num from DuckDB: 1=Mon…5=Fri
const DOW_NUM_MAP = {1:"Mon",2:"Tue",3:"Wed",4:"Thu",5:"Fri"};

// ── PROBABILITY ENGINE ────────────────────────────────────────
function activeCombos(c1, c2) {
  if (c1 && c2)  return [`${c1}_${c2}`];
  if (c1 && !c2) return REAL_COMBOS.filter(k => k.startsWith(`${c1}_`));
  if (!c1 && c2) return REAL_COMBOS.filter(k => k.endsWith(`_${c2}`));
  return REAL_COMBOS;
}
function weightedAvg(data, combos, getter) {
  const vals = [];
  for (const combo of combos) {
    const v = getter(combo), n = data.probs?.[combo]?.n ?? 0;
    if (v != null && n > 0) vals.push({v,n});
  }
  if (!vals.length) return null;
  const total = vals.reduce((s,x)=>s+x.n,0);
  return Math.round(vals.reduce((s,x)=>s+x.v*x.n,0)/total*10)/10;
}
function lookupProb(data, c1, c2, sel, key, side) {
  if (!data) return null;
  const combos = activeCombos(c1, c2);
  const active = Object.entries(sel);
  if (active.length === 0) {
    return weightedAvg(data, combos, combo =>
      side==="c2" ? data.probs?.[combo]?.c2?.[key]??null : data.probs?.[combo]?.c3?.[key]??null
    );
  }
  const probForCombo = (combo) => {
    if (side === "c2") {
      let v = data.probs?.[combo]?.c2?.[key]; if (v==null) return null;
      for (const [sk,sd] of active) {
        if (sk===key) continue;
        const base = data.probs?.[combo]?.c2?.[sk]??50;
        v = Math.min(98,Math.max(2, v+((( sd==="above"?base:100-base)-50)/50)*3));
      }
      return Math.round(v*10)/10;
    }
    if (active.length===1) {
      const [sk,sd]=active[0];
      const cond=data.conditional?.[combo]?.[`${sk}_${sd}`];
      if (cond&&cond.n>=10) return cond.c3?.[key]??null;
    }
    const hits=[];
    for (const [sk,sd] of active) {
      const cond=data.conditional?.[combo]?.[`${sk}_${sd}`];
      if (cond?.n>=10&&cond.c3?.[key]!=null) hits.push({v:cond.c3[key],n:cond.n});
    }
    if (hits.length) { const tn=hits.reduce((s,x)=>s+x.n,0); return Math.round(hits.reduce((s,x)=>s+x.v*x.n,0)/tn*10)/10; }
    return data.probs?.[combo]?.c3?.[key]??null;
  };
  return combos.length===1 ? probForCombo(combos[0]) : weightedAvg(data, combos, probForCombo);
}
function lookupC3Bull(data, c1, c2, sel) {
  if (!data) return null;
  const combos = activeCombos(c1, c2);
  const active = Object.entries(sel);
  const c3BullForCombo = (combo) => {
    if (!active.length) return data.probs?.[combo]?.c3_bull??null;
    if (active.length===1) {
      const [sk,sd]=active[0];
      const cond=data.conditional?.[combo]?.[`${sk}_${sd}`];
      if (cond?.n>=10) return cond.c3?.c3_bull??null;
    }
    const hits=[];
    for (const [sk,sd] of active) {
      const cond=data.conditional?.[combo]?.[`${sk}_${sd}`];
      if (cond?.n>=10&&cond.c3?.c3_bull!=null) hits.push({v:cond.c3.c3_bull,n:cond.n});
    }
    if (hits.length) { const tn=hits.reduce((s,x)=>s+x.n,0); return Math.round(hits.reduce((s,x)=>s+x.v*x.n,0)/tn*10)/10; }
    return data.probs?.[combo]?.c3_bull??null;
  };
  return combos.length===1 ? c3BullForCombo(combos[0]) : weightedAvg(data, combos, c3BullForCombo);
}

// Merge raw MAE points across multiple combos, deduplicated by date
function getMaePoints(data, c1, c2, dow) {
  if (!data?.mae_points) return [];
  const combos = activeCombos(c1, c2);
  const key    = dow || "all";
  if (combos.length === 1) return data.mae_points[combos[0]]?.[key] ?? [];
  // merge + deduplicate by date, keep most recent N_POINTS
  const seen = new Set(), merged = [];
  for (const combo of combos) {
    for (const pt of (data.mae_points[combo]?.[key] ?? [])) {
      if (!seen.has(pt.date)) { seen.add(pt.date); merged.push(pt); }
    }
  }
  merged.sort((a,b) => b.date.localeCompare(a.date));
  return merged;
}

// Classification distribution: % of C3 matches in each day type for active combos
function getClsDist(data, c1, c2) {
  if (!data?.cls_dist) return null;
  const combos = activeCombos(c1, c2);
  const totals = {};
  let grand = 0;
  for (const combo of combos) {
    const cd = data.cls_dist[combo];
    if (!cd) continue;
    for (const cls of DAY_TYPES) {
      totals[cls] = (totals[cls] ?? 0) + (cd[cls]?.n ?? 0);
    }
    grand += cd.total ?? 0;
  }
  if (!grand) return null;
  return { dist: totals, total: grand };
}

// ── MAE/MFE PERCENTILE HELPERS ───────────────────────────────
function pct(arr, p) {
  if (!arr || !arr.length) return null;
  const s = [...arr].sort((a,b)=>a-b);
  const i = Math.floor(s.length * p / 100);
  return s[Math.min(i, s.length-1)];
}
function getMaeMfePercentiles(data, c1, c2, dow) {
  const pts = getMaePoints(data, c1, c2, dow || "all");
  if (!pts.length) return null;
  const maes = pts.map(p=>p.mae).filter(v=>v!=null);
  const mfes = pts.map(p=>p.mfe).filter(v=>v!=null);
  if (!maes.length || !mfes.length) return null;
  return {
    mae: { p30: pct(maes,30), p50: pct(maes,50), p70: pct(maes,70), p90: pct(maes,90) },
    mfe: { p30: pct(mfes,30), p50: pct(mfes,50), p70: pct(mfes,70), p90: pct(mfes,90) },
    n: pts.length,
  };
}

// ── CANDLE CHART ──────────────────────────────────────────────
function CandleChart({ c1Color, c2Color, c3Bull, sel, data, T, maePerc, instrument }) {
  const W=310,H=200,PAD={t:20,b:24,l:8,r:30};
  const chartH=H-PAD.t-PAD.b,chartW=W-PAD.l-PAD.r,colW=chartW/3,bodyW=colW*0.45;
  const c1Bull=c1Color==="bull",c2Bull=c2Color==="bull";
  const c3IsBull=c3Bull!=null?c3Bull>=50:c2Bull;
  const gp=(key,side)=>{const v=lookupProb(data,c1Color,c2Color,sel,key,side);return v!=null?v/100:null;};
  const c1={open:c1Bull?.35:.65,close:c1Bull?.65:.35,high:.78,low:.22};
  const c2HighUp=gp("c2_high_gt_c1_high","c2"),c2LowUp=gp("c2_low_gt_c1_low","c2"),c2OpenUp=gp("c2_open_gt_c1_close","c2");
  const c2_high=c1.high+((c2HighUp??(c2Bull?.6:.4))>.5?.07:-.07);
  const c2_low=c1.low+((c2LowUp??(c2Bull?.6:.4))>.5?.07:-.07);
  const c2_open=c1.close+((c2OpenUp??(c2Bull?.55:.45))>.5?.03:-.03);
  const c2_close=c2Bull?Math.min(c2_high-.02,c2_open+.20):Math.max(c2_low+.02,c2_open-.20);
  const c2={open:c2_open,close:c2_close,high:c2_high,low:c2_low};
  const c3HighUp=gp("c3_high_gt_c2_high","c3"),c3LowUp=gp("c3_low_gt_c2_low","c3");
  const c3_high=c2.high+((c3HighUp??(c3IsBull?.6:.4))>.5?.07:-.06);
  const c3_low=c2.low+((c3LowUp??(c3IsBull?.6:.4))>.5?.05:-.07);
  const c3_open=c2.close+(c3IsBull?.01:-.01);
  const c3_close=c3IsBull?Math.min(c3_high-.02,c3_open+.18):Math.max(c3_low+.02,c3_open-.18);
  const c3={open:c3_open,close:c3_close,high:c3_high,low:c3_low};
  const all=[c1,c2,c3].flatMap(c=>[c.open,c.close,c.high,c.low]);
  const minP=Math.min(...all)-.05,maxP=Math.max(...all)+.05;
  const sy=v=>PAD.t+chartH*(1-(v-minP)/(maxP-minP));
  const cx=i=>PAD.l+colW*i+colW/2;
  const c3Certain=c3Bull!=null&&Math.abs(c3Bull-50)>10;
  const candles=[{label:"C1",bull:c1Bull,...c1,certain:true},{label:"C2",bull:c2Bull,...c2,certain:true},{label:"C3",bull:c3IsBull,...c3,certain:c3Certain}];

  // MAE/MFE percentile boxes on C3 column — per bootcamp:
  //   C2 high (bull) / C2 low (bear) = anchor point
  //   C2 high → p30   = entry zone (very light, below normal)
  //   p30 → p50        = GREEN "drain box" — NORMAL expected zone (70% go here)
  //   p50 → p70        = RED — EXTENDED zone (50% go this far)
  //   p70 → p90        = GRAY — ANOMALY zone (30% reach here)
  //   applies to both MFE (favorable) and MAE (adverse) sides
  const maeMfeBoxes = (() => {
    if (!maePerc) return null;
    const { mae, mfe } = maePerc;
    if (mae.p30 == null || mae.p70 == null || mfe.p30 == null || mfe.p70 == null) return null;
    const x3   = cx(2);
    const boxW = bodyW * 2.4;
    const visRange = maxP - minP;
    const bpsToNorm = v => (v / 200) * visRange;
    // MFE boxes anchor from C2 HIGH — going upward
    const mfe30y = sy(c2.high + bpsToNorm(mfe.p30));
    const mfe50y = sy(c2.high + bpsToNorm(mfe.p50));
    const mfe70y = sy(c2.high + bpsToNorm(mfe.p70));
    const mfe90y = mfe.p90!=null ? sy(c2.high + bpsToNorm(mfe.p90)) : null;
    // MAE boxes anchor from C2 LOW — going downward
    const mae30y = sy(c2.low - bpsToNorm(mae.p30));
    const mae50y = sy(c2.low - bpsToNorm(mae.p50));
    const mae70y = sy(c2.low - bpsToNorm(mae.p70));
    const mae90y = mae.p90!=null ? sy(c2.low - bpsToNorm(mae.p90)) : null;
    // C2 reference lines
    const c2x    = cx(1);
    const c2HighY = sy(c2.high);
    const c2LowY  = sy(c2.low);
    return (
      <g>
        {/* C2 high reference line — MFE anchor */}
        <line x1={c2x} y1={c2HighY} x2={x3+boxW/2} y2={c2HighY}
          stroke="#4ade80" strokeWidth={0.5} strokeDasharray="3 2" opacity={0.5}/>
        {/* C2 low reference line — MAE anchor */}
        <line x1={c2x} y1={c2LowY} x2={x3+boxW/2} y2={c2LowY}
          stroke="#f87171" strokeWidth={0.5} strokeDasharray="3 2" opacity={0.5}/>

        {/* ── MFE (above C2 high) ─────────────────────────────────
            Hit-rate zones — closer to anchor = higher probability:
            anchor→p30 = 70% hit (darkest green)
            p30→p50    = 50% hit (medium)
            p50→p70    = 30% hit (fading yellow)
            p70→p90    = 10% hit (faint gray)  */}
        <rect x={x3-boxW/2} y={Math.min(c2HighY,mfe30y)} width={boxW}
          height={Math.abs(c2HighY-mfe30y)||1} fill="#4ade80" opacity={0.38}/>
        <rect x={x3-boxW/2} y={Math.min(mfe30y,mfe50y)} width={boxW}
          height={Math.abs(mfe50y-mfe30y)||1} fill="#4ade80" opacity={0.22}/>
        <rect x={x3-boxW/2} y={Math.min(mfe50y,mfe70y)} width={boxW}
          height={Math.abs(mfe70y-mfe50y)||1} fill="#fbbf24" opacity={0.18}/>
        {mfe90y!=null && <rect x={x3-boxW/2} y={Math.min(mfe70y,mfe90y)} width={boxW}
          height={Math.abs(mfe90y-mfe70y)||1} fill="#888888" opacity={0.12}/>}

        {/* P-level tick marks + labels on right edge */}
        <line x1={x3+boxW/2-3} y1={mfe30y} x2={x3+boxW/2+5} y2={mfe30y} stroke="#4ade80" strokeWidth={1.2} opacity={0.9}/>
        <text x={x3+boxW/2+7} y={mfe30y+3.5} fontSize={7} fill="#4ade80" opacity={0.8}>70%</text>
        <line x1={x3+boxW/2-3} y1={mfe50y} x2={x3+boxW/2+5} y2={mfe50y} stroke="#4ade80" strokeWidth={1.5} opacity={1}/>
        <text x={x3+boxW/2+7} y={mfe50y+3.5} fontSize={7} fill="#4ade80" fontWeight="bold">50%</text>
        <line x1={x3+boxW/2-3} y1={mfe70y} x2={x3+boxW/2+5} y2={mfe70y} stroke="#fbbf24" strokeWidth={1} opacity={0.8}/>
        <text x={x3+boxW/2+7} y={mfe70y+3.5} fontSize={7} fill="#fbbf24" opacity={0.8}>30%</text>
        {mfe90y!=null && <>
          <line x1={x3+boxW/2-3} y1={mfe90y} x2={x3+boxW/2+5} y2={mfe90y} stroke="#888" strokeWidth={1} opacity={0.7}/>
          <text x={x3+boxW/2+7} y={mfe90y+3.5} fontSize={7} fill="#888" opacity={0.7}>10%</text>
        </>}

        {/* ── MAE (below C2 low) ──────────────────────────────────
            Same hit-rate hierarchy, adverse side  */}
        <rect x={x3-boxW/2} y={Math.max(c2LowY,mae30y)} width={boxW}
          height={Math.abs(c2LowY-mae30y)||1} fill="#f87171" opacity={0.38}/>
        <rect x={x3-boxW/2} y={Math.min(mae30y,mae50y)} width={boxW}
          height={Math.abs(mae50y-mae30y)||1} fill="#f87171" opacity={0.22}/>
        <rect x={x3-boxW/2} y={Math.min(mae50y,mae70y)} width={boxW}
          height={Math.abs(mae70y-mae50y)||1} fill="#fbbf24" opacity={0.18}/>
        {mae90y!=null && <rect x={x3-boxW/2} y={Math.min(mae70y,mae90y)} width={boxW}
          height={Math.abs(mae90y-mae70y)||1} fill="#888888" opacity={0.12}/>}

        {/* P-level tick marks + labels on right edge */}
        <line x1={x3+boxW/2-3} y1={mae30y} x2={x3+boxW/2+5} y2={mae30y} stroke="#f87171" strokeWidth={1.2} opacity={0.9}/>
        <text x={x3+boxW/2+7} y={mae30y+3.5} fontSize={7} fill="#f87171" opacity={0.8}>70%</text>
        <line x1={x3+boxW/2-3} y1={mae50y} x2={x3+boxW/2+5} y2={mae50y} stroke="#f87171" strokeWidth={1.5} opacity={1}/>
        <text x={x3+boxW/2+7} y={mae50y+3.5} fontSize={7} fill="#f87171" fontWeight="bold">50%</text>
        <line x1={x3+boxW/2-3} y1={mae70y} x2={x3+boxW/2+5} y2={mae70y} stroke="#fbbf24" strokeWidth={1} opacity={0.8}/>
        <text x={x3+boxW/2+7} y={mae70y+3.5} fontSize={7} fill="#fbbf24" opacity={0.8}>30%</text>
        {mae90y!=null && <>
          <line x1={x3+boxW/2-3} y1={mae90y} x2={x3+boxW/2+5} y2={mae90y} stroke="#888" strokeWidth={1} opacity={0.7}/>
          <text x={x3+boxW/2+7} y={mae90y+3.5} fontSize={7} fill="#888" opacity={0.7}>10%</text>
        </>}
      </g>
    );
  })();

  return (
    <svg width={W} height={H} style={{display:"block",margin:"0 auto"}}>
      {[.25,.5,.75].map(f=><line key={f} x1={PAD.l} y1={PAD.t+chartH*f} x2={W-PAD.r} y2={PAD.t+chartH*f} stroke={T.gridLine} strokeWidth={1}/>)}
      {maeMfeBoxes}
      {candles.map(({label,bull,open,close,high,low,certain},i)=>{
        const color=bull?T.candleGreen:T.candleRed,x=cx(i);
        const yTop=Math.min(sy(open),sy(close)),yBot=Math.max(sy(open),sy(close));
        return(<g key={label} opacity={certain?1:.5}>
          <line x1={x} y1={sy(high)} x2={x} y2={sy(low)} stroke={color} strokeWidth={1.5} strokeDasharray={certain?undefined:"4 2"}/>
          <rect x={x-bodyW/2} y={yTop} width={bodyW} height={Math.max(2,yBot-yTop)} fill={color} rx={2} opacity={certain?.9:.55}/>
          <text x={x} y={H-6} textAnchor="middle" fontSize={9} fill={T.axisText} fontFamily="monospace">{label}</text>
        </g>);
      })}
      {c3Bull!=null&&<text x={cx(2)} y={PAD.t-6} textAnchor="middle" fontSize={9} fontWeight="bold" fontFamily="monospace"
        fill={c3Bull>=58?T.green:c3Bull<=42?T.red:T.yellow}>{c3Bull}% {c3IsBull?"▲":"▼"}</text>}
    </svg>
  );
}

// ── MAE/MFE READOUT PANEL ────────────────────────────────────
function MaeMfeReadout({ maePerc, instrument, c3Bull, T }) {
  if (!maePerc) return null;
  const { mae, mfe, n } = maePerc;
  if (mae.p50 == null || mfe.p50 == null) return null;
  const refPrice  = REF_PRICES[instrument] ?? 21000;
  const isBull    = c3Bull == null ? true : c3Bull >= 50;
  // bps → points (NQ: bps/10000*21000, ES: bps/10000*5800)
  const toPoints  = v => (v / 10000 * refPrice);
  const toStr     = v => refPrice >= 10000
    ? toPoints(v).toFixed(0)          // NQ: whole points
    : toPoints(v).toFixed(2);         // ES: two decimals
  const toPct     = v => (v / 100).toFixed(2) + "%";

  const GREEN = "#4ade80";
  const RED   = "#f87171";

  const Row = ({label, valBps, color, sign}) => {
    if (valBps == null || valBps === undefined) return null;
    const pts = toStr(valBps);
    const pct = toPct(valBps);
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"4px 0",borderBottom:`1px solid ${T.gridLine}`}}>
        <span style={{fontSize:9,color:T.textDim,letterSpacing:1,width:80}}>{label}</span>
        <span style={{fontSize:12,fontWeight:700,color,fontFamily:"monospace",letterSpacing:0.5}}>
          {sign}{pts} pts
        </span>
        <span style={{fontSize:10,color:T.textLabel,fontFamily:"monospace"}}>{pct}</span>
      </div>
    );
  };

  const upSign   = isBull ? "+" : "−";
  const downSign = isBull ? "−" : "+";

  return (
    <div style={{marginTop:10,paddingTop:8,borderTop:`1px solid ${T.gridLine}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:9,color:T.textHdr,letterSpacing:2}}>C3 FROM C2 HIGH/LOW · {n} SESSIONS</span>
        <span style={{fontSize:9,color:T.textDim}}>{instrument}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        {/* MFE — favorable side */}
        <div>
          <div style={{fontSize:8,color:T.textHdr,letterSpacing:2,marginBottom:3}}>ABOVE C2 HIGH (MFE)</div>
          <Row label="P30 · 70% HIT" valBps={mfe.p30} color={GREEN} sign={upSign}/>
          <Row label="P50 · MEDIAN ★" valBps={mfe.p50} color={GREEN} sign={upSign}/>
          <Row label="P70 · 30% HIT" valBps={mfe.p70} color={"#fbbf24"} sign={upSign}/>
          <Row label="P90 · 10% HIT" valBps={mfe.p90} color={"#888888"} sign={upSign}/>
        </div>
        {/* MAE — adverse side */}
        <div>
          <div style={{fontSize:8,color:T.textHdr,letterSpacing:2,marginBottom:3}}>BELOW C2 LOW (MAE)</div>
          <Row label="P30 · 70% HIT" valBps={mae.p30} color={RED}   sign={downSign}/>
          <Row label="P50 · MEDIAN ★" valBps={mae.p50} color={RED}   sign={downSign}/>
          <Row label="P70 · 30% HIT" valBps={mae.p70} color={"#fbbf24"} sign={downSign}/>
          <Row label="P90 · 10% HIT" valBps={mae.p90} color={"#888888"} sign={downSign}/>
        </div>
      </div>
    </div>
  );
}

function PillRow({leftLabel,rightLabel,abovePct,selected,onSelect,basePct,showDelta,readOnly,T}) {

        <Pill label="Below" pct={belowPct} selected={selected==="below"} readOnly={readOnly} T={T} onClick={()=>onSelect(selected==="below"?null:"below")}/>

// ── MAE/MFE DOW SCATTER ───────────────────────────────────────
const CLS_COLORS = { Range1:"#60a5fa", DWP:"#34d399", DNP:"#f59e0b", Range2:"#f87171" };

function MaeMfeDowChart({ data, c1, c2, T }) {
  const [hoveredPt, setHoveredPt] = useState(null);

  // Collect ALL points (dow="all"), then fan them out by DOW column
  const allPoints = useMemo(() => getMaePoints(data, c1, c2, "all"), [data, c1, c2]);

  // Group by DOW
  const byDow = useMemo(() => {
    const groups = {};
    for (const d of DOW_LABELS) groups[d] = [];
    for (const pt of allPoints) {
      const name = DOW_NUM_MAP[pt.dow];
      if (name) groups[name].push(pt);
    }
    return groups;
  }, [allPoints]);

  const hasDir = c1 || c2;

  // Chart dimensions
  const W   = 340;
  const H   = 240;
  const PAD = { t:18, b:28, l:42, r:12 };
  const chartW = W - PAD.l - PAD.r;
  const chartH = H - PAD.t - PAD.b;

  // Compute max for axis
  const allMae = allPoints.map(p=>p.mae).filter(v=>v!=null);
  const allMfe = allPoints.map(p=>p.mfe).filter(v=>v!=null);
  const maxVal = Math.max(...allMae, ...allMfe, 0.1) * 1.1;

  const scaleY = v => PAD.t + chartH * (1 - Math.min(v, maxVal) / maxVal);
  const colW   = chartW / 5;

  // Per-DOW extremity lines: max MAE and max MFE
  const extremes = useMemo(() => {
    const result = {};
    for (const dow of DOW_LABELS) {
      const pts = byDow[dow];
      if (!pts.length) { result[dow] = null; continue; }
      result[dow] = {
        maeMax: Math.max(...pts.map(p=>p.mae)),
        mfeMax: Math.max(...pts.map(p=>p.mfe)),
        maeP90: pts.map(p=>p.mae).sort((a,b)=>a-b)[Math.floor(pts.length*.9)] ?? 0,
        mfeP90: pts.map(p=>p.mfe).sort((a,b)=>a-b)[Math.floor(pts.length*.9)] ?? 0,
      };
    }
    return result;
  }, [byDow]);

  // Y-axis ticks
  const yTicks = useMemo(() => {
    const step = maxVal > 4 ? 1 : maxVal > 2 ? 0.5 : 0.25;
    const ticks = [];
    for (let v = 0; v <= maxVal; v += step) ticks.push(parseFloat(v.toFixed(2)));
    return ticks;
  }, [maxVal]);

  if (!hasDir) {
    return (
      <div style={{background:T.bgCard,border:`1px solid ${T.borderCard}`,borderRadius:10,padding:"14px",marginBottom:18}}>
        <div style={{fontSize:9,color:T.textHdr,letterSpacing:2,marginBottom:8}}>MAE / MFE BY DAY OF WEEK — LAST 50 C3 MATCHES</div>
        <div style={{fontSize:10,color:T.textDim,textAlign:"center",padding:"24px 0"}}>Select C1 or C2 direction</div>
      </div>
    );
  }

  if (!allPoints.length) {
    return (
      <div style={{background:T.bgCard,border:`1px solid ${T.borderCard}`,borderRadius:10,padding:"14px",marginBottom:18}}>
        <div style={{fontSize:9,color:T.textHdr,letterSpacing:2,marginBottom:8}}>MAE / MFE BY DAY OF WEEK — LAST 50 C3 MATCHES</div>
        <div style={{fontSize:10,color:T.textDim,textAlign:"center",padding:"24px 0"}}>No data — run build_probs.py (v4)</div>
      </div>
    );
  }

  return (
    <div style={{background:T.bgCard,border:`1px solid ${T.borderCard}`,borderRadius:10,padding:"12px 14px",marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:9,color:T.textHdr,letterSpacing:2}}>MAE / MFE BY DAY OF WEEK — LAST 50 C3 MATCHES</div>
        <div style={{fontSize:9,color:T.textDim}}>{allPoints.length} pts</div>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:14,marginBottom:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:10,height:2,background:T.red,borderRadius:1}}/>
          <span style={{fontSize:9,color:T.textDim}}>MAE (adverse)</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:10,height:2,background:T.green,borderRadius:1}}/>
          <span style={{fontSize:9,color:T.textDim}}>MFE (favorable)</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:10,height:2,background:T.textDim,borderRadius:1,borderTop:`1px dashed ${T.textDim}`}}/>
          <span style={{fontSize:9,color:T.textDim}}>p90 extremity</span>
        </div>
        {Object.entries(CLS_COLORS).map(([cls,col])=>(
          <div key={cls} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:col}}/>
            <span style={{fontSize:9,color:T.textDim}}>{DAY_META[cls].label}</span>
          </div>
        ))}
      </div>

      {/* SVG chart */}
      <div style={{overflowX:"auto"}}>
        <svg width={W} height={H} style={{display:"block",fontFamily:"monospace"}}>
          {/* grid lines */}
          {yTicks.map(v=>(
            <g key={v}>
              <line x1={PAD.l} y1={scaleY(v)} x2={W-PAD.r} y2={scaleY(v)} stroke={T.gridLine} strokeWidth={1}/>
              <text x={PAD.l-4} y={scaleY(v)+3.5} textAnchor="end" fontSize={8} fill={T.axisText}>{v}</text>
            </g>
          ))}

          {/* DOW columns */}
          {DOW_LABELS.map((dow, di) => {
            const pts  = byDow[dow];
            const ext  = extremes[dow];
            const cx   = PAD.l + di * colW + colW / 2;
            const jitter = (i, total) => (total <= 1 ? 0 : ((i / (total-1)) - 0.5) * colW * 0.7);

            return (
              <g key={dow}>
                {/* column label */}
                <text x={cx} y={H - 6} textAnchor="middle" fontSize={9} fill={T.axisText}>{dow}</text>
                {/* column separator */}
                {di > 0 && <line x1={PAD.l + di*colW} y1={PAD.t} x2={PAD.l + di*colW} y2={H-PAD.b} stroke={T.border} strokeWidth={1} strokeDasharray="3 3"/>}

                {/* p90 extremity lines */}
                {ext && <>
                  <line x1={cx - colW*.35} x2={cx + colW*.35} y1={scaleY(ext.maeP90)} y2={scaleY(ext.maeP90)}
                    stroke={T.red} strokeWidth={1.5} strokeDasharray="4 2" opacity={0.8}/>
                  <line x1={cx - colW*.35} x2={cx + colW*.35} y1={scaleY(ext.mfeP90)} y2={scaleY(ext.mfeP90)}
                    stroke={T.green} strokeWidth={1.5} strokeDasharray="4 2" opacity={0.8}/>
                </>}

                {/* scatter dots */}
                {pts.map((pt, i) => {
                  const jx  = jitter(i, pts.length);
                  const clsColor = CLS_COLORS[pt.cls] ?? T.textDim;
                  const isHov = hoveredPt === pt;
                  return (
                    <g key={pt.date + i}>
                      {/* MAE dot — circle, colored by classification */}
                      <circle
                        cx={cx + jx} cy={scaleY(pt.mae)} r={isHov ? 5 : 3}
                        fill={clsColor} fillOpacity={isHov ? 1 : 0.7}
                        stroke={T.red} strokeWidth={isHov ? 1.5 : 0.5}
                        style={{cursor:"pointer",transition:"r 0.1s"}}
                        onMouseEnter={() => setHoveredPt(pt)}
                        onMouseLeave={() => setHoveredPt(null)}
                      />
                      {/* MFE dot — diamond (rotated square), colored by classification */}
                      <rect
                        x={cx + jx - (isHov?4:2.5)} y={scaleY(pt.mfe) - (isHov?4:2.5)}
                        width={isHov?8:5} height={isHov?8:5}
                        fill={clsColor} fillOpacity={isHov ? 1 : 0.7}
                        stroke={T.green} strokeWidth={isHov ? 1.5 : 0.5}
                        transform={`rotate(45 ${cx+jx} ${scaleY(pt.mfe)})`}
                        style={{cursor:"pointer",transition:"width 0.1s,height 0.1s"}}
                        onMouseEnter={() => setHoveredPt(pt)}
                        onMouseLeave={() => setHoveredPt(null)}
                      />
                      {/* vertical connector line */}
                      <line x1={cx+jx} y1={scaleY(pt.mae)} x2={cx+jx} y2={scaleY(pt.mfe)}
                        stroke={clsColor} strokeWidth={0.5} strokeOpacity={0.25}/>
                    </g>
                  );
                })}
              </g>
            );
          })}

          {/* Y-axis label */}
          <text x={10} y={H/2} textAnchor="middle" fontSize={8} fill={T.axisText}
            transform={`rotate(-90 10 ${H/2})`}>bp</text>
        </svg>
      </div>

      {/* Tooltip */}
      {hoveredPt && (
        <div style={{marginTop:8,padding:"7px 10px",background:T.bgPill,border:`1px solid ${T.border}`,borderRadius:7,fontSize:10}}>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <span style={{color:T.textDim}}>{hoveredPt.date}</span>
            <span style={{color:T.textDim}}>{DOW_NUM_MAP[hoveredPt.dow] ?? hoveredPt.dow}</span>
            <span style={{color:CLS_COLORS[hoveredPt.cls]??T.text}}>{DAY_META[hoveredPt.cls]?.label ?? hoveredPt.cls}</span>
            <span style={{color:hoveredPt.bull?T.green:T.red}}>{hoveredPt.bull?"Bull":"Bear"}</span>
            <span>MAE <strong style={{color:T.red}}>{hoveredPt.mae?.toFixed(3)} bp</strong></span>
            <span>MFE <strong style={{color:T.green}}>{hoveredPt.mfe?.toFixed(3)} bp</strong></span>
          </div>
        </div>
      )}

      {/* Per-DOW extremity summary table */}
      <div style={{marginTop:12,borderTop:`1px solid ${T.border}`,paddingTop:10}}>
        <div style={{fontSize:9,color:T.textHdr,letterSpacing:1,marginBottom:7}}>P90 EXTREMITIES</div>
        <div style={{display:"grid",gridTemplateColumns:`repeat(5,1fr)`,gap:4}}>
          {DOW_LABELS.map(dow => {
            const ext = extremes[dow];
            const n   = byDow[dow].length;
            return (
              <div key={dow} style={{background:T.bgPill,borderRadius:7,padding:"7px 8px"}}>
                <div style={{fontSize:10,fontWeight:700,color:T.text,marginBottom:4}}>{dow}</div>
                <div style={{fontSize:9,color:T.textDim,marginBottom:2}}>{n} pts</div>
                {ext ? (
                  <>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:1}}>
                      <span style={{fontSize:9,color:T.red}}>MAE</span>
                      <span style={{fontSize:10,fontWeight:700,color:T.red}}>{ext.maeP90.toFixed(2)}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:9,color:T.green}}>MFE</span>
                      <span style={{fontSize:10,fontWeight:700,color:T.green}}>{ext.mfeP90.toFixed(2)}</span>
                    </div>
                    <div style={{marginTop:4,fontSize:9,color:T.textDim,textAlign:"right"}}>
                      R {ext.mfeP90>0&&ext.maeP90>0?(ext.mfeP90/ext.maeP90).toFixed(2):"—"}
                    </div>
                  </>
                ) : <span style={{fontSize:9,color:T.textDim}}>—</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const INSTRUMENTS = ["NQ","ES"];
const REF_PRICES  = { NQ: 21000, ES: 5800 };
const INIT = { c1:null, c2:null, sel:{} };

// ─────────────────────────────────────────────────────────────────────────────
// SHARED: 15-min histogram bar chart (used by all panels)
// ─────────────────────────────────────────────────────────────────────────────
function MiniHist({ rows, color="#4ecdc4", height=60, label="", T={text:"#fff",textDim:"#666"} }) {
  if (!rows || rows.length === 0) return (
    <div style={{height,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontSize:10,color:T.textDim}}>no data</span>
    </div>
  );
  const sorted = [...rows].sort((a,b)=>a.t<b.t?-1:1);
  const total = sorted.reduce((s,r)=>s+r.n, 0);
  const maxN  = Math.max(...sorted.map(r=>r.n), 1);
  let modeT = sorted.reduce((a,b)=>b.n>a.n?b:a, sorted[0]).t;
  let cum=0, medianT=sorted[0].t;
  for (const r of sorted) { cum+=r.n; if(cum>=total/2){medianT=r.t;break;} }
  return (
    <div>
      <div style={{display:"flex",gap:16,marginBottom:6,fontSize:10,color:T.textMuted??"#aaa"}}>
        <span>MODE <span style={{color:T.text,fontWeight:700}}>{modeT}</span></span>
        <span>MEDIAN <span style={{color:T.text,fontWeight:700}}>{medianT}</span></span>
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:1,height}}>
        {sorted.map((r,i)=>{
          const barH = Math.max(Math.round((r.n/maxN)*(height-2)), r.n>0?2:0);
          const isMode   = r.t===modeT;
          const isMedian = r.t===medianT && r.t!==modeT;
          return (
            <div key={i} style={{
              flex:1, height:barH, alignSelf:"flex-end",
              background: isMode?"#ffffff": isMedian?"rgba(255,255,255,0.45)":color,
              borderRadius:"2px 2px 0 0",
            }} title={`${r.t} — ${r.n} (${(r.n/total*100).toFixed(1)}%)`}/>
          );
        })}
      </div>
      {label && <div style={{fontSize:9,color:T.textDim,marginTop:3,textAlign:"center"}}>{label}</div>}
    </div>
  );
}

// Range distribution histogram (x-axis in pct buckets, both negative and positive)
function RangeDist({ rows, color, height=80, title="", T={text:"#fff",textMuted:"#aaa",textDim:"#666"} }) {
  if (!rows || rows.length===0) return null;
  const sorted=[...rows].sort((a,b)=>a.x-b.x);
  const maxPct = Math.max(...sorted.map(r=>r.pct),1);
  // Fix: find FIRST occurrence of maximum (not last, which biases toward 0)
  let modeEntry = sorted[0];
  for (const r of sorted) { if (r.pct > modeEntry.pct) modeEntry = r; }
  const modeX = modeEntry.x;
  // Fix: use actual total for median threshold (handles rounding in pct values)
  const totalPct = sorted.reduce((s,r)=>s+r.pct, 0);
  let cum=0, medX=sorted[0].x;
  for(const r of sorted){cum+=r.pct;if(cum>=totalPct/2){medX=r.x;break;}}
  // Format x value with sign and 2 decimals (values are % from 9:30 open)
  const fmtX = x => {
    if (x == null || isNaN(x)) return "—";
    const s = x.toFixed(2);
    return (x > 0 ? "+" : "") + s + "%";
  };
  return (
    <div>
      <div style={{display:"flex",gap:16,marginBottom:6,fontSize:10,color:T.textMuted??T.textHdr}}>
        {title && <span style={{color:T.text,fontWeight:700}}>{title}</span>}
        <span>MODE <span style={{color:T.text,fontWeight:700}}>{fmtX(modeX)}</span></span>
        <span>MEDIAN <span style={{color:T.text,fontWeight:700}}>{fmtX(medX)}</span></span>
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:1,height}}>
        {sorted.map((r,i)=>(
          <div key={i} style={{
            flex:1, alignSelf:"flex-end",
            height:Math.max(Math.round((r.pct/maxPct)*(height-2)),r.pct>0?2:0),
            background: r.x===modeX?"#ffffff": r.x===medX?"rgba(255,255,255,0.45)":color,
            borderRadius:"2px 2px 0 0",
          }} title={`${fmtX(r.x)} — ${r.pct.toFixed(1)}% of sessions`}/>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.textDim,marginTop:3}}>
        <span>{fmtX(sorted[0]?.x)}</span>
        <span style={{fontSize:8,opacity:0.5}}>Δ from 9:30 open · {sorted.length} buckets</span>
        <span>{fmtX(sorted[sorted.length-1]?.x)}</span>
      </div>
      {Math.abs(modeX) < 0.05 && sorted.length < 5 && (
        <div style={{fontSize:8,color:"#fbbf24",marginTop:3}}>⚠ Rebuild JSON — old data uses coarse 0.5% buckets (mode appears at 0%)</div>
      )}
    </div>
  );
}

                <Btn active={f.dir===true  && f.sess===false} color="#4ecdc4" label="L·F"
                  onClick={()=>{ toggleSvF(key,"dir",true);  toggleSvF(key,"sess",false); }}/>
                <Btn active={f.dir===false && f.sess===true}  color="#ff6b6b" label="S·T"
                  onClick={()=>{ toggleSvF(key,"dir",false); toggleSvF(key,"sess",true);  }}/>
                <Btn active={f.dir===false && f.sess===false} color="#ff6b6b" label="S·F"

}


function SessionVarsPanel({ data, T, dow, svFilters, SESS_KEYS }) {
  const svRaw = data?.session_vars;
  if (!svRaw) return null;

  const svBase = (dow && dow !== "all" && svRaw.by_dow?.[dow]) ? svRaw.by_dow[dow] : svRaw;
  const combos = svRaw.combos || [];
  const hasNew = svBase.asia || svBase.lon || svBase.ny1;
  if (!hasNew) return (
    <div>
      <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:8}}>PROFILER SESSIONS</div>
      <div style={{fontSize:12,color:T.textMuted,padding:14,background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6}}>
        ⚠️ Run <code style={{color:T.yellow}}>python3 build_probs.py</code> to generate session data
      </div>
    </div>
  );

  const hasAnyFilter = svFilters && SESS_KEYS.some(k =>
    svFilters[k].dir!==null || svFilters[k].sess!==null || svFilters[k].broken!==null
  );

  const getFilteredStats = (targetSess) => {
    const base = svBase[targetSess] || {};
    if (!combos || combos.length === 0 || !hasAnyFilter) {
      return { long_pct: base.long_pct||0, true_pct: base.true_pct||0,
               broken_pct: base.broken_pct||0, n: base.n||0,
               false_times: base.false_times||[], broken_times: base.broken_times||[] };
    }
    let filtered = combos;
    for (const sk of SESS_KEYS) {
      if (sk === targetSess) continue;
      const f = svFilters[sk];
      if (f.dir    !== null) filtered = filtered.filter(r => Boolean(r[sk+"_long"])   == f.dir);
      if (f.sess   !== null) filtered = filtered.filter(r => Boolean(r[sk+"_true"])   == f.sess);
      if (f.broken !== null) filtered = filtered.filter(r => Boolean(r[sk+"_broken"]) == f.broken);
    }
    if (filtered.length === 0) return { long_pct:0, true_pct:0, broken_pct:0, n:0, false_times:[], broken_times:[] };
    const n     = filtered.reduce((s,r) => s+r.n, 0);
    const longN = filtered.filter(r => r[targetSess+"_long"]   === true).reduce((s,r) => s+r.n, 0);
    const trueN = filtered.filter(r => r[targetSess+"_true"]   === true).reduce((s,r) => s+r.n, 0);
    const brkN  = filtered.filter(r => r[targetSess+"_broken"] === true).reduce((s,r) => s+r.n, 0);
    const tf = svFilters[targetSess] || {};
    return {
      long_pct:   n>0 ? Math.round(longN/n*1000)/10 : 0,
      true_pct:   n>0 ? Math.round(trueN/n*1000)/10 : 0,
      broken_pct: n>0 ? Math.round(brkN /n*1000)/10 : 0,
      n,
      false_times:  (tf.sess===false || !hasAnyFilter) ? (base.false_times||[])  : [],
      broken_times: (tf.broken===true || !hasAnyFilter) ? (base.broken_times||[]) : [],
    };
  };

  const SESS = [
    { key:"asia", label:"Asia",   time:"18:00–02:30", color:"#f6c90e" },
    { key:"lon",  label:"London", time:"02:30–07:30", color:"#ff6b6b" },
    { key:"ny1",  label:"NY1",    time:"07:30–11:30", color:"#4ecdc4" },
    { key:"ny2",  label:"NY2",    time:"11:30–16:15", color:"#a29bfe" },
  ];

  const StatBar = ({pct, leftColor, rightColor, leftLabel, rightLabel}) => (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",borderRadius:4,overflow:"hidden",height:10}}>
        <div style={{width:`${pct}%`, background:leftColor, transition:"width 0.3s"}}/>
        <div style={{flex:1, background:rightColor}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:3}}>
        <span style={{color:leftColor,fontWeight:700}}>{pct.toFixed(1)}% {leftLabel}</span>
        <span style={{color:rightColor,fontWeight:700}}>{(100-pct).toFixed(1)}% {rightLabel}</span>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:14}}>
        <span style={{fontSize:14,fontWeight:700,color:T.text}}>PROFILER SESSIONS</span>
        {dow && dow!=="all" && <span style={{fontSize:12,color:"#ffe066",fontWeight:600}}>· {dow}</span>}
      </div>
      {SESS.map(({key, label, time, color}) => {
        const stats = getFilteredStats(key);
        if (!stats) return null;
        return (
          <div key={key} style={{marginBottom:14, background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8, padding:16}}>
            <div style={{marginBottom:14}}>
              <span style={{fontSize:20,fontWeight:700,color}}>{label}</span>
              <span style={{fontSize:11,color:T.textMuted,marginLeft:10}}>{time} EST · N={stats.n}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"200px 1fr 1fr",gap:16}}>
              <div>
                <StatBar pct={stats.long_pct}   leftColor="#4ecdc4" rightColor="#ff6b6b" leftLabel="Long"   rightLabel="Short"/>
                <StatBar pct={stats.true_pct}   leftColor="#4ecdc4" rightColor="#ff6b6b" leftLabel="True"   rightLabel="False"/>
                <div>
                  <div style={{fontSize:11,color:T.textMuted,marginBottom:4}}>Broken</div>
                  <div style={{display:"flex",borderRadius:4,overflow:"hidden",height:10}}>
                    <div style={{width:`${stats.broken_pct}%`, background:"#f87171", transition:"width 0.3s"}}/>
                    <div style={{flex:1, background:"#333"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:3}}>
                    <span style={{color:"#f87171",fontWeight:700}}>{stats.broken_pct.toFixed(1)}% Broken</span>
                    <span style={{color:"#4ecdc4",fontWeight:700}}>{(100-stats.broken_pct).toFixed(1)}% Held</span>
                  </div>
                </div>
              </div>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:10}}>FALSE TIMES</div>
                {stats.false_times.length > 0
                  ? <MiniHist rows={stats.false_times} color={color} height={85} T={T}/>
                  : <div style={{fontSize:11,color:T.textDim,paddingTop:24,textAlign:"center"}}>
                      {combos.length===0 ? "rebuild JSON" : "select S·F above to show"}
                    </div>
                }
              </div>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:10}}>BROKEN TIMES</div>
                {stats.broken_times.length > 0
                  ? <MiniHist rows={stats.broken_times} color={color} height={85} T={T}/>
                  : <div style={{fontSize:11,color:T.textDim,paddingTop:24,textAlign:"center"}}>
                      {combos.length===0 ? "rebuild JSON" : "select BROKEN YES above to show"}
                    </div>
                }
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}


// ─────────────────────────────────────────────────────────────
// HOD / LOD TIMING PANEL — dual chart spanning full 18:00–16:45 day
// Green bars above center = when HOD is put in
// Red bars below center   = when LOD is put in
// White bar = mode, dotted vertical = median
// ─────────────────────────────────────────────────────────────
function HodLodDualChart({ hodRows, lodRows, hodMode, hodMedian, lodMode, lodMedian, T, height = 130 }) {
  if (!hodRows?.length && !lodRows?.length) return null;
  const allTs = [...new Set([...(hodRows||[]).map(r=>r.t), ...(lodRows||[]).map(r=>r.t)])].sort();
  if (!allTs.length) return null;
  const hiMap = Object.fromEntries((hodRows||[]).map(r=>[r.t,r.n]));
  const loMap = Object.fromEntries((lodRows||[]).map(r=>[r.t,r.n]));
  const maxN  = Math.max(...allTs.map(t=>Math.max(hiMap[t]||0,loMap[t]||0)),1);
  const barW  = Math.max(3, Math.floor(560 / allTs.length));
  const halfH = Math.floor(height / 2) - 4;
  const W     = barW * allTs.length + 2;

  // Label every ~2hr = every 8 bars
  const labelInterval = Math.max(4, Math.floor(allTs.length / 12));

  const vlines = [
    hodMode   && { t: hodMode,   color:"#4ade80",   dash:"none" },
    hodMedian && { t: hodMedian, color:"#4ade8055", dash:"5 3" },
    lodMode   && { t: lodMode,   color:"#f87171",   dash:"none" },
    lodMedian && { t: lodMedian, color:"#f8717155", dash:"5 3" },
  ].filter(Boolean);

  return (
    <div style={{overflowX:"auto"}}>
      <svg width={W} height={height + 20} style={{display:"block", fontFamily:"monospace"}}>
        {/* Center line */}
        <line x1={0} y1={halfH+4} x2={W} y2={halfH+4} stroke={T.border} strokeWidth={1}/>
        {/* Session boundary hints — 09:30 */}
        {(() => {
          const ix = allTs.indexOf("09:30");
          if (ix < 0) return null;
          return <line x1={ix*barW+barW/2} y1={4} x2={ix*barW+barW/2} y2={height}
            stroke="#ffe06633" strokeWidth={1} strokeDasharray="2 3"/>;
        })()}
        {/* Vertical mode/median lines */}
        {vlines.map(({t,color,dash},i) => {
          const ix = allTs.indexOf(t);
          if (ix < 0) return null;
          return <line key={i} x1={ix*barW+barW/2} y1={4} x2={ix*barW+barW/2} y2={height}
            stroke={color} strokeWidth={1.5} strokeDasharray={dash}/>;
        })}
        {/* Bars */}
        {allTs.map((t,i) => {
          const hiN = hiMap[t]||0, loN = loMap[t]||0;
          const hiH = hiN ? Math.max(2, Math.round(hiN/maxN*halfH)) : 0;
          const loH = loN ? Math.max(2, Math.round(loN/maxN*halfH)) : 0;
          const x = i*barW+1, cy = halfH+4;
          const hiMode = t===hodMode, loMode = t===lodMode;
          return (
            <g key={t}>
              {hiN>0 && <rect x={x} y={cy-hiH} width={barW-1} height={hiH}
                fill={hiMode?"#ffffff":"#4ade80"} fillOpacity={hiMode?1:0.7}/>}
              {loN>0 && <rect x={x} y={cy} width={barW-1} height={loH}
                fill={loMode?"#ffffff":"#f87171"} fillOpacity={loMode?1:0.7}/>}
            </g>
          );
        })}
        {/* X axis labels */}
        {allTs.map((t,i) => {
          if (i % labelInterval !== 0) return null;
          return <text key={t} x={i*barW+barW/2} y={height+14}
            textAnchor="middle" fontSize={7} fill={T.axisText}>{t}</text>;
        })}
      </svg>
    </div>
  );
}

function HodLodPanel({ data, T, dow, svFilters }) {
  const hl = data?.hod_lod;
  if (!hl) return null;
  if (!hl.hod_hist?.length) return (
    <div>
      <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:8}}>HIGH AND LOW OF DAY TIMES</div>
      <div style={{fontSize:12,color:T.textMuted,padding:14,background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6}}>
        ⚠️ Run <code style={{color:T.yellow}}>python3 build_probs.py</code> to generate this data
      </div>
    </div>
  );

  const hasF = svFilters && Object.values(svFilters).some(f =>
    f.dir!==null || f.sess!==null || f.broken!==null
  );

  const applyF = (byCombo, base) => {
    if (!hasF || !byCombo?.length) return base;
    const rows = byCombo.filter(r =>
      (svFilters.asia.dir  ===null || Boolean(r.asia_long) == svFilters.asia.dir)   &&
      (svFilters.asia.sess ===null || Boolean(r.asia_true) == svFilters.asia.sess)  &&
      (svFilters.lon.dir   ===null || Boolean(r.lon_long)  == svFilters.lon.dir)    &&
      (svFilters.lon.sess  ===null || Boolean(r.lon_true)  == svFilters.lon.sess)
    );
    const map={}; rows.forEach(r=>{ if(r.t) map[r.t]=(map[r.t]||0)+r.n; });
    return Object.entries(map).sort().map(([t,n])=>({t,n}));
  };

  const hodRows = applyF(hl.hod_by_sv, hl.hod_hist);
  const lodRows = applyF(hl.lod_by_sv, hl.lod_hist);

  // Recompute mode/median after filter
  const modeMedian = rows => {
    if (!rows?.length) return [null, null];
    const mode = rows.reduce((m,r) => r.n > (m.n||0) ? r : m, {}).t || null;
    const total = rows.reduce((s,r)=>s+r.n, 0);
    let cum = 0, median = rows[0]?.t || null;
    for (const r of rows) { cum += r.n; if (cum >= total/2) { median = r.t; break; } }
    return [mode, median];
  };
  const [hodMode, hodMedian] = modeMedian(hodRows);
  const [lodMode, lodMedian] = modeMedian(lodRows);

  return (
    <div>
      <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
        <span style={{fontSize:14,fontWeight:700,color:T.text}}>HIGH AND LOW OF DAY TIMES</span>
        {dow&&dow!=="all"&&<span style={{fontSize:12,color:"#ffe066",fontWeight:600}}>· {dow}</span>}
        {hasF && <span style={{fontSize:10,color:T.textDim}}>— filtered by session controls above</span>}
      </div>
      {/* Mode/Median summary */}
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
        <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:6, padding:"8px 12px"}}>
          <div style={{fontSize:9, color:"#4ecdc4", letterSpacing:1, marginBottom:3}}>HIGH OF DAY</div>
          <div style={{fontSize:10, color:T.textMuted}}>
            MODE <strong style={{color:"#4ade80", fontSize:12}}>{hodMode||"—"}</strong>

// P12 LEVELS PANEL — hit rate + when each P12 level is hit
// Matches "P12 Levels" section in profiler daily_levels page
// ─────────────────────────────────────────────────────────────────────────────
function P12Panel({ data, T }) {
  const p12 = data?.p12;
  if (!p12) return null;
  if (!p12.p12_hi) return (
    <div>
      <div style={{fontSize:11,fontWeight:700,marginBottom:8,color:T.textMuted,letterSpacing:1}}>P12 LEVELS · PRIOR 12-HOUR SESSION</div>
    <div style={{fontSize:10,color:"#888",padding:"12px",background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6}}>
      ⚠️ Run <code>python3 build_probs.py</code> to generate this data
    </div>
    </div>
  );

  const levels = [
    { key:"p12_hi",  label:"P12 High",  color:"#4ecdc4" },
    { key:"p12_mid", label:"P12 Mid",   color:"#888" },
    { key:"p12_lo",  label:"P12 Low",   color:"#ff6b6b" },
    { key:"prev_hi", label:"Prev High", color:"#4ecdc4", dim:true },
    { key:"prev_mid",label:"Prev Mid",  color:"#888",    dim:true },
    { key:"prev_lo", label:"Prev Low",  color:"#ff6b6b", dim:true },
  ];

  return (
    <div>
      <div style={{fontSize:14,fontWeight:700,marginBottom:14,color:T.text,letterSpacing:0.5}}>
        P12 LEVELS · PRIOR 12-HOUR SESSION
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        {levels.map(({key,label,color,dim}) => {
          const lv = p12[key];
          if (!lv) return null;
          return (
            <div key={key} style={{
              background:T.cardBg,
              border:`1px solid ${dim?"#2a2a2a":T.border}`,
              borderRadius:6,padding:"10px 12px",
              opacity: dim ? 0.75 : 1,
            }}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                <span style={{fontSize:11,fontWeight:700,color:T.text,letterSpacing:0.5}}>{label}</span>
                <span style={{fontSize:18,fontWeight:700,color}}>{lv.hit_rate}%</span>
              </div>
              <div style={{fontSize:11,color:T.textMuted,marginBottom:8}}>
                MODE {lv.mode||"—"} · MEDIAN {lv.median||"—"}
              </div>
              <MiniHist rows={lv.hist} color={color} height={50} T={T}/>
            </div>
          );
        })}
      </div>

      {/* P12 SCENARIOS */}
      {p12.scenarios?.length > 0 && (() => {
        const SC_INFO = {
          "1_bull": { label:"S1 Bull", color:"#4ade80",
            desc:"Bounced P12 mid → accepted above P12 hi by 9:00  (bullish open, low likely in)" },
          "1_bear": { label:"S1 Bear", color:"#f87171",
            desc:"Bounced P12 mid → accepted below P12 lo by 9:00  (bearish open, high likely in)" },
          "2_bull": { label:"S2 Bull", color:"#4ade80",
            desc:"Traded below P12 lo → reversed back above P12 mid (Carl Hungus ↑ — lowest probability)" },
          "2_bear": { label:"S2 Bear", color:"#f87171",
            desc:"Traded above P12 hi → reversed back below P12 mid (Carl Hungus ↓ — lowest probability)" },
          "3_bull": { label:"S3 Bull", color:"#4ade80",
            desc:"Rejected P12 hi → found footing on P12 mid → continued up (trend continuation)" },
          "3_bear": { label:"S3 Bear", color:"#f87171",
            desc:"Rejected P12 lo → found footing on P12 mid → continued down (trend continuation)" },
          "4_bull": { label:"S4 Bull", color:"#4ecdc4",
            desc:"Entire 06–09 range above P12 hi — strong bull trend running into open" },
          "4_bear": { label:"S4 Bear", color:"#4ecdc4",
            desc:"Entire 06–09 range below P12 lo — strong bear trend running into open" },
          "5a":     { label:"S5a",     color:"#ffe066",
            desc:"Swiped all P12 levels (big overnight range) → RTH likely a range / distribution day" },
          "5b":     { label:"S5b",     color:"#a29bfe",
            desc:"Stayed within P12 range, ping-ponging mid → shallow MAE or check-mark expected in RTH" },
          "other":  { label:"Other",   color:"#555",  desc:"Pattern did not match a canonical scenario" },
        };
        const CLS_COLORS = {Range1:"#4ecdc4", DWP:"#f6c90e", DNP:"#4ade80", Range2:"#a29bfe"};
        const sorted = [...p12.scenarios].sort((a,b) => b.n - a.n);
        return (
          <div style={{marginTop:18}}>
            <div style={{fontSize:11, fontWeight:700, color:T.textMuted, letterSpacing:0.5, marginBottom:4}}>
              P12 SCENARIOS — 06:00–09:30 PATTERN
            </div>
            <div style={{fontSize:9, color:T.textDim, marginBottom:12, lineHeight:1.5}}>
              How does price behave relative to P12 hi / mid / lo in the pre-RTH window?
              Each scenario implies a different RTH day-type probability profile.
            </div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
              {sorted.map(sc => {
                const info = SC_INFO[sc.scenario] || {label:sc.scenario, color:"#888", desc:""};
                const maxOutcome = Math.max(...Object.values(sc.outcomes));
                return (
                  <div key={sc.scenario} style={{background:T.cardBg,
                    border:`1px solid ${T.border}`, borderRadius:6, padding:"10px 12px"}}>
                    {/* Header row */}
                    <div style={{display:"flex", justifyContent:"space-between",
                      alignItems:"baseline", marginBottom:4}}>
                      <span style={{fontSize:12, fontWeight:700, color:info.color}}>
                        {info.label}
                      </span>
                      <span style={{fontSize:11, color:T.textDim}}>
                        {sc.pct}% <span style={{fontSize:9}}>({sc.n} days)</span>
                      </span>
                    </div>
                    {/* Description */}
                    <div style={{fontSize:9, color:T.textMuted, lineHeight:1.4, marginBottom:8,
                      borderLeft:`2px solid ${info.color}40`, paddingLeft:6}}>
                      {info.desc}
                    </div>
                    {/* Frequency bar */}
                    <div style={{background:T.border, borderRadius:3, height:3, marginBottom:10}}>
                      <div style={{width:`${Math.min(sc.pct * 3, 100)}%`, height:"100%",
                        background:info.color, borderRadius:3, opacity:0.7}}/>
                    </div>
                    {/* Outcome distribution */}
                    <div style={{fontSize:9, color:T.textDim, marginBottom:4, letterSpacing:1}}>
                      DAY TYPE AFTER THIS PATTERN
                    </div>
                    {Object.entries(sc.outcomes).map(([cls, pct]) => (
                      <div key={cls} style={{marginBottom:5}}>
                        <div style={{display:"flex", justifyContent:"space-between", marginBottom:2}}>
                          <span style={{fontSize:10, color:CLS_COLORS[cls]||T.textDim}}>{cls}</span>
                          <span style={{fontSize:10, fontWeight:700,
                            color:pct >= maxOutcome * 0.9 ? CLS_COLORS[cls]||T.text : T.textMuted}}>
                            {pct}%
                          </span>
                        </div>
                        <div style={{background:T.border, borderRadius:2, height:3}}>
                          <div style={{width:`${pct}%`, height:"100%",
                            background:CLS_COLORS[cls]||"#888", borderRadius:2,
                            opacity: pct >= maxOutcome * 0.9 ? 1 : 0.4}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// VOLATILITY PANEL — daily range distributions matching profiler
// "Daily Low Distribution" (red, negative) + "Daily High Distribution" (green, positive)
// ─────────────────────────────────────────────────────────────────────────────
function VolatilityPanel({ data, T, instrument }) {
  const vol = data?.volatility;
  if (!vol) return null;
  const toStr = v => instrument==="ES" ? (v||0).toFixed(2) : Math.round(v||0);

  const sessions = [
    {label:"ASIA",   key:"asia"},
    {label:"LONDON", key:"london"},
    {label:"NY1",    key:"ny1"},
    {label:"NY2",    key:"ny2"},
  ];

  return (
    <div>
      <div style={{fontSize:14,fontWeight:700,marginBottom:14,color:T.text,letterSpacing:0.5}}>
        REALIZED VOLATILITY
      </div>
      {/* Range distributions */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
            <div style={{fontSize:9,fontWeight:700,color:"#ff6b6b",letterSpacing:1}}>DAILY LOW DISTRIBUTION</div>
            {vol.low_dist?.length>0 && <div style={{fontSize:8,color:T.textDim}}>{vol.low_dist.length} buckets</div>}
          </div>
          <RangeDist rows={vol.low_dist} color="#ff6b6b" height={80} T={T}/>
        </div>
        <div style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
            <div style={{fontSize:9,fontWeight:700,color:"#4ecdc4",letterSpacing:1}}>DAILY HIGH DISTRIBUTION</div>
            {vol.high_dist?.length>0 && <div style={{fontSize:8,color:T.textDim}}>{vol.high_dist.length} buckets</div>}
          </div>
          <RangeDist rows={vol.high_dist} color="#4ecdc4" height={80} T={T}/>
        </div>
      </div>

      {/* Session checkbooks */}
      <div style={{fontSize:11,fontWeight:700,color:T.textMuted,letterSpacing:0.5,marginBottom:8}}>SESSION RANGES — 10-DAY vs QUARTERLY MEDIAN</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {sessions.map(({label,key})=>{
          const q = vol.quarterly[key]||0;
          const t = vol.ten_day[key]||0;
          const ratio = q>0 ? t/q : 1;
          const color = ratio>1.1?"#ff6b6b":ratio<0.9?"#4ecdc4":"#ffe066";
          return (
            <div key={key} style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"8px 10px",textAlign:"center"}}>
              <div style={{fontSize:11,color:T.textMuted,marginBottom:4}}>{label}</div>
              <div style={{fontSize:20,fontWeight:700,color}}>{toStr(t)}</div>
              <div style={{fontSize:11,color:T.textMuted}}>QTR: {toStr(q)}</div>
              <div style={{background:T.border,borderRadius:3,height:4,margin:"6px 0 2px"}}>
                <div style={{width:`${Math.min(ratio,2)*50}%`,height:"100%",background:color,borderRadius:3}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* 30-day sparkline */}
      {vol.range_history?.length > 0 && (()=>{
        const hist = [...vol.range_history].reverse();
        const vals = hist.map(h=>h.range);
        const mx=Math.max(...vals), mn=Math.min(...vals);
        const W=360, H=44;
        const pts = vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/(mx-mn||1))*H}`).join(" ");
        const medLine = H-((vol.ten_day.rth-mn)/(mx-mn||1))*H;
        return (
          <div style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:T.textHdr,letterSpacing:2,marginBottom:6}}>RTH RANGE — LAST 30 SESSIONS</div>
            <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:44,overflow:"visible"}}>
              <polyline points={pts} fill="none" stroke="#4ecdc4" strokeWidth="1.5"/>
              <line x1="0" y1={medLine} x2={W} y2={medLine} stroke="#ffe066" strokeWidth="1" strokeDasharray="4,3" opacity="0.8"/>
            </svg>
            <div style={{fontSize:8,color:"#ffe066",marginTop:2}}>— 10-day median: {toStr(vol.ten_day.rth)}</div>
          </div>
        );
      })()}

      {/* ── SESSION EXPANSION HISTORY (CHECKBOOK) ── */}
      {vol.expansion_history?.length > 0 && (() => {
        const expColor = v => v == null ? T.border
          : v > 150 ? "#ff4444"
          : v > 120 ? "#ff9966"
          : v > 100 ? "#ffe066"
          : v > 80  ? "#88ccaa"
          : "#4ecdc4";
        const expBg = v => v == null ? "transparent"
          : v > 150 ? "#ff444420"
          : v > 120 ? "#ff996620"
          : v > 100 ? "#ffe06620"
          : v > 80  ? "#88ccaa18"
          : "#4ecdc420";
        const sessions = [
          {k:"asia", label:"ASIA"},
          {k:"lon",  label:"LON"},
          {k:"ny1",  label:"NY1"},
          {k:"ny2",  label:"NY2"},
          {k:"rth",  label:"RTH"},
        ];
        return (
          <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:6,
            padding:"12px 14px", marginTop:14}}>
            <div style={{display:"flex", alignItems:"baseline", gap:10, marginBottom:10}}>
              <span style={{fontSize:9, fontWeight:700, color:T.textHdr, letterSpacing:2}}>
                SESSION EXPANSION — % OF QUARTERLY MEDIAN
              </span>
              <span style={{fontSize:9, color:T.textDim}}>
                how much of a typical session's range was used?
              </span>
            </div>
            {/* Color key */}
            <div style={{display:"flex", gap:10, marginBottom:10, flexWrap:"wrap"}}>
              {[
                {label:">150% — very hot",  color:"#ff4444"},
                {label:"120–150% — hot",    color:"#ff9966"},
                {label:"100–120% — above",  color:"#ffe066"},
                {label:"80–100% — normal",  color:"#88ccaa"},
                {label:"<80% — quiet",      color:"#4ecdc4"},
              ].map(({label,color}) => (
                <span key={label} style={{fontSize:9, color, display:"flex", alignItems:"center", gap:4}}>
                  <span style={{width:8, height:8, borderRadius:2, background:color, display:"inline-block"}}/>
                  {label}
                </span>
              ))}
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse", fontSize:10, width:"100%", tableLayout:"fixed"}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${T.border}`}}>
                    <th style={{textAlign:"left", color:T.textDim, fontWeight:400, padding:"3px 6px 6px 0",
                      fontSize:9, letterSpacing:1, width:"22%"}}>DATE</th>
                    {sessions.map(({label}) => (
                      <th key={label} style={{textAlign:"center", color:T.textDim, fontWeight:700,
                        padding:"3px 4px 6px", fontSize:9, letterSpacing:1}}>{label}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {vol.expansion_history.map((row, ri) => (
                    <tr key={row.date} style={{borderBottom:`1px solid ${T.border}22`,
                      opacity: ri === 0 ? 1 : 0.9}}>
                      <td style={{padding:"4px 6px 4px 0", color:T.textDim, fontSize:9}}>
                        {row.date?.slice(5)}
                      </td>
                      {sessions.map(({k}) => {
                        const v = row[k];
                        return (
                          <td key={k} style={{
                            padding:"3px 4px", textAlign:"center",
                            background: expBg(v), borderRadius:2,
                          }}>
                            <span style={{
                              fontSize:10, fontWeight:700, color: expColor(v),
                              fontFamily:"monospace",
                            }}>
                              {v != null ? v + "%" : "—"}
                            </span>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:9, color:T.textDim, marginTop:8, lineHeight:1.5}}>
              Checkbook logic: if Asia overspent → London likely to follow · if London overspent → NY1 likely to compress.
              Sequential overspending across sessions signals a range expansion day.
              Contraction (cyan) signals consolidation — expect tight NY1/NY2.
            </div>
          </div>
        );
      })()}
    </div>
  );
}
