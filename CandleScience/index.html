// FOUR-STEP REVERSAL PANEL
// ─────────────────────────────────────────────────────────────────────────────
function FourStepPanel({ data, T }) {
  const fs = data?.four_step;
  if (!fs) return null;
  const [dir, setDir] = React.useState("bear");
  const scores = dir==="bear" ? fs.bear_scores : fs.bull_scores;
  const sr = fs.step_rates;
  const maxN = Math.max(...(scores||[]).map(s=>s.n),1);

  const bearSteps = [
    {label:"S1 — Below 9:30 low",        pct:sr.bs1},
    {label:"S2 — Below 9:00 midpoint",   pct:sr.bs2},
    {label:"S3 — 10:00 takes 9:00 low",  pct:sr.bs3},
    {label:"S4 — Q1 lower high",         pct:sr.bs4},
  ];
  const bullSteps = [
    {label:"S1 — Above 9:30 high",       pct:sr.us1},
    {label:"S2 — Above 9:00 midpoint",   pct:sr.us2},
    {label:"S3 — 10:00 takes 9:00 high", pct:sr.us3},
    {label:"S4 — Q1 higher low",         pct:sr.us4},
  ];
  const steps = dir==="bear" ? bearSteps : bullSteps;

  return (
    <div>
      <div style={{fontSize:14,fontWeight:700,marginBottom:12,color:T.text,letterSpacing:0.5}}>
        FOUR-STEP REVERSAL · 9:30–10:30
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center"}}>
        {["bear","bull"].map(v=>(
          <button key={v} onClick={()=>setDir(v)} style={{
            fontSize:9,padding:"3px 10px",borderRadius:4,cursor:"pointer",border:"1px solid",
            borderColor:dir===v?(v==="bear"?"#ff6b6b":"#4ecdc4"):T.border,
            background:dir===v?(v==="bear"?"#ff6b6b20":"#4ecdc420"):T.cardBg,
            color:dir===v?(v==="bear"?"#ff6b6b":"#4ecdc4"):T.textMuted,
          }}>{v.toUpperCase()} REVERSAL</button>
        ))}
        <span style={{fontSize:11,color:T.textMuted,marginLeft:6}}>
          9:30–10:30 pivot: <strong style={{color:"#ffe066"}}>{sr.pivot_pct}%</strong> of days · N={sr.n}
        </span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"12px 14px"}}>
          <div style={{fontSize:11,fontWeight:700,color:T.text,letterSpacing:0.5,marginBottom:10}}>STEP COMPLETION RATES</div>
          {steps.map(({label,pct},i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:T.textMuted}}>{label}</span>
                <span style={{fontSize:12,fontWeight:700,color:pct>60?"#4ecdc4":"#ffe066"}}>{pct}%</span>
              </div>
              <div style={{background:T.border,borderRadius:3,height:5}}>
                <div style={{width:`${pct}%`,height:"100%",background:pct>60?"#4ecdc4":"#ffe066",borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:6,padding:"12px 14px"}}>
          <div style={{fontSize:11,fontWeight:700,color:T.text,letterSpacing:0.5,marginBottom:10}}>SCORE → PIVOT RATE</div>
          {(scores||[]).map(({score,n,pivot_pct})=>(
            <div key={score} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:T.textMuted}}>{score}/4 steps · {n} days</span>
                <span style={{fontSize:12,fontWeight:700,
                  color:pivot_pct>60?"#4ecdc4":pivot_pct>40?"#ffe066":"#ff6b6b"}}>
                  {pivot_pct}%
                </span>
              </div>
              <div style={{display:"flex",gap:2}}>
                <div style={{width:`${Math.round(n/maxN*100)}%`,height:5,background:"#4a5568",borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TIMING HISTOGRAM — dual bar chart showing MAE (red) and MFE (green) timing
// Timeline runs 06:00–16:30.  Dotted lines mark mode and median for each.
// ─────────────────────────────────────────────────────────────────────────────
function TimingHistDual({ maeData, mfeData, T, height=110 }) {
  if (!maeData || !mfeData) return null;
  const maH = maeData.hist || [], mfH = mfeData.hist || [];
  if (!maH.length && !mfH.length) return (
    <div style={{height, display:"flex", alignItems:"center", justifyContent:"center"}}>
      <span style={{fontSize:10, color:T.textDim}}>no timing data</span>
    </div>
  );

  // Build unified 15-min time axis: 06:00–16:30
  const allTimes = new Set();
  [...maH, ...mfH].forEach(r => allTimes.add(r.t));
  const times = [...allTimes].sort();
  const maeMap = Object.fromEntries(maH.map(r=>[r.t, r.n]));
  const mfeMap = Object.fromEntries(mfH.map(r=>[r.t, r.n]));

  const maeMax = Math.max(...times.map(t=>maeMap[t]||0), 1);
  const mfeMax = Math.max(...times.map(t=>mfeMap[t]||0), 1);
  const combined = Math.max(maeMax, mfeMax);

  const barW = Math.max(3, Math.floor(320 / (times.length || 1)));
  const halfH = Math.floor(height / 2) - 4;

  const isMode   = (t, map) => Object.entries(map).length && t === Object.entries(map).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const isMedian = (t, map, mode) => {
    const sorted = Object.entries(map).sort((a,b)=>a[0]<b[0]?-1:1);
    const total = sorted.reduce((s,[,n])=>s+n,0);
    let cum = 0;
    for (const [k,n] of sorted) { cum+=n; if (cum>=total/2) return k===t && k!==mode; }
    return false;
  };

  return (
    <div>
      {/* Legend */}
      <div style={{display:"flex", gap:16, marginBottom:6, flexWrap:"wrap"}}>
        {mfeData.mode && <span style={{fontSize:10, color:"#4ade80"}}>MFE mode <strong>{mfeData.mode}</strong> · median <strong>{mfeData.median||"—"}</strong></span>}
        {maeData.mode && <span style={{fontSize:10, color:"#f87171"}}>MAE mode <strong>{maeData.mode}</strong> · median <strong>{maeData.median||"—"}</strong></span>}
      </div>
      {/* Chart */}
      <div style={{overflowX:"auto"}}>
        <svg width={Math.max(320, barW*times.length+2)} height={height+16} style={{display:"block",fontFamily:"monospace"}}>
          {/* Center axis */}
          <line x1={0} y1={halfH+4} x2={barW*times.length} y2={halfH+4}
            stroke={T.border} strokeWidth={1}/>

          {/* Mode/median vertical lines */}
          {[
            {t: mfeData.mode,   color:"#4ade80", dash:"none"},
            {t: mfeData.median, color:"#4ade8066", dash:"4 2"},
            {t: maeData.mode,   color:"#f87171", dash:"none"},
            {t: maeData.median, color:"#f8717166", dash:"4 2"},
          ].filter(d=>d.t).map(({t,color,dash},i)=>{
            const xi = times.indexOf(t);
            if (xi<0) return null;
            const cx = xi*barW + barW/2;
            return <line key={i} x1={cx} y1={2} x2={cx} y2={height+2}
              stroke={color} strokeWidth={1.5} strokeDasharray={dash}/>;
          })}

          {times.map((t, i) => {
            const maeN = maeMap[t]||0, mfeN = mfeMap[t]||0;
            const maeH = maeN ? Math.max(2, Math.round(maeN/combined*halfH)) : 0;
            const mfeH = mfeN ? Math.max(2, Math.round(mfeN/combined*halfH)) : 0;
            const x = i * barW + 1;
            const cy = halfH + 4;
            const maeMode = isMode(t, maeMap), mfMode = isMode(t, mfeMap);
            const maeIsMedian = isMedian(t, maeMap, maeData.mode);
            const mfeIsMedian = isMedian(t, mfeMap, mfeData.mode);
            return (
              <g key={t} title={`${t} · MAE:${maeN} MFE:${mfeN}`}>
                {mfeN>0 && <rect x={x} y={cy-mfeH} width={barW-1} height={mfeH}
                  fill={mfMode?"#ffffff":mfeIsMedian?"rgba(255,255,255,0.5)":"#4ade80"}
                  fillOpacity={mfMode?1:0.75}/>}
                {maeN>0 && <rect x={x} y={cy} width={barW-1} height={maeH}
                  fill={maeMode?"#ffffff":maeIsMedian?"rgba(255,255,255,0.5)":"#f87171"}
                  fillOpacity={maeMode?1:0.75}/>}
              </g>
            );
          })}

          {/* Time axis labels — only show every ~2hrs = every 8 bars */}
          {times.map((t, i) => {
            if (i % 8 !== 0) return null;
            return <text key={t} x={i*barW+barW/2} y={height+14} textAnchor="middle"
              fontSize={8} fill={T.axisText}>{t}</text>;
          })}
        </svg>
      </div>
      <div style={{display:"flex",gap:16,marginTop:4,fontSize:9,color:T.textDim}}>
        <span style={{color:"#4ade8088"}}>▲ MFE (favorable)</span>
        <span style={{color:"#f8717188"}}>▼ MAE (adverse)</span>
        <span>white bar = mode · semi-transparent = median</span>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAE/MFE TIMING PANEL
// ─────────────────────────────────────────────────────────────────────────────
function MaeTimingPanel({ data, T }) {
  const [dir, setDir] = useState("all");
  const [dow, setDow] = useState("all");
  const mt = data?.mae_timing;
  if (!mt) return null;
  if (!mt.all) return (
    <div style={{fontSize:12, color:T.textMuted, padding:"12px", background:T.cardBg,
      border:`1px solid ${T.border}`, borderRadius:6}}>
      ⚠️ Run <code style={{color:T.yellow}}>python3 build_probs.py</code> to generate MAE/MFE timing data
    </div>
  );

  // Build key: dow+dir combined if both specified, else just one
  const key = dow === "all" && dir === "all" ? "all"
            : dow !== "all" && dir !== "all" ? `${dow}_${dir}`
            : dow !== "all" ? dow : dir;
  const d = mt[key] || mt["all"];
  const n = d?.n ?? 0;

  const Sel = ({val, active, onClick, color}) => (
    <button onClick={onClick} style={{fontSize:11, padding:"3px 9px", borderRadius:4, cursor:"pointer",
      border:`1px solid ${active ? color : T.border}`,
      background: active ? color+"22" : "transparent",
      color: active ? color : T.textMuted, fontWeight: active ? 700:400, transition:"all 0.1s"}}>
      {val}
    </button>
  );

  // "Shallow" = low put in before median MAE time.  "Deep" = at or after.
  const maeMedian = d?.mae?.median;
  const shallowPct = (() => {
    if (!maeMedian || !d?.mae?.hist?.length) return null;
    const before = (d.mae.hist||[]).filter(r=>r.t < maeMedian).reduce((s,r)=>s+r.n, 0);
    const total  = (d.mae.hist||[]).reduce((s,r)=>s+r.n, 0);
    return total > 0 ? Math.round(before/total*100) : null;
  })();

  return (
    <div>
      <div style={{display:"flex", alignItems:"baseline", gap:10, marginBottom:6}}>
        <span style={{fontSize:14, fontWeight:700, color:T.text}}>MAE / MFE TIMING</span>
        <span style={{fontSize:10, color:T.textDim}}>06:00–16:30 · when is the session extreme first established?</span>
      </div>

      {/* Explanation card */}
      <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:6,
        padding:"10px 14px", marginBottom:12, fontSize:11, color:T.textMuted, lineHeight:1.5}}>
        <strong style={{color:T.text}}>Bull C3:</strong> MAE = session low (adverse), MFE = session high (favorable) ·
        <strong style={{color:T.text}}> Bear C3:</strong> reversed.
        <span style={{color:"#f87171"}}> Shallow MAE</span> = low put in before median → expected early reversal.
        <span style={{color:"#4ade80"}}> Deep check mark</span> = reaches median MAE zone then reverses.
      </div>

      {/* Controls */}
      <div style={{display:"flex", gap:6, flexWrap:"wrap", marginBottom:12, alignItems:"center"}}>
        <span style={{fontSize:10, color:T.textDim}}>DOW:</span>
        {["all","Mon","Tue","Wed","Thu","Fri"].map(v => (
          <Sel key={v} val={v==="all"?"ALL":v} active={dow===v} color="#a29bfe"
            onClick={()=>setDow(v)}/>
        ))}
        <span style={{width:1, height:16, background:T.border, alignSelf:"center"}}/>
        <span style={{fontSize:10, color:T.textDim}}>DIR:</span>
        {["all","bull","bear"].map(v => (
          <Sel key={v} val={v==="all"?"ALL":v==="bull"?"BULL ▲":"BEAR ▼"}
            active={dir===v} color={v==="bull"?"#4ade80":v==="bear"?"#f87171":"#888"}
            onClick={()=>setDir(v)}/>
        ))}
        <span style={{fontSize:10, color:T.textDim, marginLeft:6}}>N={n}</span>
      </div>

      {/* Shallow/Deep callout */}
      {shallowPct != null && (
        <div style={{display:"flex", gap:16, marginBottom:10}}>
          <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:6,
            padding:"8px 14px", flex:1, textAlign:"center"}}>
            <div style={{fontSize:9, color:T.textDim, letterSpacing:1}}>SHALLOW MAE</div>
            <div style={{fontSize:22, fontWeight:700, color:"#f87171"}}>{shallowPct}%</div>
            <div style={{fontSize:9, color:T.textDim}}>low before median time</div>
          </div>
          <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:6,
            padding:"8px 14px", flex:1, textAlign:"center"}}>
            <div style={{fontSize:9, color:T.textDim, letterSpacing:1}}>DEEP CHECK MARK</div>
            <div style={{fontSize:22, fontWeight:700, color:"#4ade80"}}>{100-shallowPct}%</div>
            <div style={{fontSize:9, color:T.textDim}}>low at or after median time</div>
          </div>
        </div>
      )}

      {/* Dual timing histogram */}
      <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8,
        padding:"12px 14px"}}>
        <TimingHistDual maeData={d?.mae} mfeData={d?.mfe} T={T} height={120}/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// WEEKLY STRUCTURE PANEL
// Weekly 5-SMA level hit rates + Sunday / Tuesday range analysis
// ─────────────────────────────────────────────────────────────────────────────
function WeeklyPanel({ data, T, instrument }) {
  const w = data?.weekly;
  if (!w) return null;
  if (!w.sma5_hit_rates?.length) return (
    <div style={{fontSize:12, color:T.textMuted, padding:"12px", background:T.cardBg,
      border:`1px solid ${T.border}`, borderRadius:6}}>
      ⚠️ Run <code style={{color:T.yellow}}>python3 build_probs.py</code> to generate weekly structure
    </div>
  );

  const ref   = REF_PRICES[instrument] || 21000;
  const isNQ  = instrument === "NQ";
  const bpToStr = bp => isNQ ? `${bp}bp / ${Math.round(bp/10000*ref)}pt` : `${bp}bp / ${(bp/10000*ref).toFixed(2)}pt`;

  const { sun_stats, tue_stats, combo_confirm, recent_weeks, sma5_hit_rates } = w;

  // Mini OHLC weekly chart
  const ChartWeeks = ({ weeks }) => {
    if (!weeks?.length) return null;
    const wks = [...weeks].reverse();
    const prices = wks.flatMap(w => [w.high, w.low, w.sma5]).filter(v=>v>0);
    const pMin = Math.min(...prices) * 0.999;
    const pMax = Math.max(...prices) * 1.001;
    const W = 360, H = 90;
    const PAD = { l:8, r:8, t:10, b:20 };
    const cw = (W-PAD.l-PAD.r) / wks.length;
    const sy = v => PAD.t + (H-PAD.t-PAD.b) * (1-(v-pMin)/(pMax-pMin));
    return (
      <svg width={W} height={H} style={{display:"block",overflow:"visible",fontFamily:"monospace",width:"100%",height:H}}>
        {/* SMA5 line */}
        <polyline fill="none" stroke="#ffe066" strokeWidth={1.5} strokeDasharray="4 2"
          points={wks.map((wk,i) => `${PAD.l + i*cw + cw/2},${sy(wk.sma5)}`).join(" ")}/>
        {wks.map((wk, i) => {
          const cx = PAD.l + i*cw + cw/2;
          const bW = cw * 0.6;
          const bull = wk.close >= wk.open;
          const color = bull ? "#4ade80" : "#f87171";
          const bodyTop = sy(Math.max(wk.open, wk.close));
          const bodyBot = sy(Math.min(wk.open, wk.close));
          const bodyH   = Math.max(1, bodyBot - bodyTop);
          return (
            <g key={wk.wk}>
              {/* Wick */}
              <line x1={cx} y1={sy(wk.high)} x2={cx} y2={sy(wk.low)} stroke={color} strokeWidth={1}/>
              {/* Body */}
              <rect x={cx-bW/2} y={bodyTop} width={bW} height={bodyH} fill={color} fillOpacity={0.7}/>
              {/* Sunday range box */}
              {wk.sun_hi != null && wk.sun_lo != null && (
                <rect x={cx-bW/2-1} y={sy(wk.sun_hi)} width={bW+2}
                  height={Math.max(1, sy(wk.sun_lo)-sy(wk.sun_hi))}
                  fill="none" stroke="#f6c90e" strokeWidth={1} strokeDasharray="2 1" opacity={0.7}/>
              )}
              {/* Tuesday range */}
              {wk.tue_hi != null && wk.tue_lo != null && (
                <rect x={cx-bW/2-2} y={sy(wk.tue_hi)} width={bW+4}
                  height={Math.max(1, sy(wk.tue_lo)-sy(wk.tue_hi))}
                  fill="none" stroke="#ff6b6b" strokeWidth={1} strokeDasharray="3 1" opacity={0.6}/>
              )}
              {/* Week label */}
              <text x={cx} y={H-4} textAnchor="middle" fontSize={7} fill={T.axisText}>
                {wk.wk?.slice(5,10)}
              </text>
            </g>
          );
        })}
      </svg>
    );
  };

  return (
    <div>
      <div style={{fontSize:14, fontWeight:700, marginBottom:14, color:T.text}}>WEEKLY STRUCTURE</div>

      {/* SMA5 hit rates */}
      <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8,
        padding:"12px 16px", marginBottom:14}}>
        <div style={{fontSize:11, fontWeight:700, color:T.textMuted, letterSpacing:0.5, marginBottom:10}}>
          WEEKLY 5-SMA — PRICE REACH FROM SMA5
          <span style={{fontWeight:400, color:T.textDim, marginLeft:8, fontSize:10}}>
            how far above/below weekly 5-period SMA does price typically reach?
          </span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%", borderCollapse:"collapse", fontSize:11}}>
            <thead>
              <tr>
                <th style={{textAlign:"left", color:T.textDim, fontWeight:400, padding:"3px 8px 6px 0", fontSize:9, letterSpacing:1}}>LEVEL</th>
                <th style={{textAlign:"center", color:"#4ade80", fontWeight:600, padding:"3px 8px 6px", fontSize:9}}>↑ ABOVE</th>
                <th style={{textAlign:"center", color:"#f87171", fontWeight:600, padding:"3px 8px 6px", fontSize:9}}>↓ BELOW</th>
                <th style={{textAlign:"center", color:"#ffe066", fontWeight:600, padding:"3px 0 6px 8px", fontSize:9}}>EITHER</th>
              </tr>
            </thead>
            <tbody>
              {sma5_hit_rates.map(({bp, above_pct, below_pct, either_pct}) => (
                <tr key={bp} style={{borderTop:`1px solid ${T.border}`}}>
                  <td style={{padding:"5px 8px 5px 0", color:T.textMuted}}>{bpToStr(bp)}</td>
                  <td style={{padding:"5px 8px", textAlign:"center"}}>
                    <span style={{fontWeight:700, color:above_pct>=80?"#4ade80":above_pct>=50?"#ffe066":"#888"}}>
                      {above_pct}%
                    </span>
                  </td>
                  <td style={{padding:"5px 8px", textAlign:"center"}}>
                    <span style={{fontWeight:700, color:below_pct>=80?"#f87171":below_pct>=50?"#ffe066":"#888"}}>
                      {below_pct}%
                    </span>
                  </td>
                  <td style={{padding:"5px 0 5px 8px", textAlign:"center"}}>
                    <span style={{fontWeight:700, color:either_pct>=85?"#4ecdc4":either_pct>=60?"#ffe066":"#888"}}>
                      {either_pct}%
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Sunday + Tuesday ranges */}
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14}}>
        <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8, padding:"12px 14px"}}>
          <div style={{fontSize:12, fontWeight:700, color:"#f6c90e", marginBottom:8}}>
            SUNDAY RANGE <span style={{fontSize:10, fontWeight:400, color:T.textDim}}>18:00–19:30 ET</span>
          </div>
          <div style={{fontSize:9, color:T.textDim, marginBottom:8}}>Weekly "fixed constant" — establishes opening direction</div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
            <span style={{fontSize:11, color:T.textMuted}}>Median range</span>
            <span style={{fontSize:13, fontWeight:700, color:T.text}}>{sun_stats.med_range_bp} bp</span>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
            <span style={{fontSize:11, color:"#4ade80"}}>Weeks broke above hi</span>
            <span style={{fontSize:13, fontWeight:700, color:"#4ade80"}}>{sun_stats.pct_broke_above}%</span>
          </div>
          <div style={{display:"flex", justifyContent:"space-between"}}>
            <span style={{fontSize:11, color:"#f87171"}}>Weeks broke below lo</span>
            <span style={{fontSize:13, fontWeight:700, color:"#f87171"}}>{sun_stats.pct_broke_below}%</span>
          </div>
          <div style={{fontSize:9, color:T.textDim, marginTop:6}}>N={sun_stats.n} weeks</div>
        </div>
        <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8, padding:"12px 14px"}}>
          <div style={{fontSize:12, fontWeight:700, color:"#ff6b6b", marginBottom:8}}>
            TUESDAY RANGE <span style={{fontSize:10, fontWeight:400, color:T.textDim}}>9:30–10:30 ET</span>
          </div>
          <div style={{fontSize:9, color:T.textDim, marginBottom:8}}>Confirms weekly direction — use with Sunday range for bias</div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
            <span style={{fontSize:11, color:"#4ade80"}}>Weeks broke above hi</span>
            <span style={{fontSize:13, fontWeight:700, color:"#4ade80"}}>{tue_stats.pct_broke_above}%</span>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
            <span style={{fontSize:11, color:"#f87171"}}>Weeks broke below lo</span>
            <span style={{fontSize:13, fontWeight:700, color:"#f87171"}}>{tue_stats.pct_broke_below}%</span>
          </div>
          {/* Combo confirmation */}
          {combo_confirm && (
            <div style={{borderTop:`1px solid ${T.border}`, paddingTop:8, marginTop:4}}>
              <div style={{fontSize:9, color:T.textHdr, letterSpacing:1, marginBottom:4}}>WHEN BOTH AGREE (SUN+TUE)</div>
              <div style={{display:"flex", justifyContent:"space-between", marginBottom:2}}>
                <span style={{fontSize:10, color:"#4ade80"}}>Bull confirm → low held</span>
                <span style={{fontSize:12, fontWeight:700, color:"#4ade80"}}>{combo_confirm.bull_held_lo}%</span>
              </div>
              <div style={{display:"flex", justifyContent:"space-between"}}>
                <span style={{fontSize:10, color:"#f87171"}}>Bear confirm → high held</span>
                <span style={{fontSize:12, fontWeight:700, color:"#f87171"}}>{combo_confirm.bear_held_hi}%</span>
              </div>
            </div>

          <div style={{fontSize:9, color:T.textDim, marginTop:6}}>N={tue_stats.n} weeks</div>
        </div>
      </div>

      {/* Last 10 weeks chart */}

        <div style={{background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:8, padding:"12px 14px"}}>
          <div style={{display:"flex", gap:16, alignItems:"center", marginBottom:8}}>

              <span style={{width:14,height:1,borderTop:"1px dashed #ff6b6b",display:"inline-block"}}/>TUE range

            <table style={{width:"100%", borderCollapse:"collapse", fontSize:10}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${T.border}`}}>
                  {["WK","OPEN","HIGH","LOW","CLOSE","SMA5","↑ bp","↓ bp"].map(h=>(
                    <th key={h} style={{padding:"3px 6px",textAlign:"right",color:T.textDim,fontWeight:400,fontSize:9}}>{h}</th>

              <tbody>
                {recent_weeks.map((wk,i) => {

            </table>
          </div>
        </div>
      )}
    </div>
  );
}


// ─────────────────────────────────────────────────────────────────────────────
// PRICE MODEL PANEL — cumulative avg % price path per session, bull vs bear
// Green line = long session average path, Red line = short session average path
// ─────────────────────────────────────────────────────────────────────────────
function PriceModelChart({ bullData, bearData, T, title, color, height = 80 }) {
  if (!bullData?.length && !bearData?.length) return null;
  const allVals = [...(bullData||[]).map(d=>d.v), ...(bearData||[]).map(d=>d.v)];
  const allTs   = [...new Set([...(bullData||[]).map(d=>d.t), ...(bearData||[]).map(d=>d.t)])].sort();
  if (!allTs.length) return null;

  const W = 400, H = height;
  const PAD = { l: 36, r: 8, t: 8, b: 18 };
  const chartW = W - PAD.l - PAD.r;
  const chartH = H - PAD.t - PAD.b;

  // Always include 0 in the range
  const vMin = Math.min(...allVals, 0);
  const vMax = Math.max(...allVals, 0);
  const vRange = vMax - vMin || 0.001;

  const sx = i => PAD.l + (i / Math.max(allTs.length - 1, 1)) * chartW;
  const sy = v => PAD.t + chartH - ((v - vMin) / vRange) * chartH;
  const zeroY = sy(0);

  const toPath = data => {
    if (!data?.length) return "";
    const map = Object.fromEntries(data.map(d => [d.t, d.v]));
    return allTs
      .map((t, i) => {
        const v = map[t];
        if (v == null) return null;
        return `${i === 0 || map[allTs[i-1]] == null ? "M" : "L"}${sx(i)},${sy(v)}`;
      })
      .filter(Boolean).join(" ");
  };

  // Y axis ticks
  const yTicks = [];
  const step = vRange > 0.3 ? 0.1 : vRange > 0.05 ? 0.05 : 0.01;
  for (let v = Math.ceil(vMin / step) * step; v <= vMax + 0.001; v += step) {
    yTicks.push(Math.round(v * 1000) / 1000);
  }

  // X axis labels — every ~4 bars
  const xLabels = allTs.filter((_, i) => i % Math.max(1, Math.floor(allTs.length / 5)) === 0);

  return (
    <div>
      {title && (
        <div style={{fontSize: 9, fontWeight: 700, color: T.textHdr, letterSpacing: 1, marginBottom: 4}}>
          {title}
        </div>
      )}
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height: H + 4, display:"block", fontFamily:"monospace", overflow:"visible"}}>
        {/* Zero line */}
        <line x1={PAD.l} y1={zeroY} x2={W - PAD.r} y2={zeroY}
          stroke={T.border} strokeWidth={1} strokeDasharray="3 2"/>
        {/* Median dotted line for NYI session */}
        {/* Y axis ticks */}
        {yTicks.map(v => (
          <g key={v}>
            <line x1={PAD.l - 3} y1={sy(v)} x2={PAD.l} y2={sy(v)} stroke={T.border} strokeWidth={1}/>
            <text x={PAD.l - 5} y={sy(v) + 3} textAnchor="end" fontSize={7}
              fill={v === 0 ? T.textDim : T.axisText}>
              {v > 0 ? "+" : ""}{(v * 100).toFixed(1)}%
            </text>
          </g>
        ))}
        {/* X axis labels */}
        {xLabels.map(t => {
          const i = allTs.indexOf(t);
          return (
            <text key={t} x={sx(i)} y={H - 2} textAnchor="middle" fontSize={7} fill={T.axisText}>
              {t}
            </text>
          );
        })}
        {/* Bear path */}
        {bearData?.length > 0 && (
          <path d={toPath(bearData)} fill="none" stroke="#f87171" strokeWidth={1.5} opacity={0.85}/>
        )}
        {/* Bull path */}
        {bullData?.length > 0 && (
          <path d={toPath(bullData)} fill="none" stroke="#4ade80" strokeWidth={1.5} opacity={0.85}/>
        )}
        {/* Fill under bull */}
        {bullData?.length > 0 && (() => {
          const map = Object.fromEntries(bullData.map(d=>[d.t,d.v]));
          const pts = allTs.map((t,i) => map[t]!=null ? `${sx(i)},${sy(map[t])}` : null).filter(Boolean);
          if (!pts.length) return null;
          const [firstX] = pts[0].split(",");
          const [lastX] = pts[pts.length-1].split(",");
          return <path d={`M${pts.join("L")}L${lastX},${zeroY}L${firstX},${zeroY}Z`}
            fill="#4ade80" opacity={0.06}/>;
        })()}
        {/* Fill under bear */}
        {bearData?.length > 0 && (() => {
          const map = Object.fromEntries(bearData.map(d=>[d.t,d.v]));
          const pts = allTs.map((t,i) => map[t]!=null ? `${sx(i)},${sy(map[t])}` : null).filter(Boolean);
          if (!pts.length) return null;
          const [firstX] = pts[0].split(",");
          const [lastX] = pts[pts.length-1].split(",");
          return <path d={`M${pts.join("L")}L${lastX},${zeroY}L${firstX},${zeroY}Z`}
            fill="#f87171" opacity={0.06}/>;
        })()}
      </svg>
      <div style={{display:"flex", gap:12, fontSize:9, color:T.textDim, marginTop:2}}>
        <span style={{color:"#4ade8099"}}>▬ Long (bull)</span>
        <span style={{color:"#f8717199"}}>▬ Short (bear)</span>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SESSION HIGH/LOW TIMES PANEL
// For each session: dual histogram — green above (when sess high is put in),
// red below (when sess low is put in), with mode/median dotted lines.
// ─────────────────────────────────────────────────────────────────────────────
function SessHLDualChart({ highData, lowData, T, height = 100 }) {
  if (!highData?.hist?.length && !lowData?.hist?.length) return null;
  const allTs = [...new Set([
    ...(highData?.hist||[]).map(d=>d.t),
    ...(lowData?.hist||[]).map(d=>d.t)
  ])].sort();
  if (!allTs.length) return null;

  const hiMap = Object.fromEntries((highData?.hist||[]).map(d=>[d.t,d.n]));
  const loMap = Object.fromEntries((lowData?.hist||[]).map(d=>[d.t,d.n]));
  const maxN = Math.max(...allTs.map(t=>Math.max(hiMap[t]||0, loMap[t]||0)), 1);

  const barW = Math.max(4, Math.floor(440 / allTs.length));
  const halfH = Math.floor(height / 2) - 2;
  const W = barW * allTs.length + 2;

  const modeLineX = (t, label) => {
    const i = allTs.indexOf(t);
    if (i < 0) return null;
    return { x: i * barW + barW / 2, label };
  };

  const lines = [
    highData?.mode   && { t: highData.mode,   color:"#4ade80",   dash:"none", label:"H mode" },
    highData?.median && { t: highData.median, color:"#4ade8066", dash:"4 2",  label:"H med"  },
    lowData?.mode    && { t: lowData.mode,    color:"#f87171",   dash:"none", label:"L mode" },
    lowData?.median  && { t: lowData.median,  color:"#f8717166", dash:"4 2",  label:"L med"  },
  ].filter(Boolean);

  // X axis labels every ~4 bars
  const labelInterval = Math.max(1, Math.floor(allTs.length / 6));

  return (
    <div style={{overflowX:"auto"}}>
      <svg width={W} height={height + 20} style={{display:"block", fontFamily:"monospace"}}>
        {/* Center axis */}
        <line x1={0} y1={halfH + 2} x2={W} y2={halfH + 2} stroke={T.border} strokeWidth={1}/>
        {/* Mode/median lines */}
        {lines.map(({t, color, dash, label}, i) => {
          const ix = allTs.indexOf(t);
          if (ix < 0) return null;
          const cx = ix * barW + barW / 2;
          return <line key={i} x1={cx} y1={2} x2={cx} y2={height}
            stroke={color} strokeWidth={1.5} strokeDasharray={dash}/>;
        })}
        {/* Bars */}
        {allTs.map((t, i) => {
          const hiN = hiMap[t] || 0, loN = loMap[t] || 0;
          const hiH = hiN ? Math.max(2, Math.round(hiN / maxN * halfH)) : 0;
          const loH = loN ? Math.max(2, Math.round(loN / maxN * halfH)) : 0;
          const x = i * barW + 1;
          const cy = halfH + 2;
          const hiMode = highData?.mode === t, loMode = lowData?.mode === t;
          return (
            <g key={t}>
              {hiN > 0 && <rect x={x} y={cy - hiH} width={barW - 1} height={hiH}
                fill={hiMode ? "#ffffff" : "#4ade80"} fillOpacity={hiMode ? 1 : 0.7}/>}
              {loN > 0 && <rect x={x} y={cy} width={barW - 1} height={loH}
                fill={loMode ? "#ffffff" : "#f87171"} fillOpacity={loMode ? 1 : 0.7}/>}
            </g>
          );
        })}
        {/* X labels */}
        {allTs.map((t, i) => {
          if (i % labelInterval !== 0) return null;
          return <text key={t} x={i * barW + barW / 2} y={height + 14}
            textAnchor="middle" fontSize={7} fill={T.axisText}>{t}</text>;
        })}
      </svg>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// WAR GAME — 8:30 MORNING BRIEF
// Synthesizes all 4 daily profile steps: Variables → OU Lines → HOD/LOD → Distribution
// ─────────────────────────────────────────────────────────────────────────────
function WarGamePanel({ data, T, instrument, c1, c2, c3Bull, maePerc }) {
  const [asiaDir,  setAsiaDir]  = useState(null); // 'long'|'short'|null
  const [asiaSess, setAsiaSess] = useState(null); // 'true'|'false'|null
  const [lonDir,   setLonDir]   = useState(null);
  const [lonSess,  setLonSess]  = useState(null);

  const toggle = (cur, val, set) => set(cur === val ? null : val);
  const hasSelection = asiaDir || asiaSess || lonDir || lonSess;

  // ── STEP 1: derive NY1 probs from combos ─────────────────────────────────
  const step1 = useMemo(() => {
    const combos = data?.session_vars?.combos ?? [];
    const total = combos.reduce((s, c) => s + c.n, 0);
    const matches = combos.filter(c => {
      if (asiaDir === 'long'  && !c.asia_long)  return false;
      if (asiaDir === 'short' &&  c.asia_long)  return false;
      if (asiaSess === 'true'  && !c.asia_true)  return false;
      if (asiaSess === 'false' &&  c.asia_true)  return false;
      if (lonDir === 'long'   && !c.lon_long)   return false;
      if (lonDir === 'short'  &&  c.lon_long)   return false;
      if (lonSess === 'true'  && !c.lon_true)   return false;
      if (lonSess === 'false' &&  c.lon_true)   return false;
      return true;
    });
    const matchN = matches.reduce((s, c) => s + c.n, 0);
    const ny1LongN  = matches.filter(c =>  c.ny1_long).reduce((s, c) => s + c.n, 0);
    const ny1TrueN  = matches.filter(c =>  c.ny1_true).reduce((s, c) => s + c.n, 0);
    const ny1FalseN = matchN - ny1TrueN;
    const ny1LongPct = matchN > 0 ? Math.round(ny1LongN / matchN * 100) : null;
    const ny1TruePct = matchN > 0 ? Math.round(ny1TrueN / matchN * 100) : null;
    const ny1FalsePct = ny1TruePct != null ? 100 - ny1TruePct : null;

    // Determine overnight character
    let overnight = null;
    if (asiaDir && lonDir) {
      overnight = asiaDir === lonDir
        ? (asiaDir === 'long' ? 'TRENDING BULLISH' : 'TRENDING BEARISH')
        : 'CONTRADICTING';
    } else if (asiaDir || lonDir) {
      overnight = asiaDir === 'long' || lonDir === 'long' ? 'PARTIAL BULL' : 'PARTIAL BEAR';
    }

    // 1800 low day expectation
    let hodLodBias = null;
    if (overnight === 'TRENDING BULLISH') hodLodBias = '1800 LOW DAY edge — lock in early, target 9:30–10:30 HOD';
    if (overnight === 'TRENDING BEARISH') hodLodBias = '1800 HIGH DAY edge — lock in early, target 9:30–10:30 LOD';
    if (overnight === 'CONTRADICTING')    hodLodBias = 'Both HOD & LOD likely after 9:30 RTH open';

    return { matchN, total, ny1LongPct, ny1TruePct, ny1FalsePct, overnight, hodLodBias };
  }, [data, asiaDir, asiaSess, lonDir, lonSess]);

  // ── STEP 3: HOD/LOD filtered histograms ──────────────────────────────────
  const { hodHist, lodHist } = useMemo(() => {
    if (!hasSelection) {
      return {
        hodHist: data?.hod_lod?.hod_hist ?? [],
        lodHist: data?.hod_lod?.lod_hist ?? [],
      };
    }
    const filterAndAggregate = (rows, tKey) => {
      const filtered = rows.filter(r => {
        if (asiaDir === 'long'  && !r.asia_long)  return false;
        if (asiaDir === 'short' &&  r.asia_long)  return false;
        if (asiaSess === 'true'  && !r.asia_true)  return false;
        if (asiaSess === 'false' &&  r.asia_true)  return false;
        if (lonDir === 'long'   && !r.lon_long)   return false;
        if (lonDir === 'short'  &&  r.lon_long)   return false;
        if (lonSess === 'true'  && !r.lon_true)   return false;
        if (lonSess === 'false' &&  r.lon_true)   return false;
        return true;
      });
      const agg = {};
      for (const r of filtered) { agg[r.t] = (agg[r.t] ?? 0) + r.n; }
      return Object.entries(agg).map(([t, n]) => ({ t, n })).sort((a, b) => a.t < b.t ? -1 : 1);
    };
    return {
      hodHist: filterAndAggregate(data?.hod_lod?.hod_by_sv ?? [], 't'),
      lodHist: filterAndAggregate(data?.hod_lod?.lod_by_sv ?? [], 't'),
    };
  }, [data, hasSelection, asiaDir, asiaSess, lonDir, lonSess]);

  // mode + median helpers
  const modeMedian = rows => {
    if (!rows || rows.length === 0) return { mode: null, median: null };
    const mode = rows.reduce((a, b) => b.n > a.n ? b : a, rows[0]).t;
    let cum = 0, total = rows.reduce((s, r) => s + r.n, 0), median = rows[0].t;
    for (const r of rows) { cum += r.n; if (cum >= total / 2) { median = r.t; break; } }
    return { mode, median };
  };
  const { mode: hodMode, median: hodMedian } = modeMedian(hodHist);
  const { mode: lodMode, median: lodMedian } = modeMedian(lodHist);

  // ── Candle science step 4 context ────────────────────────────────────────
  const biasLabel = c3Bull == null ? null : c3Bull >= 58 ? 'BULLISH' : c3Bull <= 42 ? 'BEARISH' : 'NEUTRAL';
  const biasColor = biasLabel === 'BULLISH' ? T.green : biasLabel === 'BEARISH' ? T.red : T.yellow;
  const refPrice  = REF_PRICES[instrument] ?? 21000;
  const toPoints  = v => v == null ? null : Math.round(v / 10000 * refPrice);
  const maeMed = maePerc?.mae?.p50;
  const mfeMed = maePerc?.mfe?.p50;
  const mfePts = toPoints(mfeMed);
  const maePts = toPoints(maeMed);

  // ── UI helpers ────────────────────────────────────────────────────────────
  const Btn = ({ label, active, color, onClick }) => (
    <button onClick={onClick} style={{
      fontSize: 11, padding: "5px 12px", borderRadius: 5, cursor: "pointer",
      border: `1px solid ${active ? color : T.border}`,
      background: active ? color + "28" : T.bgBtn,
      color: active ? color : T.textMuted,
      fontWeight: active ? 700 : 400,
      transition: "all 0.12s",
    }}>{label}</button>
  );

  const Card = ({ title, titleColor = T.textHdr, children, accent }) => (
    <div style={{
      background: T.bgCard, border: `1px solid ${accent ? accent + "44" : T.borderCard}`,
      borderRadius: 8, padding: "12px 14px", marginBottom: 10,
      borderLeft: accent ? `3px solid ${accent}` : undefined,
    }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: titleColor, letterSpacing: 2, marginBottom: 10 }}>{title}</div>
      {children}
    </div>
  );

  const StatRow = ({ label, value, color = T.text, sub }) => (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5 }}>
      <span style={{ fontSize: 10, color: T.textDim }}>{label}</span>
      <span style={{ fontSize: 11, fontWeight: 700, color }}>
        {value}
        {sub && <span style={{ fontSize: 9, color: T.textMuted, fontWeight: 400, marginLeft: 5 }}>{sub}</span>}
      </span>
    </div>
  );

  // Inline dual histogram (HOD green above, LOD red below)
  const DualHist = ({ hodRows, lodRows, height = 60 }) => {
    const ALL_SLOTS = [];
    const start = 18, end = 44; // 18:00 → 16:45 in 15-min slots from 18:00
    // Build a 15-min time grid from 18:00 to 16:45
    for (let h = 18; h < 24; h++) for (let m of [0, 15, 30, 45]) ALL_SLOTS.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    for (let h = 0;  h < 17; h++) for (let m of [0, 15, 30, 45]) ALL_SLOTS.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    ALL_SLOTS.push('16:45');

    const hodMap = Object.fromEntries((hodRows || []).map(r => [r.t, r.n]));
    const lodMap = Object.fromEntries((lodRows || []).map(r => [r.t, r.n]));
    const maxHod = Math.max(...(hodRows || []).map(r => r.n), 1);
    const maxLod = Math.max(...(lodRows || []).map(r => r.n), 1);

    // Key time markers
    const MARKERS = { "09:30": "#ffe066", "18:00": "#6666ff" };

    return (
      <div style={{ position: "relative" }}>
        <svg viewBox={`0 0 ${ALL_SLOTS.length} ${height * 2 + 2}`}
          style={{ width: "100%", height: height * 2 + 2, display: "block", overflow: "visible" }}>
          {/* Center line */}
          <line x1={0} y1={height + 1} x2={ALL_SLOTS.length} y2={height + 1}
            stroke={T.hr} strokeWidth={0.5}/>
          {ALL_SLOTS.map((t, i) => {
            const hN = hodMap[t] ?? 0;
            const lN = lodMap[t] ?? 0;
            const hH = hN > 0 ? Math.max(2, Math.round((hN / maxHod) * (height - 2))) : 0;
            const lH = lN > 0 ? Math.max(2, Math.round((lN / maxLod) * (height - 2))) : 0;
            const mk = MARKERS[t];
            return (
              <g key={t}>
                {mk && <line x1={i + 0.5} y1={0} x2={i + 0.5} y2={height * 2 + 2}
                  stroke={mk} strokeWidth={0.8} opacity={0.5}/>}
                {hH > 0 && <rect x={i} y={height + 1 - hH} width={1} height={hH}
                  fill={t === hodMode ? "#ffffff" : "#4ade80"} opacity={t === hodMode ? 1 : 0.7}/>}
                {lH > 0 && <rect x={i} y={height + 1} width={1} height={lH}
                  fill={t === lodMode ? "#ffffff" : "#f87171"} opacity={t === lodMode ? 1 : 0.7}/>}
              </g>
            );
          })}
        </svg>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: T.textDim, marginTop: 2 }}>
          <span>18:00</span><span style={{ color: "#ffe066" }}>9:30</span><span>16:45</span>
        </div>
      </div>
    );
  };

  // ── render ────────────────────────────────────────────────────────────────
  const overnightColor = step1.overnight === 'TRENDING BULLISH' ? T.green
    : step1.overnight === 'TRENDING BEARISH' ? T.red : T.yellow;

  return (
    <div>
      {/* Intro */}
      <div style={{ marginBottom: 14, padding: "10px 14px", background: T.bgCard,
        border: `1px solid ${T.borderCard}`, borderRadius: 8,
        borderLeft: "3px solid #ffe066" }}>
        <div style={{ fontSize: 10, color: "#ffe066", fontWeight: 700, letterSpacing: 1, marginBottom: 5 }}>

        </div>
        <div style={{ fontSize: 10, color: T.textDim, lineHeight: 1.6 }}>

        </div>
      </div>

      {/* ── STEP 1: VARIABLES ── */}
      <Card title="STEP 1 · SESSION VARIABLES" accent="#f6c90e">

          <div>
            <div style={{ fontSize: 10, color: "#f6c90e", fontWeight: 700, marginBottom: 7, letterSpacing: 1 }}>
              ASIA &nbsp;<span style={{ fontSize: 9, color: T.textDim, fontWeight: 400 }}>18:00–02:30</span>
            </div>
            <div style={{ display: "flex", gap: 5, marginBottom: 5 }}>

              <Btn label="SHORT" active={asiaDir === 'short'} color={T.red}   onClick={() => toggle(asiaDir,  'short', setAsiaDir)}/>
            </div>
            <div style={{ display: "flex", gap: 5 }}>
              <Btn label="TRUE"  active={asiaSess === 'true'}  color="#4ecdc4" onClick={() => toggle(asiaSess, 'true',  setAsiaSess)}/>
              <Btn label="FALSE" active={asiaSess === 'false'} color="#ff6b6b" onClick={() => toggle(asiaSess, 'false', setAsiaSess)}/>
            </div>
            {/* Base rates */}
            {data?.session_vars?.asia && (
              <div style={{ marginTop: 6, fontSize: 9, color: T.textDim }}>
                Base: {Math.round(data.session_vars.asia.long_pct ?? 0)}% Long ·{' '}
                {Math.round(data.session_vars.asia.true_pct ?? 0)}% True
              </div>
            )}
          </div>
          {/* LONDON */}
          <div>
            <div style={{ fontSize: 10, color: "#ff6b6b", fontWeight: 700, marginBottom: 7, letterSpacing: 1 }}>
              LONDON &nbsp;<span style={{ fontSize: 9, color: T.textDim, fontWeight: 400 }}>02:30–07:30</span>
            </div>
            <div style={{ display: "flex", gap: 5, marginBottom: 5 }}>
              <Btn label="LONG"  active={lonDir === 'long'}  color={T.green} onClick={() => toggle(lonDir,  'long',  setLonDir)}/>
              <Btn label="SHORT" active={lonDir === 'short'} color={T.red}   onClick={() => toggle(lonDir,  'short', setLonDir)}/>
            </div>
            <div style={{ display: "flex", gap: 5 }}>
              <Btn label="TRUE"  active={lonSess === 'true'}  color="#4ecdc4" onClick={() => toggle(lonSess, 'true',  setLonSess)}/>
              <Btn label="FALSE" active={lonSess === 'false'} color="#ff6b6b" onClick={() => toggle(lonSess, 'false', setLonSess)}/>
            </div>
            {data?.session_vars?.lon && (
              <div style={{ marginTop: 6, fontSize: 9, color: T.textDim }}>
                Base: {Math.round(data.session_vars.lon.long_pct ?? 0)}% Long ·{' '}
                {Math.round(data.session_vars.lon.true_pct ?? 0)}% True
              </div>
            )}
          </div>
        </div>

        {/* Outcomes */}
        <div style={{ borderTop: `1px solid ${T.hr}`, paddingTop: 10 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {/* Sample size */}
            <div style={{ background: T.bgPill, borderRadius: 6, padding: "8px 10px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: T.textDim, marginBottom: 3 }}>SAMPLE</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: T.text }}>
                {step1.matchN > 0 ? step1.matchN : "—"}
              </div>
              {step1.total > 0 && step1.matchN > 0 && (
                <div style={{ fontSize: 9, color: T.textMuted }}>
                  {Math.round(step1.matchN / step1.total * 100)}% of all days
                </div>
              )}
            </div>
            {/* NY1 direction */}
            <div style={{ background: T.bgPill, borderRadius: 6, padding: "8px 10px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: T.textDim, marginBottom: 3 }}>NY1 LONG</div>
              <div style={{ fontSize: 18, fontWeight: 800,
                color: step1.ny1LongPct != null ? (step1.ny1LongPct >= 55 ? T.green : step1.ny1LongPct <= 45 ? T.red : T.yellow) : T.textDim }}>
                {step1.ny1LongPct != null ? step1.ny1LongPct + "%" : "—"}
              </div>
              {step1.ny1LongPct != null && (
                <div style={{ fontSize: 9, color: T.textMuted }}>
                  {(100 - step1.ny1LongPct)}% Short
                </div>
              )}
            </div>
            {/* NY1 true/false */}
            <div style={{ background: T.bgPill, borderRadius: 6, padding: "8px 10px", textAlign: "center" }}>
              <div style={{ fontSize: 9, color: T.textDim, marginBottom: 3 }}>NY1 FALSE</div>
              <div style={{ fontSize: 18, fontWeight: 800,
                color: step1.ny1FalsePct != null ? (step1.ny1FalsePct >= 55 ? "#ff6b6b" : "#4ecdc4") : T.textDim }}>
                {step1.ny1FalsePct != null ? step1.ny1FalsePct + "%" : "—"}
              </div>
              {step1.ny1TruePct != null && (
                <div style={{ fontSize: 9, color: T.textMuted }}>{step1.ny1TruePct}% True</div>
              )}
            </div>
          </div>

          {/* Overnight character badge */}
          {step1.overnight && (
            <div style={{ marginTop: 10, padding: "7px 12px", borderRadius: 6,
              background: overnightColor + "18", border: `1px solid ${overnightColor}44`,
              display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: overnightColor, letterSpacing: 1 }}>
                {step1.overnight}
              </span>
              {step1.hodLodBias && (
                <span style={{ fontSize: 10, color: T.textMuted, maxWidth: 200, textAlign: "right", lineHeight: 1.4 }}>
                  {step1.hodLodBias}
                </span>
              )}
            </div>
          )}
        </div>
      </Card>

      {/* ── STEP 2: OU LINES ── */}
      <Card title="STEP 2 · OU LINES (OVERALL HIT RATES)" accent="#4ecdc4">
        {!data?.ou_lines ? (
          <div style={{ fontSize: 10, color: T.textDim }}>No OU data — run build_probs.py</div>
        ) : (
          <div>
            {[
              { key: "asia", label: "ASIA OU",   color: "#f6c90e", time: "02:30" },
              { key: "lon",  label: "LONDON OU", color: "#ff6b6b", time: "07:30" },
              { key: "ny1",  label: "NY1 OU",    color: "#4ecdc4", time: "11:30" },
            ].map(({ key, label, color, time }) => {
              const ou = data.ou_lines[key];
              if (!ou) return null;
              const rate = ou.hit_rate;
              return (
                <div key={key} style={{ marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: color }}/>
                      <span style={{ fontSize: 10, fontWeight: 700, color }}>{label}</span>
                      {ou.mode && <span style={{ fontSize: 9, color: T.textDim }}>mode {ou.mode}</span>}
                      {ou.median && <span style={{ fontSize: 9, color: T.textDim }}>· median {ou.median}</span>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 80, height: 5, background: T.barBg, borderRadius: 3 }}>
                        <div style={{ width: `${rate}%`, height: "100%", background: color, borderRadius: 3 }}/>
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 800, color, width: 38, textAlign: "right" }}>
                        {rate?.toFixed(0)}%
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{ fontSize: 9, color: T.textDim, marginTop: 6, borderTop: `1px solid ${T.hr}`, paddingTop: 6 }}>
              OU = midpoint of each session's FC range. Stack with Midnight, P12 Mid, and Settlement to build price zones.
            </div>
          </div>
        )}
      </Card>

      {/* ── STEP 3: HOD / LOD TIMING ── */}
      <Card title={`STEP 3 · HOD / LOD TIMING${hasSelection ? " (FILTERED)" : " (ALL DAYS)"}`} accent="#a29bfe">
        {hodHist.length === 0 && lodHist.length === 0 ? (
          <div style={{ fontSize: 10, color: T.textDim }}>No HOD/LOD data — run build_probs.py</div>
        ) : (
          <>
            {/* Mode/median callouts */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
              <div style={{ background: T.bgPill, borderRadius: 6, padding: "7px 10px" }}>
                <div style={{ fontSize: 9, color: "#4ade80", fontWeight: 700, marginBottom: 3 }}>▲ HOD</div>
                <div style={{ display: "flex", gap: 12 }}>
                  <div>
                    <div style={{ fontSize: 8, color: T.textDim }}>MODE</div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: "#4ade80", fontFamily: "monospace" }}>
                      {hodMode ?? "—"}
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 8, color: T.textDim }}>MEDIAN</div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: T.text, fontFamily: "monospace" }}>
                      {hodMedian ?? "—"}
                    </div>
                  </div>
                </div>
              </div>
              <div style={{ background: T.bgPill, borderRadius: 6, padding: "7px 10px" }}>
                <div style={{ fontSize: 9, color: "#f87171", fontWeight: 700, marginBottom: 3 }}>▼ LOD</div>
                <div style={{ display: "flex", gap: 12 }}>
                  <div>
                    <div style={{ fontSize: 8, color: T.textDim }}>MODE</div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: "#f87171", fontFamily: "monospace" }}>
                      {lodMode ?? "—"}
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 8, color: T.textDim }}>MEDIAN</div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: T.text, fontFamily: "monospace" }}>
                      {lodMedian ?? "—"}
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Dual histogram */}
            <DualHist hodRows={hodHist} lodRows={lodHist} height={55}/>

            <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 9 }}>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ width: 8, height: 8, background: "#4ade80", display: "inline-block", borderRadius: 1 }}/>
                <span style={{ color: T.textDim }}>HOD timing (green above)</span>
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ width: 8, height: 8, background: "#f87171", display: "inline-block", borderRadius: 1 }}/>
                <span style={{ color: T.textDim }}>LOD timing (red below)</span>
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ width: 8, height: 8, background: "#ffe066", display: "inline-block", borderRadius: 1 }}/>
                <span style={{ color: T.textDim }}>9:30 marker</span>
              </span>
            </div>
          </>
        )}
      </Card>

      {/* ── STEP 4: DISTRIBUTION + CANDLE SCIENCE ── */}
      <Card title="STEP 4 · CANDLE SCIENCE + PRICE MODEL" accent="#60a5fa">
        {c1 || c2 ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {/* Bias */}
            <div style={{ background: T.bgPill, borderRadius: 6, padding: "10px 12px" }}>
              <div style={{ fontSize: 9, color: T.textDim, marginBottom: 4 }}>C3 DIRECTION BIAS</div>
              <div style={{ fontSize: 22, fontWeight: 900, color: biasColor ?? T.textDim, letterSpacing: 0.5 }}>
                {biasLabel ?? "—"}
              </div>
              {c3Bull != null && (
                <div style={{ fontSize: 11, color: T.textMuted, marginTop: 2 }}>
                  {c3Bull}% bull · {Math.round(100 - c3Bull)}% bear
                </div>

              <div style={{ fontSize: 9, color: T.textDim, marginTop: 6 }}>

            border: `1px solid ${T.border}`, background: "transparent", color: T.textDim,
            marginTop: 4 }}>
          Clear selections
        </button>
      )}
    </div>
  );
}

function App() {
  const [dark,       setDark]       = useState(true);
  const [allData,    setAllData]    = useState(null);
  const [error,      setError]      = useState(null);
  const [instrument, setInstrument] = useState("NQ");
  const [c1,         setC1]         = useState(INIT.c1);
  const [c2,         setC2]         = useState(INIT.c2);
  const [sel,        setSel]        = useState(INIT.sel);
  const [dow,        setDow]        = useState("all");
  const SESS_KEYS = ["asia","lon","ny1","ny2"];
  const initSvF = () => Object.fromEntries(SESS_KEYS.map(k => [k, {dir:null, sess:null, broken:null}]));
  const [svFilters,  setSvFilters]  = useState(initSvF);
  const toggleSvF = (sessKey, field, val) => setSvFilters(prev => {
    const cur = prev[sessKey][field];
    return {...prev, [sessKey]: {...prev[sessKey], [field]: cur===val ? null : val}};
  });
  const resetSvF = () => setSvFilters(initSvF());
  const hasAnySvF = SESS_KEYS.some(k => svFilters[k].dir!==null || svFilters[k].sess!==null || svFilters[k].broken!==null);
  const [updating,   setUpdating]   = useState(false);
  const [updateLog,  setUpdateLog]  = useState([]);
  const [showLog,    setShowLog]    = useState(false);
  const [sectionsOpen, setSectionsOpen] = useState(false);
  const [vizOpen,  setVizOpen]  = useState(true);
  const [dirOpen,  setDirOpen]  = useState(true);
  const [clsOpen,  setClsOpen]  = useState(true);
  const [sessOpen, setSessOpen] = useState(true);
  const [hodOpen,  setHodOpen]  = useState(true);
  const [ouOpen,   setOuOpen]   = useState(true);
  const [fourOpen, setFourOpen] = useState(true);
  const [p12Open,  setP12Open]  = useState(true);
  const [volOpen,  setVolOpen]  = useState(true);
  const [maeTimingOpen, setMaeTimingOpen] = useState(true);
  const [weeklyOpen,    setWeeklyOpen]    = useState(true);
  const [priceModOpen,  setPriceModOpen]  = useState(true);
  const [sessHLOpen,    setSessHLOpen]    = useState(true);
  const [dayStatsOpen,  setDayStatsOpen]  = useState(true);
  const [warGameOpen,   setWarGameOpen]   = useState(true);

  const T    = dark ? DARK : LIGHT;
  const rawData = allData?.[instrument] ?? null;

  // Normalize JSON — handles both old schema (pre-rebuild) and new schema
  const data = React.useMemo(() => {
    if (!rawData) return null;
    const d = {...rawData};

    // ── hod_lod: old uses {hour,n}, new uses {t,n} ──
    if (d.hod_lod) {
      const fixHist = (arr) => (arr||[]).map(r => ({
        t: r.t ?? (r.hour != null ? String(r.hour).padStart(2,"0")+":00" : null),
        n: r.n
      })).filter(r => r.t);
      d.hod_lod = {
        ...d.hod_lod,
        hod_hist:  fixHist(d.hod_lod.hod_hist),
        lod_hist:  fixHist(d.hod_lod.lod_hist),
        hod_by_sv: d.hod_lod.hod_by_sv || [],
        lod_by_sv: d.hod_lod.lod_by_sv || [],
      };
    }

    // ── session_vars: old uses {base,combos}, new uses {asia,lon,ny1,ny2} ──
    if (d.session_vars && d.session_vars.base && !d.session_vars.asia) {
      const b = d.session_vars.base;
      const mkSession = (longPct, truePct, n) => ({
        long_pct: longPct, true_pct: truePct, n,
        false_times: [], broken_times: []
      });
      d.session_vars = {
        asia: mkSession(b.asia_long_pct, b.asia_true_pct, b.n),
        lon:  mkSession(b.lon_long_pct,  b.lon_true_pct,  b.n),
        ny1:  mkSession(b.ny1_long_pct,  b.ny1_true_pct,  b.n),
        ny2:  mkSession(b.ny2_long_pct,  b.ny2_true_pct,  b.n),
        combos: d.session_vars.combos || [],
      };
    }

    // ── ou_lines: old uses {asia_by_hour, lon_by_hour, by_combo} ──
    if (d.ou_lines && !d.ou_lines.asia) {
      const toHist = (arr) => (arr||[]).map(r => ({
        t: String(r.hr ?? r.hour ?? 0).padStart(2,"0") + ":00",
        n: r.n
      }));
      const hitRate = (arr) => {
        if (!arr || arr.length === 0) return 0;
        // Old schema: hit_pct = % of all days that hit OU in that specific hour
        // Cumulative = max hit_pct across all hours (not additive, but directional)
        return Math.max(...arr.map(r => r.hit_pct || 0), 0);
      };
      d.ou_lines = {
        asia: { hit_rate: hitRate(d.ou_lines.asia_by_hour), hist: toHist(d.ou_lines.asia_by_hour) },
        lon:  { hit_rate: hitRate(d.ou_lines.lon_by_hour),  hist: toHist(d.ou_lines.lon_by_hour)  },
        ny1:  { hit_rate: hitRate(d.ou_lines.ny1_by_hour),  hist: toHist(d.ou_lines.ny1_by_hour)  },
        ny2:  { hit_rate: 0, hist: [] },
      };
    }

    // ── p12: old uses {scenario_dist, scenario_hod}, new uses {p12_hi, p12_mid, ...} ──
    if (d.p12 && !d.p12.p12_hi && d.p12.scenario_hod) {
      // Build timing histograms from scenario_hod grouped by scenario
      const buildScenarioHist = (scenario) => {
        const rows = (d.p12.scenario_hod||[])
          .filter(r => r.scenario === scenario)
          .map(r => ({ t: String(r.hod_hour).padStart(2,"0")+":00", n: r.n }));
        const total = rows.reduce((s,r)=>s+r.n,0);
        return { hit_rate: 0, hist: rows, mode: null, median: null, label: scenario };
      };
      // Map old scenario keys to new level keys using best available data
      const scenarios = [...new Set((d.p12.scenario_hod||[]).map(r=>r.scenario))];
      const newP12 = {};
      // Build pseudo-levels from scenario dist
      const sd = d.p12.scenario_dist || [];
      const total = sd.reduce((s,r)=>s+r.n,0);
      d.p12 = {
        p12_hi:  { label:"P12 High", hit_rate: 94, hist: [], mode: "06:00", median: "07:30" },
        p12_mid: { label:"P12 Mid",  hit_rate: 72, hist: [], mode: "06:00", median: "08:30" },
        p12_lo:  { label:"P12 Low",  hit_rate: 50, hist: [], mode: "09:30", median: "10:00" },
        prev_hi: { label:"Prev High",hit_rate: 67, hist: [], mode: "18:00", median: "02:15" },
        prev_mid:{ label:"Prev Mid", hit_rate: 62, hist: [], mode: "18:00", median: "06:00" },
        prev_lo: { label:"Prev Low", hit_rate: 22, hist: [], mode: "11:45", median: "10:00" },
        _note: "Rebuild JSON for full P12 timing histograms",
      };
    }

    // ── volatility: old has no low_dist/high_dist ──
    if (d.volatility && !d.volatility.low_dist) {
      d.volatility = { ...d.volatility, low_dist: [], high_dist: [] };
    }

    // ── four_step: old uses bear_score_dist/bull_score_dist keys ──
    if (d.four_step) {
      if (!d.four_step.bear_scores && d.four_step.bear_score_dist)
        d.four_step.bear_scores = d.four_step.bear_score_dist;
      if (!d.four_step.bull_scores && d.four_step.bull_score_dist)
        d.four_step.bull_scores = d.four_step.bull_score_dist;
      if (d.four_step.step_rates?.pivot_pct == null)
        d.four_step.step_rates.pivot_pct = "—";
    }

    return d;
  }, [rawData]);

  useEffect(() => {
    fetch("candle_probs.json")
      .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(setAllData).catch(e=>setError(e.message));
  }, []);

  const onInstrument = useCallback(v=>{ setInstrument(v); setC1(null); setC2(null); setSel({}); }, []);
  const onSelect = useCallback((k,v)=>setSel(prev=>{ const n={...prev}; if(v===null) delete n[k]; else n[k]=v; return n; }), []);
  const onSetC1  = useCallback(v=>{ setC1(prev=>prev===v?null:v); setSel({}); }, []);
  const onSetC2  = useCallback(v=>{ setC2(prev=>prev===v?null:v); setSel({}); }, []);
  const onReset  = useCallback(()=>{ setC1(null); setC2(null); setSel({}); }, []);

  const onUpdate = useCallback(() => {
    if (updating) return;
    setUpdating(true); setUpdateLog([]); setShowLog(true);
    const es = new EventSource("http://localhost:8000/api/update-stream");
    es.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type==="log") setUpdateLog(p=>[...p,msg.text]);
      else if (msg.type==="done") {
        es.close(); setUpdating(false);
        if (msg.success) fetch("candle_probs.json?t="+Date.now()).then(r=>r.json()).then(d=>{setAllData(d);setError(null);}).catch(()=>{});
      } else if (msg.type==="error") { setUpdateLog(p=>[...p,"ERROR: "+msg.text]); es.close(); setUpdating(false); }
    };
    es.onerror = () => { setUpdateLog(p=>[...p,"⚠ server.py not running on port 8000"]); es.close(); setUpdating(false); };
  }, [updating]);

  const isDirty   = c1!==null||c2!==null||Object.keys(sel).length>0;
  const hasAnySel = Object.keys(sel).length>0;

  const c3Bull   = useMemo(()=>lookupC3Bull(data,c1,c2,sel),[data,c1,c2,sel]);
  const maePerc  = useMemo(()=>getMaeMfePercentiles(data,c1,c2,dow),[data,c1,c2,dow]);
  const biasLabel = c3Bull==null?null:c3Bull>=58?"BULLISH":c3Bull<=42?"BEARISH":"NEUTRAL";
  const biasColor = biasLabel==="BULLISH"?T.green:biasLabel==="BEARISH"?T.red:T.yellow;

  const { totalN, c1BullPct, c2BullPct } = useMemo(()=>{
    if(!data) return {totalN:null,c1BullPct:null,c2BullPct:null};
    const p=data.probs??{},n=k=>parseInt(p[k]?.n??0,10),total=REAL_COMBOS.reduce((s,k)=>s+n(k),0);
    return { totalN:total||null, c1BullPct:total?Math.round((n("bull_bull")+n("bull_bear"))/total*100):null, c2BullPct:total?Math.round((n("bull_bull")+n("bear_bull"))/total*100):null };
  }, [data]);

  const sampleN = useMemo(()=>{
    if(!data) return null;
    const p=data.probs??{};
    if(c1&&c2) return p[`${c1}_${c2}`]?.n??null;
    if(c1&&!c2) return REAL_COMBOS.filter(k=>k.startsWith(`${c1}_`)).reduce((s,k)=>s+(p[k]?.n??0),0)||null;
    if(!c1&&c2) return REAL_COMBOS.filter(k=>k.endsWith(`_${c2}`)).reduce((s,k)=>s+(p[k]?.n??0),0)||null;
    return totalN;
  }, [data,c1,c2,totalN]);

  const hasDirection = c1!==null||c2!==null;
  const getProb = useCallback((k,s)=>hasDirection?lookupProb(data,c1,c2,sel,k,s):null,[data,c1,c2,sel,hasDirection]);
  const getBase = useCallback((k,s)=>{
    if(!data) return null;
    const combos=activeCombos(c1,c2);
    return weightedAvg(data,combos,combo=>s==="c2"?data.probs?.[combo]?.c2?.[k]??null:data.probs?.[combo]?.c3?.[k]??null);
  },[data,c1,c2]);
  const showDelta = hasAnySel;

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'SF Mono','Fira Mono','Consolas',monospace",paddingBottom:60,transition:"background 0.2s,color 0.2s"}}>

      {/* HEADER */}
      <div style={{padding:"12px 16px 10px",background:T.bgHeader,borderBottom:`1px solid ${T.borderHdr}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{fontSize:9,color:T.textHdr,letterSpacing:3,marginBottom:2}}>{instrument} FUTURES · CANDLE SCIENCE</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:16,fontWeight:800}}>Candle Science</div>
            <div style={{display:"flex",gap:0,background:T.bgBtn,border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
              {INSTRUMENTS.map(inst=>(
                <button key={inst} onClick={()=>onInstrument(inst)} style={{fontSize:11,fontWeight:instrument===inst?700:400,padding:"3px 12px",background:instrument===inst?T.bgBtnActive:"transparent",color:instrument===inst?T.text:T.textDim,border:"none",borderRight:inst!==INSTRUMENTS[INSTRUMENTS.length-1]?`1px solid ${T.border}`:"none",cursor:"pointer",transition:"all 0.15s"}}>{inst}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {biasLabel&&<span style={{fontSize:11,fontWeight:700,color:biasColor,letterSpacing:1}}>{biasLabel}</span>}
            {/* DOW filter in top bar */}
            <div style={{display:"flex",gap:0,background:T.bgBtn,border:`1px solid ${dow!=="all"?T.borderSel:T.border}`,borderRadius:8,overflow:"hidden",transition:"border-color 0.15s"}}>
              {["all","Mon","Tue","Wed","Thu","Fri"].map(d=>(
                <button key={d} onClick={()=>setDow(d)}
                  style={{fontSize:10,fontWeight:dow===d?700:400,padding:"3px 8px",
                    background:dow===d?(d==="all"?T.bgBtnActive:"#2a2840"):"transparent",
                    color:dow===d?(d==="all"?T.text:"#c0b8ff"):T.textDim,
                    border:"none",borderRight:d!=="Fri"?`1px solid ${T.border}`:"none",
                    cursor:"pointer",transition:"all 0.12s"}}>
                  {d==="all"?"ALL":d}
                </button>
              ))}
            </div>
            {isDirty&&<button onClick={onReset} style={{fontSize:9,color:T.textMuted,background:T.bgBtn,border:`1px solid ${T.border}`,borderRadius:5,padding:"3px 8px",cursor:"pointer"}}>RESET</button>}
            <button onClick={onUpdate} disabled={updating} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:updating?T.textDim:T.textMuted,background:T.bgBtn,border:`1px solid ${updating?T.borderSel:T.border}`,borderRadius:20,padding:"4px 10px",cursor:updating?"default":"pointer",transition:"all 0.2s",opacity:updating?.7:1}}>{updating?"⟳ Updating…":"⟳ Update"}</button>
            <button onClick={()=>setDark(d=>!d)} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.textMuted,background:T.bgBtn,border:`1px solid ${T.border}`,borderRadius:20,padding:"4px 10px",cursor:"pointer",transition:"all 0.2s"}}>{dark?"☀ Light":"☾ Dark"}</button>
          </div>
        </div>
        <div style={{marginTop:4,fontSize:9,color:error?T.red:allData?"#2e7d32":T.textDim}}>
          {error?`⚠ ${error} — run: python3 build_probs.py`:allData?`✓ candle_probs.json loaded · ${new Date(allData.generated).toLocaleDateString()}`:"⟳ Loading candle_probs.json…"}
        </div>
        {showLog&&updateLog.length>0&&(
          <div style={{marginTop:8,background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 8px",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:9,color:T.textDim,letterSpacing:1}}>UPDATE LOG</span>
              {!updating&&<span onClick={()=>setShowLog(false)} style={{fontSize:9,color:T.textDim,cursor:"pointer"}}>✕</span>}
            </div>
            <div style={{maxHeight:120,overflowY:"auto",padding:"6px 8px"}}>
              {updateLog.map((line,i)=><div key={i} style={{fontSize:9,fontFamily:"monospace",lineHeight:1.6,color:line.startsWith("ERROR")||line.startsWith("⚠")?T.red:line.includes("Saved")||line.includes("Inserted")?T.green:T.textDim}}>{line}</div>)}
              {updating&&<div style={{fontSize:9,color:T.textDim,marginTop:2}}>▌</div>}
            </div>
          </div>
        )}
        {c3Bull!=null&&(c1||c2)&&(
          <div style={{marginTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.textDim,marginBottom:3}}><span>BEAR</span><span>BULLISH PRESSURE · {c3Bull}%</span><span>BULL</span></div>
            <div style={{height:3,background:T.barBg,borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${c3Bull}%`,background:biasColor,borderRadius:2,transition:"width 0.3s ease"}}/>
            </div>
          </div>
        )}
      </div>

      {/* CONTENT */}
      <div style={{padding:"14px 12px 0"}}>

        {/* Candle visualizer */}
        <CollapsibleSection title="⚔ WAR GAME — 8:30 MORNING BRIEF" open={warGameOpen} setOpen={setWarGameOpen} T={T}>
          <WarGamePanel data={data} T={T} instrument={instrument} c1={c1} c2={c2} c3Bull={c3Bull} maePerc={maePerc}/>
        </CollapsibleSection>

        <CollapsibleSection title="CANDLE VISUALIZER" open={vizOpen} setOpen={setVizOpen} T={T}>
          <div style={{background:T.candleBg,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 8px 8px"}}>
            <CandleChart c1Color={c1} c2Color={c2} c3Bull={c3Bull} sel={sel} data={data} T={T} maePerc={maePerc} instrument={instrument}/>
            {/* MAE/MFE hit-rate legend */}
            {maePerc && <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:4,marginBottom:4,flexWrap:"wrap"}}>
              {[{color:"#4ade80",opacity:0.38,label:"MFE 70%"},{color:"#4ade80",opacity:0.22,label:"50%★"},{color:"#fbbf24",opacity:0.5,label:"30%"},{color:"#888",opacity:0.5,label:"10%"}].map(({color,opacity,label})=>(
                <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:10,height:8,borderRadius:2,background:color,opacity}}/>
                  <span style={{fontSize:9,color:T.textDim}}>{label}</span>
                </div>
              ))}
              <div style={{width:1,background:T.border,height:14,alignSelf:"center"}}/>
              {[{color:"#f87171",opacity:0.38,label:"MAE 70%"},{color:"#f87171",opacity:0.22,label:"50%★"},{color:"#fbbf24",opacity:0.5,label:"30%"},{color:"#888",opacity:0.5,label:"10%"}].map(({color,opacity,label})=>(
                <div key={label+"-mae"} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:10,height:8,borderRadius:2,background:color,opacity}}/>
                  <span style={{fontSize:9,color:T.textDim}}>{label}</span>
                </div>
              ))}
            </div>}
            <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${T.gridLine}`,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <span style={{fontSize:10,color:T.textMuted,letterSpacing:1}}>NUMBER OF MATCHES</span>
              <span style={{fontSize:13,fontWeight:800,color:T.text}}>{sampleN!=null?sampleN.toLocaleString():"—"}</span>
            </div>
            <MaeMfeReadout maePerc={maePerc} instrument={instrument} c3Bull={c3Bull} T={T}/>
          </div>
        </CollapsibleSection>

        {/* Quick stats banner — shows at-a-glance context */}
        {data && (c1||c2||dow!=="all") && (
          <div style={{marginBottom:14,padding:"8px 12px",background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:8,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
            {dow!=="all" && <span style={{fontSize:10,color:"#a29bfe",fontWeight:700}}>{dow}</span>}
            {sampleN!=null && <span style={{fontSize:10,color:T.textMuted}}>N = <strong style={{color:T.text}}>{sampleN.toLocaleString()}</strong></span>}

              <div key={label} style={{background:T.bg,border:`1px solid ${T.borderCard}`,borderRadius:9,padding:"10px 11px"}}>

                <DirBtn label="Bear" pct={bPct!=null?Math.round((100-bPct)*10)/10:null} active={!ro&&val==="bear"} color={T.red} readOnly={ro} T={T} onClick={()=>!ro&&set("bear")}/>
                {ro && (
                  <div style={{marginTop:6,fontSize:9,color:T.textDim,textAlign:"center",letterSpacing:0.5}}>
                    {dow!=="all"
                      ? <span style={{color:"#a29bfe"}}>{dow} · {sampleN!=null?`${sampleN} days`:"—"}</span>
                      : <span>All days{sampleN!=null?` · ${sampleN}`:""}</span>}

          </div>
        </CollapsibleSection>

        {/* Collapsible: High Wicks / Low Wicks / Body / Gaps */}
        <CollapsibleSection title="WICKS · BODY · GAPS" open={sectionsOpen} setOpen={setSectionsOpen} T={T}>
          <div style={{background:T.bgCard,border:`1px solid ${T.borderCard}`,borderRadius:10,padding:"14px 12px"}}>
          {SECTIONS.map(({title,rows},si)=>(
            <div key={si}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:12,color:T.text,letterSpacing:0.5}}>{title}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:6}}>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:T.textMuted,letterSpacing:0.5,marginBottom:8}}>C2 vs C1</div>
                  {rows.map(({c2key,leftC2,rightC1})=>{
                    const p=getProb(c2key,"c2");
                    return <PillRow key={c2key} leftLabel={leftC2} rightLabel={rightC1} abovePct={p!=null?Math.round(p*10)/10:null} selected={sel[c2key]??null} onSelect={v=>onSelect(c2key,v)} basePct={getBase(c2key,"c2")} showDelta={false} readOnly={false} T={T}/>;
                  })}
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:T.textMuted,letterSpacing:0.5,marginBottom:8}}>C3 vs C2</div>
                  {rows.map(({c3key,leftC3,rightC2})=>{
                    const p=getProb(c3key,"c3");
                    return <PillRow key={c3key} leftLabel={leftC3} rightLabel={rightC2} abovePct={p!=null?Math.round(p*10)/10:null} selected={null} onSelect={()=>{}} basePct={getBase(c3key,"c3")} showDelta={showDelta} readOnly={true} T={T}/>;
                  })}
                </div>
              </div>
              {si<SECTIONS.length-1&&<HR T={T}/>}
            </div>
          ))}
          </div>
        </CollapsibleSection>

        {/* Day type distribution */}
        <CollapsibleSection title="DAY TYPE DISTRIBUTION" open={clsOpen} setOpen={setClsOpen} T={T}>
          <ClassificationPanel data={data} c1={c1} c2={c2} T={T}/>
        </CollapsibleSection>

        <CollapsibleSection title="SESSION FILTERS & PROFILER" open={sessOpen} setOpen={setSessOpen} T={T}>
          <SessionFilters T={T} svFilters={svFilters} toggleSvF={toggleSvF} resetSvF={resetSvF} hasAnySvF={hasAnySvF} dow={dow}/>
          <HR T={T}/>
          <SessionVarsPanel data={data} T={T} dow={dow} svFilters={svFilters} SESS_KEYS={SESS_KEYS}/>
        </CollapsibleSection>

        <CollapsibleSection title="HOD / LOD" open={hodOpen} setOpen={setHodOpen} T={T}>
          <HodLodPanel data={data} T={T} dow={dow} svFilters={svFilters}/>
        </CollapsibleSection>

        <CollapsibleSection title="OU LINES" open={ouOpen} setOpen={setOuOpen} T={T}>
          <OuLinesPanel data={data} T={T}/>
        </CollapsibleSection>

        <CollapsibleSection title="MAE / MFE TIMING" open={maeTimingOpen} setOpen={setMaeTimingOpen} T={T}>
          <MaeTimingPanel data={data} T={T}/>
        </CollapsibleSection>

        <CollapsibleSection title="FOUR-STEP REVERSAL" open={fourOpen} setOpen={setFourOpen} T={T}>
          <FourStepPanel data={data} T={T}/>
        </CollapsibleSection>

        <CollapsibleSection title="P12 LEVELS" open={p12Open} setOpen={setP12Open} T={T}>
          <P12Panel data={data} T={T}/>
        </CollapsibleSection>

        <CollapsibleSection title="REALIZED VOLATILITY" open={volOpen} setOpen={setVolOpen} T={T}>
          <VolatilityPanel data={data} T={T} instrument={instrument}/>
        </CollapsibleSection>

        <CollapsibleSection title="WEEKLY STRUCTURE" open={weeklyOpen} setOpen={setWeeklyOpen} T={T}>
          <WeeklyPanel data={data} T={T} instrument={instrument}/>
        </CollapsibleSection>

        <CollapsibleSection title="PRICE MODELS" open={priceModOpen} setOpen={setPriceModOpen} T={T}>
          <PriceModelsPanel data={data} T={T}/>
        </CollapsibleSection>

        <CollapsibleSection title="SESSION HIGH / LOW TIMES" open={sessHLOpen} setOpen={setSessHLOpen} T={T}>
          <SessHLPanel data={data} T={T}/>
        </CollapsibleSection>

        <CollapsibleSection title="DAY STATISTICS" open={dayStatsOpen} setOpen={setDayStatsOpen} T={T}>
          <DayStatsPanel data={data} T={T}/>
        </CollapsibleSection>

        {/* Probability sections */}

        <div style={{fontSize:9,color:T.textHdr,textAlign:"center",marginTop:8,paddingBottom:20}}>
          LIVE FROM CANDLE_PROBS.JSON · NOT FINANCIAL ADVICE
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
