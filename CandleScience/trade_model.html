<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractal Trade Model</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080A0F; color: #E8EAF0; font-family: 'Syne', sans-serif; padding: 32px; min-height: 100vh; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
  .sub { font-family: 'Space Mono', monospace; font-size: 10px; color: #5A6380; margin-bottom: 28px; letter-spacing: 0.08em; text-transform: uppercase; }
  .toggle-row { display: flex; gap: 10px; margin-bottom: 28px; }
  .toggle-btn {
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 8px 20px; border-radius: 6px; border: 1px solid #1E2535;
    background: #0E1117; color: #5A6380; cursor: pointer; transition: all 0.15s; letter-spacing: 0.08em;
  }
  .toggle-btn.active-bull { border-color: #3DD9B3; background: rgba(61,217,179,0.1); color: #3DD9B3; }
  .toggle-btn.active-bear { border-color: #EF5350; background: rgba(239,83,80,0.1); color: #EF5350; }
  .chart-wrap { background: #0E1117; border: 1px solid #1E2535; border-radius: 16px; padding: 24px 24px 20px; margin-bottom: 24px; overflow: hidden; }
  canvas { display: block; width: 100%; }
  .callouts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .callout { background: #0E1117; border: 1px solid #1E2535; border-radius: 10px; padding: 14px 16px; }
  .callout-num   { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 6px; }
  .callout-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .callout-body  { font-family: 'Space Mono', monospace; font-size: 9px; color: #5A6380; line-height: 1.7; }
</style>
</head>
<body>

<h1>Fractal Trade Model — Entry / Stop / Target</h1>
<p class="sub">Sweep-TF: 1H · CISD-TF: 5M · Entry: next open after CISD · Stop: sweep extreme · Target: 2× manipulation range</p>

<div class="toggle-row">
  <button class="toggle-btn" id="btn-bull" onclick="show('bull')">▲ BULLISH (LONG)</button>
  <button class="toggle-btn" id="btn-bear" onclick="show('bear')">▼ BEARISH (SHORT)</button>
</div>

<div class="chart-wrap">
  <canvas id="chart" height="600"></canvas>
</div>
<div class="callouts" id="callouts"></div>

<script>
const DPR = window.devicePixelRatio || 1;
let mode = 'bull';
const C = {
  bg:'#0E1117', border:'#1E2535',
  teal:'#3DD9B3', red:'#EF5350', gold:'#F5C842',
  blue:'#5B9CF6', muted:'#5A6380', orange:'#FB923C',
};

function hl(ctx,y,x1,x2,col,dash=[],lw=1){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash(dash);
  ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function vl(ctx,x,y1,y2,col,dash=[],lw=1){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash(dash);
  ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function txt(ctx,s,x,y,col,sz=9,align='left',bold=false){
  ctx.save();ctx.fillStyle=col;ctx.textAlign=align;
  ctx.font=`${bold?'700':'400'} ${sz}px "Space Mono",monospace`;
  ctx.fillText(s,x,y);ctx.restore();
}
function candle(ctx,x,o,h,l,c,w){
  const bull=c>=o,col=bull?C.teal:C.red,mid=x+w/2;
  ctx.strokeStyle=col;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(mid,h);ctx.lineTo(mid,Math.min(o,c));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mid,Math.max(o,c));ctx.lineTo(mid,l);ctx.stroke();
  const bt=Math.min(o,c),bh=Math.max(Math.abs(c-o),2.5);
  if(bull){ctx.strokeRect(x,bt,w,bh);ctx.fillStyle=C.bg;ctx.fillRect(x+1.5,bt+1.5,w-3,bh-3);ctx.strokeRect(x,bt,w,bh);}
  else{ctx.fillStyle=C.red;ctx.fillRect(x,bt,w,bh);}
}
function badge(ctx,n,cx,cy,col){
  ctx.save();ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);ctx.fill();
  ctx.font='700 10px "Space Mono",monospace';ctx.fillStyle=C.bg;
  ctx.textAlign='center';ctx.fillText(n,cx,cy+3.5);ctx.restore();
}
function ruler(ctx,x,y1,y2,col,lines,lw=1.5){
  const mid=(y1+y2)/2;
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;
  ctx.beginPath();
  ctx.moveTo(x+6,y1);ctx.lineTo(x,y1);ctx.lineTo(x,y2);ctx.moveTo(x,y2);ctx.lineTo(x+6,y2);
  ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,mid);ctx.lineTo(x+10,mid);ctx.stroke();
  ctx.restore();
  lines.forEach((ln,i)=>txt(ctx,ln,x+14,mid+(i-(lines.length-1)/2)*12,col,8,'left',i===0));
}

// ─── BULLISH ──────────────────────────────────────────────────────────────────
function drawBull(ctx,W,H,PAD,py,CW,GAP){
  const cH=H-PAD.t-PAD.b;
  const slot=CW+GAP;

  // Prices (0-100 scale)
  const STOP_P  = 10;   // sweep extreme = STOP
  const PHL_P   = 28;   // prev hour LOW (the swept level)
  const PHH_P   = 55;   // prev hour HIGH (range reference)
  const CL_P    = 41;   // CISD level = open of first candle in sweep leg (within range)
  const EP_P    = 44;   // entry: next bar open after CISD fires
  const MR_P    = CL_P - STOP_P;      // manipulation range = 31
  const TP_P    = STOP_P + 2*MR_P;    // target = 72
  const TP_DISP = TP_P;
  const RISK_P  = EP_P - STOP_P;      // 34
  const REW_P   = TP_DISP - EP_P;     // 28
  const RR      = (REW_P/RISK_P).toFixed(2);

  const stopY   = py(STOP_P);
  const phlY    = py(PHL_P);   // prev hour low
  const phhY    = py(PHH_P);   // prev hour high
  const cisdY   = py(CL_P);
  const entryY  = py(EP_P);
  const targetY = py(TP_DISP);

  // ── zones ────────────────────────────────────────────────────────────────
  // nPrevH = prev hour candle (wide), nQ1 = Q1 sweep (5M bars), nRet = return,
  // nCisd = CISD trigger, nEnt = entry + follow-through
  const nPH=1, nQ1=6, nRet=3, nCisd=2, nEnt=4;
  const PHW = CW*3;          // prev hour candle drawn wider to indicate higher TF
  const xPH  = PAD.l+GAP;
  const xQ1  = xPH+PHW+GAP*3;
  const xRet = xQ1+nQ1*slot;
  const xCisd= xRet+nRet*slot;
  const xEnt = xCisd+nCisd*slot;
  const xEnd = xEnt+nEnt*slot;

  [{x:xPH,  w:PHW+GAP*2,   col:'rgba(91,156,246,0.07)', lbl:'① PREV HOUR CANDLE'},
   {x:xQ1,  w:nQ1*slot,    col:'rgba(239,83,80,0.07)',   lbl:'② Q1 SWEEP  (5M candles)'},
   {x:xRet, w:nRet*slot,   col:'rgba(61,217,179,0.04)',  lbl:'③ RETURN'},
   {x:xCisd,w:nCisd*slot,  col:'rgba(91,156,246,0.08)',  lbl:'④ CISD TRIGGER'},
   {x:xEnt, w:nEnt*slot,   col:'rgba(245,200,66,0.05)',  lbl:'⑤ TRADE'},
  ].forEach(z=>{
    ctx.fillStyle=z.col;ctx.fillRect(z.x,PAD.t-14,z.w,cH+24);
    txt(ctx,z.lbl,z.x+5,PAD.t-18,C.muted,7.5);
  });

  // ── key horizontal lines (full width of chart area) ──────────────────────
  const lineEnd = xEnd + 6;
  hl(ctx,targetY, xPH-4, lineEnd, C.teal,  [],       2.5);  // TARGET solid teal
  hl(ctx,phhY,    xPH-4, lineEnd, C.muted, [4,4],    0.75); // prev hour HIGH (range ref)
  hl(ctx,entryY,  xPH-4, lineEnd, C.gold,  [3,2],    1.5);  // ENTRY dashed gold
  hl(ctx,cisdY,   xPH-4, lineEnd, C.blue,  [6,4],    1.5);  // CISD level (sweep leg open) dashed blue
  hl(ctx,phlY,    xPH-4, lineEnd, C.orange,[5,3],    1.5);  // prev hour LOW dashed orange ← the swept level
  hl(ctx,stopY,   xPH-4, lineEnd, C.red,   [],       2);    // STOP solid red

  // ── ① PREV HOUR CANDLE (1H bar — drawn wider) ────────────────────────────
  // Bearish 1H candle: open near high, close near low, establishes the range
  const phMid = xPH + PHW/2;
  const phO   = py(52), phH = phhY, phL = phlY, phC = py(30);
  // wick
  ctx.strokeStyle=C.red;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(phMid,phH);ctx.lineTo(phMid,Math.min(phO,phC));ctx.stroke();
  ctx.beginPath();ctx.moveTo(phMid,Math.max(phO,phC));ctx.lineTo(phMid,phL);ctx.stroke();
  // body
  ctx.fillStyle=C.red;ctx.fillRect(xPH,Math.min(phO,phC),PHW,Math.max(Math.abs(phC-phO),2.5));
  // "1H" label inside candle
  txt(ctx,'1H',phMid,py(42),C.bg,9,'center',true);

  // bracket on left showing prev hour range
  const bxL = xPH-18;
  ruler(ctx,bxL,phhY,phlY,C.blue,['PREV','HOUR','RANGE']);

  // zone divider
  vl(ctx,xQ1-GAP,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ② Q1 SWEEP — bearish delivery starting at CISD level ────────────────
  let x=xQ1;
  // First bearish candle opens AT CISD level — this is where the sweep leg starts
  candle(ctx,x,py(41),py(44),py(33),py(35),CW);x+=slot;
  candle(ctx,x,py(35),py(37),py(26),py(28),CW);x+=slot;
  // Candle that first breaks BELOW prev hour low → "SWEEP" moment
  const sweepBarX=x;
  candle(ctx,x,py(28),py(30),py(18),py(20),CW);
  // "SWEEP" annotation below the break candle
  ctx.save();ctx.fillStyle=C.orange;
  ctx.beginPath();ctx.moveTo(x+CW/2-4,phlY+4);ctx.lineTo(x+CW/2,phlY+10);ctx.lineTo(x+CW/2+4,phlY+4);ctx.fill();
  ctx.restore();
  txt(ctx,'SWEPT',x+CW/2,phlY+20,C.orange,7,'center',true);
  x+=slot;
  // Remaining candles pushing to sweep_extreme
  candle(ctx,x,py(20),py(22),py(13),py(15),CW);x+=slot;
  candle(ctx,x,py(15),py(17),py(8),stopY,CW);
  // sweep extreme arrow
  ctx.save();ctx.fillStyle=C.red;
  ctx.beginPath();ctx.moveTo(x+CW/2-4,stopY-6);ctx.lineTo(x+CW/2,stopY-1);ctx.lineTo(x+CW/2+4,stopY-6);ctx.fill();
  ctx.restore();
  txt(ctx,'EXTREME',x+CW/2,stopY+13,C.red,7,'center',true);
  x+=slot;
  // Last Q1 bar — starts returning
  candle(ctx,x,py(10),py(22),py(8),py(20),CW);x+=slot;

  vl(ctx,xRet-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ③ RETURN — price recovers back above prev hour low ──────────────────
  x=xRet;
  candle(ctx,x,py(20),py(32),py(16),py(30),CW);x+=slot;
  candle(ctx,x,py(30),py(40),py(27),py(37),CW);x+=slot;
  candle(ctx,x,py(37),py(44),py(33),py(40),CW);
  txt(ctx,'BACK ABOVE',x+CW/2,phlY-10,C.orange,7,'center',true);
  txt(ctx,'PREV LOW',x+CW/2,phlY-20,C.orange,7,'center',true);
  x+=slot;

  vl(ctx,xCisd-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ④ CISD TRIGGER — close above CISD level (open of first sweep candle) ─
  x=xCisd;
  candle(ctx,x,py(38),py(44),py(35),py(39),CW);x+=slot;
  // CISD bar: closes above CISD level (= 41 = open of first bearish sweep candle)
  candle(ctx,x,py(38),py(48),py(35),py(43),CW);
  // crossing annotation
  ctx.save();ctx.strokeStyle=C.blue;ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(x+CW/2,cisdY);ctx.lineTo(x+CW/2,py(43));ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  txt(ctx,'CISD ↑',x+CW/2,cisdY-10,C.blue,7,'center',true);
  x+=slot;

  vl(ctx,xEnt-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ⑤ TRADE ──────────────────────────────────────────────────────────────
  x=xEnt;
  // entry marker arrow
  ctx.save();ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.moveTo(x-3,entryY-4);ctx.lineTo(x+3,entryY);ctx.lineTo(x-3,entryY+4);ctx.fill();
  ctx.restore();
  candle(ctx,x,entryY,py(52),py(41),py(50),CW);x+=slot;
  candle(ctx,x,py(50),py(60),py(47),py(58),CW);x+=slot;
  candle(ctx,x,py(58),py(68),py(55),py(66),CW);x+=slot;
  candle(ctx,x,py(66),py(75),py(63),py(72),CW);x+=slot;

  // ── right-side labels ─────────────────────────────────────────────────────
  const rx=xEnd+10;
  txt(ctx,'TARGET',                   rx,targetY-4, C.teal,  7.5,'left',true);
  txt(ctx,'ENTRY',                    rx,entryY-4,  C.gold,  7.5,'left',true);
  txt(ctx,'CISD LVL (SWEEP LEG OPEN)',rx,cisdY+10,  C.blue,  7.5,'left',true);
  txt(ctx,'PREV HR LOW (swept)',       rx,phlY-4,    C.orange,7.5,'left',true);
  txt(ctx,'STOP = SWEEP EXTREME',     rx,stopY+10,  C.red,   7.5,'left',true);

  // ── right ruler: manip range ×2 ──────────────────────────────────────────
  const bx=rx+126;
  ruler(ctx,bx,stopY,cisdY,C.muted,['MANIP','RANGE','(1×)']);  // stop → cisd level
  ruler(ctx,bx,cisdY,targetY,C.teal,['×2','PROJ']);            // cisd → target (same height)

  // ── right ruler: risk / reward ───────────────────────────────────────────
  const bx2=bx+64;
  ruler(ctx,bx2,entryY,stopY,C.red,['RISK','1R']);
  ruler(ctx,bx2,targetY,entryY,C.teal,['REWARD',`${RR}R`]);

  // ── badges ────────────────────────────────────────────────────────────────
  const bY=PAD.t-33;
  badge(ctx,'1',xPH+PHW/2,         bY,C.blue);
  badge(ctx,'2',xQ1+nQ1*slot/2,    bY,C.red);
  badge(ctx,'3',xRet+nRet*slot/2,  bY,C.teal);
  badge(ctx,'4',xCisd+nCisd*slot/2,bY,C.blue);
  badge(ctx,'5',xEnt+nEnt*slot/2,  bY,C.gold);
}

// ─── BEARISH ─────────────────────────────────────────────────────────────────
function drawBear(ctx,W,H,PAD,py,CW,GAP){
  const cH=H-PAD.t-PAD.b;
  const slot=CW+GAP;

  const STOP_P  = 90;   // sweep extreme = STOP (above prev hour high)
  const PHH_P   = 72;   // prev hour HIGH (the swept level)
  const PHL_P   = 45;   // prev hour LOW (range reference)
  const CL_P    = 59;   // CISD level = open of first candle in sweep leg (within range)
  const EP_P    = 56;   // entry: next bar open after CISD fires
  const MR_P    = STOP_P - CL_P;     // manipulation range = 31
  const TP_P    = STOP_P - 2*MR_P;   // target = 28
  const TP_DISP = TP_P;
  const RISK_P  = STOP_P - EP_P;     // 34
  const REW_P   = EP_P - TP_DISP;    // 28
  const RR      = (REW_P/RISK_P).toFixed(2);

  const stopY   = py(STOP_P);
  const phhY    = py(PHH_P);
  const phlY    = py(PHL_P);
  const cisdY   = py(CL_P);
  const entryY  = py(EP_P);
  const targetY = py(TP_DISP);

  const nPH=1, nQ1=6, nRet=3, nCisd=2, nEnt=4;
  const PHW=CW*3;
  const xPH  = PAD.l+GAP;
  const xQ1  = xPH+PHW+GAP*3;
  const xRet = xQ1+nQ1*slot;
  const xCisd= xRet+nRet*slot;
  const xEnt = xCisd+nCisd*slot;
  const xEnd = xEnt+nEnt*slot;

  [{x:xPH,  w:PHW+GAP*2,   col:'rgba(91,156,246,0.07)', lbl:'① PREV HOUR CANDLE'},
   {x:xQ1,  w:nQ1*slot,    col:'rgba(239,83,80,0.07)',   lbl:'② Q1 SWEEP  (5M candles)'},
   {x:xRet, w:nRet*slot,   col:'rgba(61,217,179,0.04)',  lbl:'③ RETURN'},
   {x:xCisd,w:nCisd*slot,  col:'rgba(91,156,246,0.08)',  lbl:'④ CISD TRIGGER'},
   {x:xEnt, w:nEnt*slot,   col:'rgba(245,200,66,0.05)',  lbl:'⑤ TRADE'},
  ].forEach(z=>{
    ctx.fillStyle=z.col;ctx.fillRect(z.x,PAD.t-14,z.w,cH+24);
    txt(ctx,z.lbl,z.x+5,PAD.t-18,C.muted,7.5);
  });

  const lineEnd=xEnd+6;
  hl(ctx,targetY, xPH-4,lineEnd,C.teal,  [],    2.5);
  hl(ctx,phlY,    xPH-4,lineEnd,C.muted, [4,4], 0.75); // prev hour LOW (range ref)
  hl(ctx,entryY,  xPH-4,lineEnd,C.gold,  [3,2], 1.5);
  hl(ctx,cisdY,   xPH-4,lineEnd,C.blue,  [6,4], 1.5);  // CISD level (sweep leg open)
  hl(ctx,phhY,    xPH-4,lineEnd,C.orange,[5,3], 1.5);  // prev hour HIGH (the swept level)
  hl(ctx,stopY,   xPH-4,lineEnd,C.red,   [],    2);

  // Prev hour candle — bullish
  const phMid=xPH+PHW/2;
  const phO=py(48),phH=phhY,phL=phlY,phC=py(70);
  ctx.strokeStyle=C.teal;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(phMid,phH);ctx.lineTo(phMid,Math.min(phO,phC));ctx.stroke();
  ctx.beginPath();ctx.moveTo(phMid,Math.max(phO,phC));ctx.lineTo(phMid,phL);ctx.stroke();
  ctx.strokeRect(xPH,Math.min(phO,phC),PHW,Math.max(Math.abs(phC-phO),2.5));
  ctx.fillStyle=C.bg;ctx.fillRect(xPH+1.5,Math.min(phO,phC)+1.5,PHW-3,Math.max(Math.abs(phC-phO),2.5)-3);
  ctx.strokeRect(xPH,Math.min(phO,phC),PHW,Math.max(Math.abs(phC-phO),2.5));
  txt(ctx,'1H',phMid,py(58),C.teal,9,'center',true);

  const bxL=xPH-18;
  ruler(ctx,bxL,phlY,phhY,C.blue,['PREV','HOUR','RANGE']);

  vl(ctx,xQ1-GAP,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // Q1 sweep — bullish delivery starting at CISD level, sweeping above prev hour high
  let x=xQ1;
  // First bullish candle opens AT CISD level — this is where the sweep leg starts
  candle(ctx,x,py(59),py(66),py(57),py(64),CW);x+=slot;
  candle(ctx,x,py(64),py(71),py(62),py(70),CW);x+=slot;
  // Candle that breaks ABOVE prev hour high
  candle(ctx,x,py(70),py(78),py(68),py(76),CW);
  ctx.save();ctx.fillStyle=C.orange;
  ctx.beginPath();ctx.moveTo(x+CW/2-4,phhY-4);ctx.lineTo(x+CW/2,phhY-10);ctx.lineTo(x+CW/2+4,phhY-4);ctx.fill();
  ctx.restore();
  txt(ctx,'SWEPT',x+CW/2,phhY-20,C.orange,7,'center',true);
  x+=slot;
  candle(ctx,x,py(76),py(84),py(73),py(82),CW);x+=slot;
  candle(ctx,x,py(82),stopY,py(78),py(88),CW);
  ctx.save();ctx.fillStyle=C.red;
  ctx.beginPath();ctx.moveTo(x+CW/2-4,stopY+6);ctx.lineTo(x+CW/2,stopY+1);ctx.lineTo(x+CW/2+4,stopY+6);ctx.fill();
  ctx.restore();
  txt(ctx,'EXTREME',x+CW/2,stopY+14,C.red,7,'center',true);
  x+=slot;
  candle(ctx,x,py(90),py(92),py(78),py(80),CW);x+=slot;

  vl(ctx,xRet-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // Return candles — price drops back below prev hr high, falling toward CISD level
  x=xRet;
  candle(ctx,x,py(80),py(84),py(68),py(70),CW);x+=slot;
  candle(ctx,x,py(70),py(72),py(62),py(64),CW);x+=slot;
  candle(ctx,x,py(64),py(66),py(58),py(60),CW);
  txt(ctx,'BACK BELOW',x+CW/2,phhY+10,C.orange,7,'center',true);
  txt(ctx,'PREV HIGH',x+CW/2,phhY+20,C.orange,7,'center',true);
  x+=slot;

  vl(ctx,xCisd-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  x=xCisd;
  candle(ctx,x,py(61),py(64),py(56),py(62),CW);x+=slot;
  // CISD bar: closes below CISD level (= 59 = open of first bullish sweep candle)
  candle(ctx,x,py(61),py(63),py(52),py(57),CW);
  ctx.save();ctx.strokeStyle=C.blue;ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(x+CW/2,cisdY);ctx.lineTo(x+CW/2,py(57));ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  txt(ctx,'CISD ↓',x+CW/2,cisdY+14,C.blue,7,'center',true);
  x+=slot;

  vl(ctx,xEnt-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  x=xEnt;
  ctx.save();ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.moveTo(x-3,entryY-4);ctx.lineTo(x+3,entryY);ctx.lineTo(x-3,entryY+4);ctx.fill();
  ctx.restore();
  candle(ctx,x,entryY,py(62),py(52),py(54),CW);x+=slot;
  candle(ctx,x,py(54),py(57),py(44),py(46),CW);x+=slot;
  candle(ctx,x,py(46),py(49),py(34),py(36),CW);x+=slot;
  candle(ctx,x,py(36),py(39),py(26),py(28),CW);x+=slot;

  const rx=xEnd+10;
  txt(ctx,'STOP = SWEEP EXTREME',    rx,stopY-4,   C.red,   7.5,'left',true);
  txt(ctx,'PREV HR HIGH (swept)',    rx,phhY-4,    C.orange,7.5,'left',true);
  txt(ctx,'CISD LVL (SWEEP LEG OPEN)',rx,cisdY-10, C.blue,  7.5,'left',true);
  txt(ctx,'ENTRY',                   rx,entryY+10, C.gold,  7.5,'left',true);
  txt(ctx,'TARGET',                  rx,targetY-4, C.teal,  7.5,'left',true);

  const bx=rx+126;
  ruler(ctx,bx,cisdY,stopY,C.muted,['MANIP','RANGE','(1×)']);  // cisd → stop
  ruler(ctx,bx,targetY,cisdY,C.teal,['×2','PROJ']);            // target → cisd (same height)

  const bx2=bx+64;
  ruler(ctx,bx2,stopY,entryY,C.red,['RISK','1R']);
  ruler(ctx,bx2,entryY,targetY,C.teal,['REWARD',`${RR}R`]);

  const bY=PAD.t-33;
  badge(ctx,'1',xPH+PHW/2,          bY,C.blue);
  badge(ctx,'2',xQ1+nQ1*slot/2,     bY,C.red);
  badge(ctx,'3',xRet+nRet*slot/2,   bY,C.teal);
  badge(ctx,'4',xCisd+nCisd*slot/2, bY,C.blue);
  badge(ctx,'5',xEnt+nEnt*slot/2,   bY,C.gold);
}

// ─── main ─────────────────────────────────────────────────────────────────────
function draw(m){
  const cvs=document.getElementById('chart');
  const W=cvs.offsetWidth, H=600;
  cvs.width=W*DPR;cvs.height=H*DPR;cvs.style.height=H+'px';
  const ctx=cvs.getContext('2d');
  ctx.scale(DPR,DPR);
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
  const PAD={t:60,b:60,l:56,r:240};
  const cH=H-PAD.t-PAD.b;
  const py=p=>PAD.t+cH*(1-p/100);
  const CW=20,GAP=7;
  if(m==='bull') drawBull(ctx,W,H,PAD,py,CW,GAP);
  else           drawBear(ctx,W,H,PAD,py,CW,GAP);
}

// ─── callouts ─────────────────────────────────────────────────────────────────
const CARDS={
  bull:[
    {num:'①',col:'#5B9CF6',title:'Prev Hour Candle',
     body:'The reference 1H bar.\nIts HIGH = top of the\nmanipulation range.\nIts LOW = the level\nthat gets swept.'},
    {num:'②',col:'#EF5350',title:'Q1 Sweep (5M)',
     body:'During Q1 of the new hour,\n5M candles push BELOW\nthe prev hour low —\ntaking sell-side liquidity.\nStop = sweep extreme.'},
    {num:'③',col:'#3DD9B3',title:'Return',
     body:'Price closes back above\nthe prev hour low,\nshowing the sweep\nwas a liquidity grab,\nnot a real break.'},
    {num:'④⑤',col:'#F5C842',title:'CISD → Entry',
     body:'Bearish CISD: a 5M candle\ncloses ABOVE the open of\nthe first bearish sweep\ncandle. Entry = next bar\nopen after CISD fires.'},
  ],
  bear:[
    {num:'①',col:'#5B9CF6',title:'Prev Hour Candle',
     body:'The reference 1H bar.\nIts LOW = bottom of the\nmanipulation range.\nIts HIGH = the level\nthat gets swept.'},
    {num:'②',col:'#EF5350',title:'Q1 Sweep (5M)',
     body:'During Q1 of the new hour,\n5M candles push ABOVE\nthe prev hour high —\ntaking buy-side liquidity.\nStop = sweep extreme.'},
    {num:'③',col:'#3DD9B3',title:'Return',
     body:'Price closes back below\nthe prev hour high,\nshowing the sweep\nwas a liquidity grab,\nnot a real break.'},
    {num:'④⑤',col:'#F5C842',title:'CISD → Entry',
     body:'Bullish CISD: a 5M candle\ncloses BELOW the open of\nthe first bullish sweep\ncandle. Entry = next bar\nopen after CISD fires.'},
  ],
};

function renderCards(m){
  const wrap=document.getElementById('callouts');
  wrap.innerHTML='';
  CARDS[m].forEach(c=>{
    const d=document.createElement('div');
    d.className='callout';d.style.borderColor=c.col+'44';
    d.innerHTML=`
      <div class="callout-num" style="color:${c.col}">${c.num}</div>
      <div class="callout-title" style="color:${c.col}">${c.title}</div>
      <div class="callout-body">${c.body.replace(/\n/g,'<br>')}</div>`;
    wrap.appendChild(d);
  });
}

function show(m){
  mode=m;
  document.getElementById('btn-bull').className='toggle-btn'+(m==='bull'?' active-bull':'');
  document.getElementById('btn-bear').className='toggle-btn'+(m==='bear'?' active-bear':'');
  draw(m);renderCards(m);
}
window.addEventListener('load',  ()=>show('bull'));
window.addEventListener('resize',()=>draw(mode));
</script>
