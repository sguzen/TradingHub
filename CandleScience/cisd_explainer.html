<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CISD Visual Explainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080A0F; color: #E8EAF0; font-family: 'Syne', sans-serif; padding: 32px; min-height: 100vh; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
  .sub { font-family: 'Space Mono', monospace; font-size: 10px; color: #5A6380; margin-bottom: 28px; letter-spacing: 0.1em; text-transform: uppercase; }
  .toggle-row { display: flex; gap: 10px; margin-bottom: 28px; }
  .toggle-btn {
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 8px 20px; border-radius: 6px; border: 1px solid #1E2535;
    background: #0E1117; color: #5A6380; cursor: pointer; transition: all 0.15s; letter-spacing: 0.08em;
  }
  .toggle-btn.active-bull { border-color: #3DD9B3; background: rgba(61,217,179,0.1); color: #3DD9B3; }
  .toggle-btn.active-bear { border-color: #EF5350; background: rgba(239,83,80,0.1); color: #EF5350; }
  .chart-wrap { background: #0E1117; border: 1px solid #1E2535; border-radius: 16px; padding: 24px 24px 20px; margin-bottom: 24px; overflow: hidden; }
  canvas { display: block; width: 100%; }
  .callouts { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .callout { background: #0E1117; border: 1px solid #1E2535; border-radius: 10px; padding: 14px 16px; }
  .callout-num  { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 6px; }
  .callout-title{ font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .callout-body { font-family: 'Space Mono', monospace; font-size: 9px; color: #5A6380; line-height: 1.7; }
</style>
</head>
<body>

<h1>CISD — Change in State of Delivery</h1>
<p class="sub">body-only · close through lowest open of the upclose run (or highest open of downclose run)</p>

<div class="toggle-row">
  <button class="toggle-btn" id="btn-bear" onclick="show('bear')">▼ BEARISH (SHORT)</button>
  <button class="toggle-btn" id="btn-bull" onclick="show('bull')">▲ BULLISH (LONG)</button>
</div>

<div class="chart-wrap">
  <canvas id="chart" height="520"></canvas>
</div>
<div class="callouts" id="callouts"></div>

<script>
const DPR = window.devicePixelRatio || 1;
let mode = 'bear';

const C = {
  bg:'#0E1117', border:'#1E2535',
  teal:'#3DD9B3', red:'#EF5350', gold:'#F5C842',
  blue:'#5B9CF6', muted:'#5A6380',
};

// ─── primitives ───────────────────────────────────────────────────────────────
function hl(ctx,y,x1,x2,col,dash=[],lw=1){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash(dash);
  ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function vl(ctx,x,y1,y2,col,dash=[]){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash(dash);
  ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function txt(ctx,s,x,y,col,sz=9,align='left',bold=false){
  ctx.save();ctx.fillStyle=col;ctx.textAlign=align;
  ctx.font=`${bold?'700':'400'} ${sz}px "Space Mono",monospace`;
  ctx.fillText(s,x,y);ctx.restore();
}
function candle(ctx,x,o,h,l,c,w){
  const bull=c>=o, col=bull?C.teal:C.red, mid=x+w/2;
  ctx.strokeStyle=col; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(mid,h);ctx.lineTo(mid,Math.min(o,c));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mid,Math.max(o,c));ctx.lineTo(mid,l);ctx.stroke();
  const bt=Math.min(o,c), bh=Math.max(Math.abs(c-o),2.5);
  if(bull){
    ctx.strokeRect(x,bt,w,bh);
    ctx.fillStyle=C.bg;ctx.fillRect(x+1.5,bt+1.5,w-3,bh-3);
    ctx.strokeRect(x,bt,w,bh);
  } else {
    ctx.fillStyle=C.red;ctx.fillRect(x,bt,w,bh);
  }
}
function badge(ctx,n,cx,cy,col){
  ctx.save();
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);ctx.fill();
  ctx.font='700 10px "Space Mono",monospace';ctx.fillStyle=C.bg;
  ctx.textAlign='center';ctx.fillText(n,cx,cy+3.5);ctx.restore();
}

// ─── BEARISH setup ────────────────────────────────────────────────────────────
function drawBear(ctx,W,H,PAD,py,CW,GAP){
  const cH=H-PAD.t-PAD.b;

  const refHigh   = py(65);
  const sweepHigh = py(90);
  const cisdLevel = py(16);   // open of FIRST upclose candle = lowest open
  const entryY    = py(13);
  const prevLow   = py(2);    // previous swing low (lower than higher low)

  // nCtx=5 context candles show prior low + higher low formation
  const nCtx=5, nRef=4, nDel=8, nSwp=3, nTrg=3, nEnt=2;
  const slot=CW+GAP;
  const xCtx=PAD.l+GAP;
  const xRef=xCtx+nCtx*slot;
  const xDel=xRef+nRef*slot;
  const xSwp=xDel+nDel*slot;
  const xTrg=xSwp+nSwp*slot;
  const xEnt=xTrg+nTrg*slot;

  // ── zones ──────────────────────────────────────────────────────────────────
  [{x:xCtx,w:nCtx*slot,col:'rgba(90,99,128,0.04)',  lbl:'① MARKET STRUCTURE'},
   {x:xRef, w:nRef*slot,col:'rgba(90,99,128,0.06)',  lbl:'② REFERENCE'},
   {x:xDel, w:nDel*slot,col:'rgba(239,83,80,0.07)',  lbl:'③ DELIVERY RUN (CISD TF)'},
   {x:xSwp, w:nSwp*slot,col:'rgba(239,83,80,0.04)',  lbl:'④ SWEEP + RETURN'},
   {x:xTrg, w:nTrg*slot,col:'rgba(239,83,80,0.06)',  lbl:'⑤ CISD TRIGGER'},
   {x:xEnt, w:nEnt*slot,col:'rgba(245,200,66,0.05)', lbl:'⑥ ENTRY'},
  ].forEach(z=>{
    ctx.fillStyle=z.col; ctx.fillRect(z.x,PAD.t-14,z.w,cH+24);
    txt(ctx,z.lbl,z.x+5,PAD.t-17,C.muted,8);
  });

  // ── ① Market Structure — prev low then higher low formation ────────────────
  let x=xCtx;

  // Candle 1: big bearish drop to PREV LOW
  candle(ctx,x,py(25),py(32),py(2),py(6),CW);
  // mark prev low with dotted line extending into reference zone
  hl(ctx,prevLow,xCtx-4,xRef+nRef*slot*0.55,C.muted,[2,4],1);
  txt(ctx,'PREV LOW',xCtx+2,prevLow-5,C.muted,7);
  x+=slot;

  // Candle 2: bullish bounce from prev low
  candle(ctx,x,py(6),py(24),py(4),py(22),CW);
  x+=slot;

  // Candle 3: bullish continuation up
  candle(ctx,x,py(22),py(38),py(19),py(35),CW);
  x+=slot;

  // Candle 4: bearish pullback starts
  candle(ctx,x,py(35),py(40),py(22),py(25),CW);
  x+=slot;

  // Candle 5: drops to HIGHER LOW (low ~13, clearly above prev low 2)
  candle(ctx,x,py(25),py(29),py(13),py(16),CW);

  // HIGHER LOW annotation — right before delivery run
  const hlLabelX=x+CW+4;
  txt(ctx,'HIGHER',hlLabelX,cisdLevel-8,C.gold,7,'left',true);
  txt(ctx,'LOW',hlLabelX,cisdLevel+3,C.gold,7,'left',true);
  // upward arrow indicating this low > prev low
  ctx.save();
  ctx.strokeStyle=C.gold;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(hlLabelX+16,cisdLevel+10);ctx.lineTo(hlLabelX+16,prevLow-10);ctx.stroke();
  // arrowhead up
  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.moveTo(hlLabelX+12,prevLow-4);ctx.lineTo(hlLabelX+16,prevLow-12);ctx.lineTo(hlLabelX+20,prevLow-4);ctx.fill();
  // arrowhead down at prev low end
  ctx.beginPath();ctx.moveTo(hlLabelX+12,cisdLevel+16);ctx.lineTo(hlLabelX+16,cisdLevel+24);ctx.lineTo(hlLabelX+20,cisdLevel+16);ctx.fill();
  ctx.restore();

  x+=slot;
  vl(ctx,xRef-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ② Reference — 4 mixed candles around ref level ─────────────────────────
  x=xRef;
  const ref=[
    {o:py(54),h:py(68),l:py(48),c:py(52)},
    {o:py(50),h:py(60),l:py(44),c:py(58)},
    {o:py(56),h:py(70),l:py(52),c:py(62)},
    {o:py(60),h:py(67),l:py(54),c:py(56)},
  ];
  ref.forEach(cd=>{candle(ctx,x,cd.o,cd.h,cd.l,cd.c,CW);x+=slot;});
  hl(ctx,refHigh,PAD.l,W-PAD.r+80,C.muted,[4,4],1);
  txt(ctx,'REF HIGH',W-PAD.r+4,refHigh-4,C.muted,8);
  vl(ctx,xDel-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ③ Delivery run — 8 consecutive upclose candles from higher low ──────────
  x=xDel;
  const firstDelX=x;
  const del=[
    {o:py(16),h:py(24),l:py(13),c:py(22)},  // FIRST — open = cisd_level (= higher low)
    {o:py(22),h:py(34),l:py(19),c:py(32)},
    {o:py(30),h:py(40),l:py(27),c:py(38)},
    {o:py(36),h:py(48),l:py(33),c:py(45)},
    {o:py(43),h:py(55),l:py(41),c:py(53)},
    {o:py(52),h:py(66),l:py(49),c:py(64)},
    {o:py(63),h:py(76),l:py(60),c:py(74)},
    {o:py(72),h:py(84),l:py(70),c:py(82)},
  ];
  del.forEach(cd=>{candle(ctx,x,cd.o,cd.h,cd.l,cd.c,CW);x+=slot;});

  // brace below delivery run
  const brY=PAD.t+cH+32;
  ctx.save();ctx.strokeStyle=C.red;ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(xDel,brY-6);ctx.lineTo(xDel,brY);
  ctx.lineTo(x-GAP,brY);ctx.lineTo(x-GAP,brY-6);ctx.stroke();
  const mx=(xDel+x-GAP)/2;
  ctx.beginPath();ctx.moveTo(mx,brY);ctx.lineTo(mx,brY+6);ctx.stroke();
  ctx.restore();
  txt(ctx,'consecutive upclose candles — highest set in the swing',mx,brY+17,C.red,8,'center');

  // cisd level line from first candle extending right
  hl(ctx,cisdLevel,firstDelX-4,W-PAD.r+80,C.blue,[],2.5);
  txt(ctx,'CISD LEVEL',W-PAD.r+4,cisdLevel-4,C.blue,8,'left',true);
  txt(ctx,'open of FIRST (lowest)',W-PAD.r+4,cisdLevel+9,C.blue,7);
  txt(ctx,'upclose candle',W-PAD.r+4,cisdLevel+19,C.blue,7);

  // circle on first candle open
  const fcx=firstDelX+CW/2;
  ctx.beginPath();ctx.arc(fcx,cisdLevel,5,0,Math.PI*2);
  ctx.strokeStyle=C.blue;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=C.bg;ctx.fill();
  ctx.beginPath();ctx.arc(fcx,cisdLevel,5,0,Math.PI*2);
  ctx.strokeStyle=C.blue;ctx.lineWidth=2;ctx.stroke();
  txt(ctx,'LOWEST OPEN',fcx,cisdLevel-10,C.blue,7,'center',true);

  vl(ctx,xSwp-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ④ Sweep + Return — 3 candles ───────────────────────────────────────────
  x=xSwp;
  candle(ctx,x,py(80),py(90),py(72),py(76),CW);
  ctx.fillStyle=C.red;
  ctx.beginPath();
  ctx.moveTo(x+CW/2-5,sweepHigh-8);ctx.lineTo(x+CW/2,sweepHigh-2);ctx.lineTo(x+CW/2+5,sweepHigh-8);ctx.fill();
  txt(ctx,'SWEEP',x+CW/2,sweepHigh-13,C.red,7,'center',true);
  hl(ctx,sweepHigh,PAD.l,W-PAD.r+80,C.red,[3,3],1);
  txt(ctx,'SWEEP HIGH',W-PAD.r+4,sweepHigh-4,C.red,8);
  txt(ctx,'(stop)',W-PAD.r+4,sweepHigh+8,C.red,7);
  x+=slot;
  candle(ctx,x,py(74),py(78),py(58),py(62),CW);x+=slot;
  candle(ctx,x,py(60),py(64),py(52),py(55),CW);x+=slot;
  vl(ctx,xTrg-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ⑤ CISD trigger — 3 candles descending, last closes below cisd_level ────
  x=xTrg;
  const trgX=x;
  candle(ctx,x,py(54),py(58),py(44),py(46),CW);x+=slot;
  candle(ctx,x,py(44),py(47),py(30),py(32),CW);x+=slot;
  candle(ctx,x,py(36),py(39),py(12),py(14),CW);
  ctx.save();
  ctx.strokeStyle=C.red;ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(x+CW/2,cisdLevel);ctx.lineTo(x+CW/2,py(14));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=C.red;ctx.textAlign='center';ctx.font='700 8px "Space Mono",monospace';
  ctx.fillText('close <',  x+CW+20,(cisdLevel+py(14))/2+2);
  ctx.fillText('cisd level',x+CW+20,(cisdLevel+py(14))/2+12);
  ctx.restore();
  x+=slot;
  vl(ctx,xEnt-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ⑥ Entry — 2 candles ────────────────────────────────────────────────────
  x=xEnt;
  candle(ctx,x,py(14),py(18),py(6),py(8),CW);
  hl(ctx,entryY,x-4,W-PAD.r+80,C.gold,[3,2],1.5);
  txt(ctx,'ENTRY',W-PAD.r+4,entryY-4,C.gold,8,'left',true);
  x+=slot;
  candle(ctx,x,py(8),py(10),py(2),py(4),CW);

  // ── badges ──────────────────────────────────────────────────────────────────
  const bY=PAD.t-32;
  badge(ctx,'1',xCtx+nCtx*slot/2,  bY,C.muted);
  badge(ctx,'2',xRef+nRef*slot/2,  bY,C.muted);
  badge(ctx,'3',xDel+nDel*slot/2,  bY,C.red);
  badge(ctx,'4',xSwp+nSwp*slot/2,  bY,C.red);
  badge(ctx,'5',trgX+CW/2+slot,    bY,C.red);
  badge(ctx,'6',xEnt+nEnt*slot/2,  bY,C.gold);
}

// ─── BULLISH setup ────────────────────────────────────────────────────────────
function drawBull(ctx,W,H,PAD,py,CW,GAP){
  const cH=H-PAD.t-PAD.b;

  const refLow    = py(35);
  const sweepLow  = py(10);
  const cisdLevel = py(84);   // open of FIRST downclose candle = highest open
  const entryY    = py(87);
  const prevHigh  = py(97);   // previous swing high (higher than lower high)

  // nCtx=5 context candles show prior high + lower high formation
  const nCtx=5, nRef=4, nDel=8, nSwp=3, nTrg=3, nEnt=2;
  const slot=CW+GAP;
  const xCtx=PAD.l+GAP;
  const xRef=xCtx+nCtx*slot;
  const xDel=xRef+nRef*slot;
  const xSwp=xDel+nDel*slot;
  const xTrg=xSwp+nSwp*slot;
  const xEnt=xTrg+nTrg*slot;

  [{x:xCtx,w:nCtx*slot,col:'rgba(90,99,128,0.04)',  lbl:'① MARKET STRUCTURE'},
   {x:xRef, w:nRef*slot,col:'rgba(90,99,128,0.06)',  lbl:'② REFERENCE'},
   {x:xDel, w:nDel*slot,col:'rgba(61,217,179,0.05)', lbl:'③ DELIVERY RUN (CISD TF)'},
   {x:xSwp, w:nSwp*slot,col:'rgba(61,217,179,0.03)', lbl:'④ SWEEP + RETURN'},
   {x:xTrg, w:nTrg*slot,col:'rgba(61,217,179,0.06)', lbl:'⑤ CISD TRIGGER'},
   {x:xEnt, w:nEnt*slot,col:'rgba(245,200,66,0.05)', lbl:'⑥ ENTRY'},
  ].forEach(z=>{
    ctx.fillStyle=z.col;ctx.fillRect(z.x,PAD.t-14,z.w,cH+24);
    txt(ctx,z.lbl,z.x+5,PAD.t-17,C.muted,8);
  });

  // ── ① Market Structure — prev high then lower high formation ───────────────
  let x=xCtx;

  // Candle 1: bullish spike up to PREV HIGH
  candle(ctx,x,py(75),py(97),py(71),py(92),CW);
  // mark prev high with dotted line
  hl(ctx,prevHigh,xCtx-4,xRef+nRef*slot*0.55,C.muted,[2,4],1);
  txt(ctx,'PREV HIGH',xCtx+2,prevHigh-8,C.muted,7);
  x+=slot;

  // Candle 2: at prev high — rejection candle
  candle(ctx,x,py(92),py(98),py(86),py(88),CW);
  x+=slot;

  // Candle 3: bearish sell-off from prev high
  candle(ctx,x,py(88),py(91),py(73),py(76),CW);
  x+=slot;

  // Candle 4: bearish continuation down
  candle(ctx,x,py(76),py(80),py(67),py(71),CW);
  x+=slot;

  // Candle 5: bullish bounce to LOWER HIGH (peaks ~88, well below prev high ~97-98)
  candle(ctx,x,py(71),py(89),py(69),py(86),CW);

  // LOWER HIGH annotation — right before delivery run
  const lhLabelX=x+CW+4;
  txt(ctx,'LOWER',lhLabelX,cisdLevel-8,C.gold,7,'left',true);
  txt(ctx,'HIGH',lhLabelX,cisdLevel+3,C.gold,7,'left',true);
  // downward arrow indicating this high < prev high
  ctx.save();
  ctx.strokeStyle=C.gold;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(lhLabelX+14,cisdLevel-14);ctx.lineTo(lhLabelX+14,prevHigh+10);ctx.stroke();
  // arrowhead up at prev high
  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.moveTo(lhLabelX+10,prevHigh+16);ctx.lineTo(lhLabelX+14,prevHigh+8);ctx.lineTo(lhLabelX+18,prevHigh+16);ctx.fill();
  // arrowhead down at lower high level
  ctx.beginPath();ctx.moveTo(lhLabelX+10,cisdLevel-20);ctx.lineTo(lhLabelX+14,cisdLevel-28);ctx.lineTo(lhLabelX+18,cisdLevel-20);ctx.fill();
  ctx.restore();

  x+=slot;
  vl(ctx,xRef-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ② Reference ─────────────────────────────────────────────────────────────
  x=xRef;
  [{o:py(46),h:py(52),l:py(30),c:py(48)},
   {o:py(50),h:py(56),l:py(44),c:py(42)},
   {o:py(44),h:py(50),l:py(36),c:py(40)},
   {o:py(42),h:py(48),l:py(34),c:py(44)},
  ].forEach(cd=>{candle(ctx,x,cd.o,cd.h,cd.l,cd.c,CW);x+=slot;});
  hl(ctx,refLow,PAD.l,W-PAD.r+80,C.muted,[4,4],1);
  txt(ctx,'REF LOW',W-PAD.r+4,refLow-4,C.muted,8);
  vl(ctx,xDel-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ③ Delivery run — 8 consecutive downclose candles from lower high ────────
  x=xDel;
  const firstDelX=x;
  [{o:py(84),h:py(87),l:py(76),c:py(78)},  // FIRST — open = cisd_level (= lower high)
   {o:py(78),h:py(81),l:py(68),c:py(70)},
   {o:py(70),h:py(73),l:py(59),c:py(61)},
   {o:py(62),h:py(65),l:py(54),c:py(56)},
   {o:py(55),h:py(58),l:py(44),c:py(46)},
   {o:py(46),h:py(49),l:py(34),c:py(36)},
   {o:py(36),h:py(39),l:py(24),c:py(26)},
   {o:py(26),h:py(29),l:py(16),c:py(18)},
  ].forEach(cd=>{candle(ctx,x,cd.o,cd.h,cd.l,cd.c,CW);x+=slot;});

  const brY=PAD.t+cH+32;
  ctx.save();ctx.strokeStyle=C.red;ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(xDel,brY-6);ctx.lineTo(xDel,brY);
  ctx.lineTo(x-GAP,brY);ctx.lineTo(x-GAP,brY-6);ctx.stroke();
  const mx=(xDel+x-GAP)/2;
  ctx.beginPath();ctx.moveTo(mx,brY);ctx.lineTo(mx,brY+6);ctx.stroke();
  ctx.restore();
  txt(ctx,'consecutive downclose candles — lowest set in the swing',mx,brY+17,C.red,8,'center');

  hl(ctx,cisdLevel,firstDelX-4,W-PAD.r+80,C.blue,[],2.5);
  txt(ctx,'CISD LEVEL',W-PAD.r+4,cisdLevel-4,C.blue,8,'left',true);
  txt(ctx,'open of FIRST (highest)',W-PAD.r+4,cisdLevel+9,C.blue,7);
  txt(ctx,'downclose candle',W-PAD.r+4,cisdLevel+19,C.blue,7);

  const fcx=firstDelX+CW/2;
  ctx.beginPath();ctx.arc(fcx,cisdLevel,5,0,Math.PI*2);
  ctx.strokeStyle=C.blue;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=C.bg;ctx.fill();
  ctx.beginPath();ctx.arc(fcx,cisdLevel,5,0,Math.PI*2);
  ctx.strokeStyle=C.blue;ctx.lineWidth=2;ctx.stroke();
  txt(ctx,'HIGHEST OPEN',fcx,cisdLevel-10,C.blue,7,'center',true);

  vl(ctx,xSwp-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ④ Sweep + Return ────────────────────────────────────────────────────────
  x=xSwp;
  candle(ctx,x,py(20),py(28),py(10),py(24),CW);
  ctx.fillStyle=C.red;
  ctx.beginPath();
  ctx.moveTo(x+CW/2-5,sweepLow+8);ctx.lineTo(x+CW/2,sweepLow+2);ctx.lineTo(x+CW/2+5,sweepLow+8);ctx.fill();
  txt(ctx,'SWEEP',x+CW/2,sweepLow+20,C.teal,7,'center',true);
  hl(ctx,sweepLow,PAD.l,W-PAD.r+80,C.teal,[3,3],1);
  txt(ctx,'SWEEP LOW',W-PAD.r+4,sweepLow-4,C.teal,8);
  txt(ctx,'(stop)',W-PAD.r+4,sweepLow+8,C.teal,7);
  x+=slot;
  candle(ctx,x,py(26),py(42),py(22),py(38),CW);x+=slot;
  candle(ctx,x,py(40),py(48),py(34),py(44),CW);x+=slot;
  vl(ctx,xTrg-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ⑤ CISD trigger — 3 candles ascending, last closes above cisd_level ──────
  x=xTrg;
  const trgX=x;
  candle(ctx,x,py(46),py(54),py(44),py(52),CW);x+=slot;
  candle(ctx,x,py(54),py(64),py(52),py(62),CW);x+=slot;
  candle(ctx,x,py(60),py(90),py(58),py(86),CW);
  ctx.save();
  ctx.strokeStyle=C.teal;ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(x+CW/2,cisdLevel);ctx.lineTo(x+CW/2,py(86));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=C.teal;ctx.textAlign='center';ctx.font='700 8px "Space Mono",monospace';
  ctx.fillText('close >',   x+CW+20,(cisdLevel+py(86))/2+2);
  ctx.fillText('cisd level',x+CW+20,(cisdLevel+py(86))/2+12);
  ctx.restore();
  x+=slot;
  vl(ctx,xEnt-GAP/2,PAD.t-14,PAD.t+cH+10,C.border,[3,3]);

  // ── ⑥ Entry ─────────────────────────────────────────────────────────────────
  x=xEnt;
  candle(ctx,x,py(86),py(92),py(84),py(90),CW);
  hl(ctx,entryY,x-4,W-PAD.r+80,C.gold,[3,2],1.5);
  txt(ctx,'ENTRY',W-PAD.r+4,entryY-4,C.gold,8,'left',true);
  x+=slot;
  candle(ctx,x,py(90),py(96),py(88),py(94),CW);

  const bY=PAD.t-32;
  badge(ctx,'1',xCtx+nCtx*slot/2, bY,C.muted);
  badge(ctx,'2',xRef+nRef*slot/2,  bY,C.muted);
  badge(ctx,'3',xDel+nDel*slot/2,  bY,C.red);
  badge(ctx,'4',xSwp+nSwp*slot/2,  bY,C.teal);
  badge(ctx,'5',trgX+CW/2+slot,    bY,C.teal);
  badge(ctx,'6',xEnt+nEnt*slot/2,  bY,C.gold);
}

// ─── main draw ────────────────────────────────────────────────────────────────
function draw(m){
  const cvs=document.getElementById('chart');
  const W=cvs.offsetWidth, H=520;
  cvs.width=W*DPR; cvs.height=H*DPR; cvs.style.height=H+'px';
  const ctx=cvs.getContext('2d');
  ctx.scale(DPR,DPR);
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);

  const PAD={t:56,b:72,l:16,r:160};
  const cH=H-PAD.t-PAD.b;
  const py=p=>PAD.t+cH*(1-p/100);
  const CW=22, GAP=9;
  if(m==='bear') drawBear(ctx,W,H,PAD,py,CW,GAP);
  else           drawBull(ctx,W,H,PAD,py,CW,GAP);
}

// ─── callouts ────────────────────────────────────────────────────────────────
const CARDS={

    {num:'③',col:'#EF5350',title:'Upclose Delivery Run',
     body:'8 consecutive bullish\ncandles building the swing\nhigh from the higher low.\n\nCISD LEVEL = open of the\nFIRST candle = LOWEST\nopen in the entire run.'},
    {num:'④',col:'#EF5350',title:'Sweep + Return',
     body:'Price wicks ABOVE ref high\n(buy-side liquidity taken),\nthen closes back inside\nthe range.'},
    {num:'⑤',col:'#EF5350',title:'CISD Fires',
     body:'A candle closes BELOW\nthe cisd_level — below\nwhere the entire bullish\nrun started.\nState shifts → bearish.'},
    {num:'⑥',col:'#F5C842',title:'Entry',
     body:'Next bar OPEN = entry.\nStop = sweep high.\nTarget = 2R below entry.'},
  ],
  bull:[
    {num:'①',col:'#5A6380',title:'Market Structure',
     body:'Previous swing high is\nestablished. Price sells off\nthen bounces to a\nLOWER HIGH — setting up\nbearish delivery momentum.'},
    {num:'②',col:'#5A6380',title:'Reference',
     body:'Prior sweep-TF candle.\nIts LOW = the level\nabout to be swept.'},
    {num:'③',col:'#EF5350',title:'Downclose Delivery Run',
     body:'8 consecutive bearish\ncandles building the swing\nlow from the lower high.\n\nCISD LEVEL = open of the\nFIRST candle = HIGHEST\nopen in the entire run.'},
    {num:'④',col:'#3DD9B3',title:'Sweep + Return',
     body:'Price wicks BELOW ref low\n(sell-side liquidity taken),\nthen closes back inside\nthe range.'},
    {num:'⑤',col:'#3DD9B3',title:'CISD Fires',
     body:'A candle closes ABOVE\nthe cisd_level — above\nwhere the entire bearish\nrun started.\nState shifts → bullish.'},
    {num:'⑥',col:'#F5C842',title:'Entry',
     body:'Next bar OPEN = entry.\nStop = sweep low.\nTarget = 2R above entry.'},
  ],
};

function renderCards(m){
  const wrap=document.getElementById('callouts');
  wrap.innerHTML='';
  CARDS[m].forEach(c=>{
    const d=document.createElement('div');
    d.className='callout'; d.style.borderColor=c.col+'44';
    d.innerHTML=`
      <div class="callout-num" style="color:${c.col}">${c.num}</div>
      <div class="callout-title" style="color:${c.col}">${c.title}</div>
      <div class="callout-body">${c.body.replace(/\n/g,'<br>')}</div>`;
    wrap.appendChild(d);
  });
}

function show(m){
  mode=m;
  document.getElementById('btn-bear').className='toggle-btn'+(m==='bear'?' active-bear':'');
  document.getElementById('btn-bull').className='toggle-btn'+(m==='bull'?' active-bull':'');
  draw(m); renderCards(m);
}

window.addEventListener('load',  ()=>show('bear'));
window.addEventListener('resize',()=>draw(mode));
</script>
