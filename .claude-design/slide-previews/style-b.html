<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B — Electric Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

.slide {
  width: 100vw; height: 100vh; height: 100dvh;
  overflow: hidden;
  display: grid;
  grid-template-rows: 55% 45%;
  background: #0a0a0a;
  position: relative;
}

/* Top panel — white */
.panel-top {
  background: #f0eeea;
  display: flex;
  align-items: flex-end;
  padding: clamp(1.5rem, 4vw, 4rem);
  padding-bottom: clamp(1.5rem, 3vw, 3rem);
  position: relative;
  overflow: hidden;
}

/* Accent bar left edge */
.panel-top::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: #4361ee;
}

/* Large ghost text background */
.ghost-text {
  position: absolute;
  right: -0.05em;
  bottom: -0.25em;
  font-family: 'Manrope', sans-serif;
  font-size: clamp(8rem, 22vw, 22rem);
  font-weight: 800;
  color: rgba(0,0,0,0.04);
  line-height: 1;
  user-select: none;
  white-space: nowrap;
}

.top-content {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  width: 100%;
  z-index: 2;
  gap: 2rem;
}

.top-left { flex: 1; }

.category {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.65rem, 0.9vw, 0.8rem);
  font-weight: 600;
  letter-spacing: 0.3em;
  color: #4361ee;
  text-transform: uppercase;
  margin-bottom: clamp(0.75rem, 1.5vh, 1.25rem);
  opacity: 0;
  animation: rise 0.6s 0.2s forwards;
}

.headline {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(2.2rem, 5.5vw, 5.5rem);
  font-weight: 800;
  color: #0a0a0a;
  line-height: 0.95;
  letter-spacing: -0.03em;
  opacity: 0;
  animation: rise 0.8s 0.35s forwards;
}

/* Stat badge top-right */
.stat-badge {
  flex-shrink: 0;
  background: #4361ee;
  padding: clamp(1rem, 2vw, 1.75rem) clamp(1.25rem, 2.5vw, 2rem);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.2rem;
  opacity: 0;
  animation: rise 0.7s 0.6s forwards;
}

.badge-num {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(1.8rem, 3.5vw, 3.5rem);
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.badge-lbl {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.6rem, 0.8vw, 0.75rem);
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* Bottom panel — dark */
.panel-bottom {
  background: #0a0a0a;
  display: flex;
  align-items: center;
  padding: clamp(1.5rem, 4vw, 4rem);
  gap: clamp(2rem, 5vw, 5rem);
  position: relative;
}

/* Horizontal accent line */
.panel-bottom::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: #4361ee;
  transform: scaleX(0);
  transform-origin: left;
  animation: expand 1s 1s ease forwards;
}

.bottom-text {
  flex: 1;
  opacity: 0;
  animation: rise 0.7s 0.9s forwards;
}

.bottom-text p {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.9rem, 1.5vw, 1.2rem);
  font-weight: 300;
  color: #888;
  line-height: 1.6;
  max-width: 50ch;
}

/* Three pillars */
.pillars {
  display: flex;
  gap: clamp(1.5rem, 3vw, 3rem);
  opacity: 0;
  animation: rise 0.7s 1.1s forwards;
}

.pillar { }
.pillar-val {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(1.4rem, 2.5vw, 2.25rem);
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.pillar-lbl {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.6rem, 0.75vw, 0.7rem);
  font-weight: 500;
  color: #444;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}
.pillar-val.blue { color: #4361ee; }

/* Corner label */
.corner-label {
  position: absolute;
  top: clamp(1rem, 2vw, 1.5rem);
  right: clamp(1.5rem, 3vw, 2.5rem);
  font-family: 'Manrope', sans-serif;
  font-size: clamp(0.6rem, 0.75vw, 0.7rem);
  font-weight: 500;
  letter-spacing: 0.25em;
  color: #333;
  text-transform: uppercase;
}

.style-label {
  position: absolute; bottom: 1.5rem; right: 2rem;
  font-family: 'Manrope', sans-serif;
  font-size: 0.7rem; letter-spacing: 0.2em; color: #333;
  text-transform: uppercase;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes expand { to { transform: scaleX(1); } }
</style>
</head>
<body>
<div class="slide">
  <div class="panel-top">
    <div class="ghost-text">WH</div>
    <div class="top-content">
      <div class="top-left">
        <div class="category">Quantitative Research Platform</div>
        <h1 class="headline">WOLFPACK<br>TRADING HUB</h1>
      </div>
      <div class="stat-badge">
        <div class="badge-num">8,332+</div>
        <div class="badge-lbl">Total Trades</div>
      </div>
    </div>
  </div>

  <div class="panel-bottom">
    <div class="corner-label">2014 — 2026</div>

    <div class="bottom-text">
      <p>Three independent edge models. 15+ years of institutional-grade 1-minute NQ & ES futures data.</p>
    </div>

    <div class="pillars">
      <div class="pillar">
        <div class="pillar-val blue">67.7%</div>
        <div class="pillar-lbl">Best Win Rate</div>
      </div>
      <div class="pillar">
        <div class="pillar-val">+1.27R</div>
        <div class="pillar-lbl">Best EV / trade</div>
      </div>
      <div class="pillar">
        <div class="pillar-val">2.57</div>
        <div class="pillar-lbl">Profit Factor</div>
      </div>
    </div>

    <div class="style-label">Style B — Electric Studio</div>
  </div>
</div>
</body>
</html>
